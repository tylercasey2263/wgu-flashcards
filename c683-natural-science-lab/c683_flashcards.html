<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU C683 – Natural Science Lab Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU C683</div>
    <h1>Natural Science Lab</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== SCIENTIFIC METHOD =====
  { cat: "Scientific Method", q: "What are the steps of the scientific method?", a: "<strong>1) Observation</strong> – notice a phenomenon<br><strong>2) Question</strong> – formulate a question<br><strong>3) Hypothesis</strong> – propose a testable explanation<br><strong>4) Experiment</strong> – design and conduct a test<br><strong>5) Analysis</strong> – examine data<br><strong>6) Conclusion</strong> – accept or reject the hypothesis<br><strong>7) Communication</strong> – share results" },
  { cat: "Scientific Method", q: "What is the difference between a hypothesis, theory, and law?", a: "<strong>Hypothesis</strong> – a testable prediction about a specific phenomenon<br><strong>Theory</strong> – a well-tested, broad explanation supported by extensive evidence (e.g., cell theory, evolution)<br><strong>Law</strong> – a statement describing a consistent, observed pattern (e.g., gravity) without explaining why it occurs" },
  { cat: "Scientific Method", q: "What are independent, dependent, and controlled variables?", a: "<strong>Independent variable</strong> – the variable the researcher deliberately changes (the cause)<br><strong>Dependent variable</strong> – the variable that is measured as a result (the effect)<br><strong>Controlled variables</strong> – all other factors kept constant to ensure a fair test" },
  { cat: "Scientific Method", q: "What is a control group and why is it necessary?", a: "A <strong>control group</strong> does not receive the experimental treatment and serves as a <strong>baseline for comparison</strong>. It allows researchers to determine whether observed effects are due to the independent variable rather than other factors." },
  { cat: "Scientific Method", q: "What is the difference between qualitative and quantitative observations?", a: "<strong>Qualitative observations</strong> describe characteristics using words (color, texture, smell). <strong>Quantitative observations</strong> involve measurable numerical data (mass, temperature, volume). Scientific experiments typically emphasize quantitative data because it can be statistically analyzed." },
  { cat: "Scientific Method", q: "What makes a good hypothesis?", a: "A good hypothesis is <strong>testable</strong> (can be supported or refuted by experiment), <strong>falsifiable</strong> (possible to prove wrong), <strong>specific</strong> (identifies variables and predicted outcome), and often written in 'if...then' format. It is based on prior knowledge and observations." },
  { cat: "Scientific Method", q: "What is the difference between a theory and a hypothesis?", a: "A <strong>hypothesis</strong> is an initial, testable prediction about one phenomenon. A <strong>theory</strong> is a comprehensive explanation supported by <strong>repeated testing and substantial evidence</strong> over time. Theories do not become laws — they serve different functions in science." },

  // ===== LAB SAFETY =====
  { cat: "Lab Safety", q: "What are the basic rules of laboratory safety?", a: "Key rules include: <strong>wear appropriate PPE</strong> (goggles, gloves, lab coat), <strong>never eat or drink</strong> in the lab, know the location of <strong>safety equipment</strong> (fire extinguisher, eyewash, shower), <strong>read all procedures</strong> before starting, and <strong>dispose of chemicals properly</strong>." },
  { cat: "Lab Safety", q: "What is an MSDS/SDS and why is it important?", a: "A <strong>Safety Data Sheet (SDS)</strong> — formerly Material Safety Data Sheet (MSDS) — provides detailed information about a chemical's <strong>hazards, handling procedures, storage, first aid, and disposal</strong>. It is legally required and essential for safe lab work." },
  { cat: "Lab Safety", q: "What should you do if a chemical splashes in your eyes?", a: "Immediately use the <strong>eyewash station</strong> and flush eyes with water for at least <strong>15 minutes</strong>, holding eyelids open. Remove contact lenses if present. Notify the instructor and seek medical attention. Time is critical to prevent permanent damage." },
  { cat: "Lab Safety", q: "What PPE (Personal Protective Equipment) is commonly required in a science lab?", a: "<strong>Safety goggles</strong> – protect eyes from splashes and debris<br><strong>Lab coat or apron</strong> – protect skin and clothing<br><strong>Closed-toe shoes</strong> – protect feet from spills<br><strong>Gloves</strong> – protect hands from chemicals<br><strong>Long hair tied back</strong> – prevent contact with flames or equipment" },

  // ===== MEASUREMENT & DATA =====
  { cat: "Measurement & Data", q: "What is the difference between accuracy and precision?", a: "<strong>Accuracy</strong> is how close a measurement is to the <strong>true or accepted value</strong>. <strong>Precision</strong> is how close repeated measurements are to <strong>each other</strong> (consistency/reproducibility). Measurements can be precise but not accurate, or accurate but not precise." },
  { cat: "Measurement & Data", q: "What are significant figures?", a: "<strong>Significant figures</strong> are the digits in a measurement that are known with certainty plus one estimated digit. They indicate the <strong>precision of a measurement</strong>. Rules: non-zero digits always count, leading zeros do not, trailing zeros after a decimal point do count." },
  { cat: "Measurement & Data", q: "What are the basic SI units for length, mass, time, and temperature?", a: "<table class='algo-table'><tr><th>Quantity</th><th>SI Unit</th><th>Symbol</th></tr><tr><td>Length</td><td>Meter</td><td>m</td></tr><tr><td>Mass</td><td>Kilogram</td><td>kg</td></tr><tr><td>Time</td><td>Second</td><td>s</td></tr><tr><td>Temperature</td><td>Kelvin</td><td>K</td></tr></table>" },
  { cat: "Measurement & Data", q: "What is the difference between mean, median, and mode?", a: "<strong>Mean</strong> – the arithmetic average (sum divided by count)<br><strong>Median</strong> – the middle value when data is ordered<br><strong>Mode</strong> – the most frequently occurring value<br>Mean is sensitive to outliers; median is more robust for skewed data." },
  { cat: "Measurement & Data", q: "When should you use a bar graph vs. a line graph?", a: "<strong>Bar graphs</strong> compare <strong>categorical or discrete data</strong> (types of rocks, species counts). <strong>Line graphs</strong> show <strong>continuous data over time</strong> or another continuous variable (temperature change, population growth). The independent variable goes on the x-axis." },
  { cat: "Measurement & Data", q: "What is a data table and why is it important in experiments?", a: "A <strong>data table</strong> organizes raw measurements in rows and columns, linking the <strong>independent and dependent variables</strong>. It provides a clear, structured record that allows for <strong>pattern identification, error checking, and graph creation</strong>. All tables should include headers and units." },

  // ===== BIOLOGY BASICS =====
  { cat: "Biology Basics", q: "What are the three parts of cell theory?", a: "<strong>1)</strong> All living organisms are composed of one or more <strong>cells</strong>.<br><strong>2)</strong> The cell is the <strong>basic unit of structure and function</strong> in living organisms.<br><strong>3)</strong> All cells come from <strong>pre-existing cells</strong>." },
  { cat: "Biology Basics", q: "What are the major organelles and their functions?", a: "<strong>Nucleus</strong> – contains DNA, controls cell<br><strong>Mitochondria</strong> – produces ATP (cellular respiration)<br><strong>Ribosome</strong> – protein synthesis<br><strong>Endoplasmic reticulum</strong> – protein/lipid processing<br><strong>Golgi apparatus</strong> – packages and ships proteins<br><strong>Cell membrane</strong> – controls what enters/exits<br><strong>Chloroplast</strong> – photosynthesis (plants only)" },
  { cat: "Biology Basics", q: "What is the difference between prokaryotic and eukaryotic cells?", a: "<table class='algo-table'><tr><th>Feature</th><th>Prokaryotic</th><th>Eukaryotic</th></tr><tr><td>Nucleus</td><td>No (nucleoid region)</td><td>Yes (membrane-bound)</td></tr><tr><td>Organelles</td><td>No membrane-bound</td><td>Membrane-bound</td></tr><tr><td>Size</td><td>Smaller (1-10 um)</td><td>Larger (10-100 um)</td></tr><tr><td>Examples</td><td>Bacteria, archaea</td><td>Animals, plants, fungi</td></tr></table>" },
  { cat: "Biology Basics", q: "What is the difference between DNA and RNA?", a: "<table class='algo-table'><tr><th>Feature</th><th>DNA</th><th>RNA</th></tr><tr><td>Strands</td><td>Double-stranded</td><td>Single-stranded</td></tr><tr><td>Sugar</td><td>Deoxyribose</td><td>Ribose</td></tr><tr><td>Bases</td><td>A, T, C, G</td><td>A, U, C, G</td></tr><tr><td>Function</td><td>Stores genetic info</td><td>Carries out genetic instructions</td></tr></table>" },
  { cat: "Biology Basics", q: "What is photosynthesis and where does it occur?", a: "<strong>Photosynthesis</strong> converts light energy, water, and carbon dioxide into <strong>glucose and oxygen</strong>. It occurs in the <strong>chloroplasts</strong> of plant cells. Equation: <span class='tag'>6CO2 + 6H2O + light -> C6H12O6 + 6O2</span>" },
  { cat: "Biology Basics", q: "What is cellular respiration and where does it occur?", a: "<strong>Cellular respiration</strong> breaks down glucose to produce <strong>ATP</strong> (energy). It occurs primarily in the <strong>mitochondria</strong>. Equation: <span class='tag'>C6H12O6 + 6O2 -> 6CO2 + 6H2O + ATP</span>. It is essentially the reverse of photosynthesis." },
  { cat: "Biology Basics", q: "What is an ecosystem?", a: "An <strong>ecosystem</strong> is a community of living organisms (biotic factors) interacting with their nonliving environment (abiotic factors — temperature, water, sunlight, soil). Energy flows through ecosystems via <strong>food chains and food webs</strong>, while nutrients are recycled." },

  // ===== CHEMISTRY BASICS =====
  { cat: "Chemistry Basics", q: "What is the difference between an atom, an element, and a molecule?", a: "<strong>Atom</strong> – the smallest unit of matter that retains the properties of an element<br><strong>Element</strong> – a pure substance made of only one type of atom (listed on the periodic table)<br><strong>Molecule</strong> – two or more atoms bonded together (H2O, O2, CO2)" },
  { cat: "Chemistry Basics", q: "What are the three subatomic particles?", a: "<table class='algo-table'><tr><th>Particle</th><th>Charge</th><th>Location</th></tr><tr><td>Proton</td><td>Positive (+)</td><td>Nucleus</td></tr><tr><td>Neutron</td><td>Neutral (0)</td><td>Nucleus</td></tr><tr><td>Electron</td><td>Negative (-)</td><td>Electron cloud</td></tr></table>The number of protons defines the element (atomic number)." },
  { cat: "Chemistry Basics", q: "How is the periodic table organized?", a: "Elements are arranged by increasing <strong>atomic number</strong> (number of protons). <strong>Rows (periods)</strong> represent energy levels. <strong>Columns (groups/families)</strong> share similar chemical properties. Metals are on the left, nonmetals on the right, and metalloids along the staircase." },
  { cat: "Chemistry Basics", q: "What is the law of conservation of matter?", a: "The <strong>law of conservation of matter</strong> states that matter cannot be <strong>created or destroyed</strong> in a chemical reaction — only rearranged. The total mass of reactants must equal the total mass of products. This is why chemical equations must be balanced." },
  { cat: "Chemistry Basics", q: "What are the signs of a chemical reaction?", a: "Indicators that a chemical reaction has occurred include: <strong>color change, gas production</strong> (bubbles), <strong>temperature change</strong> (exothermic or endothermic), <strong>precipitate formation</strong> (solid forms in liquid), and <strong>light or odor production</strong>." },
  { cat: "Chemistry Basics", q: "What is the difference between an ionic and a covalent bond?", a: "<strong>Ionic bonds</strong> form when electrons are <strong>transferred</strong> between a metal and a nonmetal, creating oppositely charged ions that attract. <strong>Covalent bonds</strong> form when nonmetals <strong>share</strong> electrons. Ionic compounds form crystals; covalent compounds form molecules." },
  { cat: "Chemistry Basics", q: "What is pH and what does it measure?", a: "<strong>pH</strong> measures the concentration of hydrogen ions in a solution on a scale of <strong>0-14</strong>. pH below 7 is <strong>acidic</strong>, pH 7 is <strong>neutral</strong>, and pH above 7 is <strong>basic (alkaline)</strong>. Each unit represents a tenfold difference in hydrogen ion concentration." },

  // ===== PHYSICS BASICS =====
  { cat: "Physics Basics", q: "What are Newton's three laws of motion?", a: "<strong>1st Law (Inertia)</strong> – an object stays at rest or in motion unless acted upon by a force<br><strong>2nd Law</strong> – Force = mass x acceleration (<span class='tag'>F = ma</span>)<br><strong>3rd Law</strong> – for every action, there is an equal and opposite reaction" },
  { cat: "Physics Basics", q: "What is the electromagnetic spectrum?", a: "The <strong>electromagnetic spectrum</strong> is the range of all electromagnetic radiation arranged by wavelength and frequency. From longest to shortest wavelength: <strong>radio, microwave, infrared, visible light, ultraviolet, X-ray, gamma ray</strong>. All travel at the speed of light." },
  { cat: "Physics Basics", q: "What is the difference between kinetic and potential energy?", a: "<strong>Kinetic energy</strong> is the energy of <strong>motion</strong> (<span class='tag'>KE = 1/2 mv^2</span>). <strong>Potential energy</strong> is <strong>stored energy</strong> due to position or condition (gravitational, elastic, chemical). Energy can convert between forms but total energy is conserved." },
  { cat: "Physics Basics", q: "What is the law of conservation of energy?", a: "Energy cannot be <strong>created or destroyed</strong>, only transformed from one form to another. The total energy in a closed system remains constant. For example, a falling ball converts <strong>potential energy to kinetic energy</strong>, with the total remaining the same." },
  { cat: "Physics Basics", q: "What are the properties of waves?", a: "<strong>Wavelength</strong> – distance between wave crests<br><strong>Frequency</strong> – number of waves per second (Hz)<br><strong>Amplitude</strong> – height of the wave (relates to energy/loudness)<br><strong>Speed</strong> – how fast the wave travels (<span class='tag'>v = wavelength x frequency</span>)<br>Higher frequency means shorter wavelength." },

  // ===== EARTH SCIENCE =====
  { cat: "Earth Science", q: "What is plate tectonics?", a: "<strong>Plate tectonics</strong> is the theory that Earth's lithosphere is divided into large plates that float on the semi-fluid asthenosphere and move due to <strong>convection currents</strong> in the mantle. Plate interactions cause earthquakes, volcanoes, and mountain formation at boundaries." },
  { cat: "Earth Science", q: "What are the three types of plate boundaries?", a: "<strong>Divergent</strong> – plates move apart (mid-ocean ridges, rift valleys)<br><strong>Convergent</strong> – plates collide (mountains, subduction zones, trenches)<br><strong>Transform</strong> – plates slide past each other (earthquakes, e.g., San Andreas Fault)" },
  { cat: "Earth Science", q: "What are the three types of rocks and how do they form?", a: "<strong>Igneous</strong> – formed from cooled magma or lava (granite, basalt)<br><strong>Sedimentary</strong> – formed from compressed sediment layers (limestone, sandstone)<br><strong>Metamorphic</strong> – formed from existing rocks changed by heat and pressure (marble, slate)" },
  { cat: "Earth Science", q: "What is the rock cycle?", a: "The <strong>rock cycle</strong> describes the continuous transformation of rocks between the three types. Igneous rocks weather into sediment, which compresses into sedimentary rocks, which can be changed by heat/pressure into metamorphic rocks, which can melt into magma and cool into igneous rocks again." },
  { cat: "Earth Science", q: "What are the stages of the water cycle?", a: "<strong>Evaporation</strong> – water becomes vapor from surface<br><strong>Transpiration</strong> – water vapor released by plants<br><strong>Condensation</strong> – vapor forms clouds<br><strong>Precipitation</strong> – water falls as rain, snow, etc.<br><strong>Collection/Runoff</strong> – water gathers in bodies of water and infiltrates groundwater" },
  { cat: "Earth Science", q: "What are the layers of the Earth?", a: "<strong>Crust</strong> – thin, solid outer layer (5-70 km)<br><strong>Mantle</strong> – thick layer of semi-solid rock (2,900 km)<br><strong>Outer core</strong> – liquid iron and nickel (2,200 km)<br><strong>Inner core</strong> – solid iron and nickel (1,200 km radius)<br>Temperature and pressure increase with depth." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
