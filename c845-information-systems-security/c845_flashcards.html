<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU C845 – Information Systems Security Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU C845</div>
    <h1>Information Systems Security</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== SECURITY ARCHITECTURE =====
  { cat: "Security Architecture", q: "What is security governance?", a: "<strong>Security governance</strong> is the framework of policies, roles, and processes that ensure an organization's security strategy <strong>aligns with business objectives</strong>. It includes executive oversight, risk management, compliance monitoring, and accountability structures defined by senior leadership." },
  { cat: "Security Architecture", q: "What is the security policy hierarchy?", a: "<strong>Policy</strong> – high-level management intent (mandatory, broad)<br><strong>Standard</strong> – specific mandatory requirements (e.g., AES-256 encryption)<br><strong>Guideline</strong> – recommended practices (advisory, not mandatory)<br><strong>Procedure</strong> – detailed step-by-step instructions for implementation<br>Policies drive all other documents in the hierarchy." },
  { cat: "Security Architecture", q: "What is the difference between qualitative and quantitative risk assessment?", a: "<strong>Qualitative</strong> uses subjective ratings (high/medium/low) based on expert judgment and is faster but less precise. <strong>Quantitative</strong> uses numerical values and formulas like <span class='tag'>ALE = ARO x SLE</span> to calculate expected monetary loss, providing objective financial data for decision-making." },
  { cat: "Security Architecture", q: "What do ALE, ARO, and SLE stand for in quantitative risk analysis?", a: "<strong>SLE (Single Loss Expectancy)</strong> = Asset Value x Exposure Factor — the loss from one incident<br><strong>ARO (Annual Rate of Occurrence)</strong> = how often the event is expected per year<br><strong>ALE (Annual Loss Expectancy)</strong> = ARO x SLE — the expected yearly cost of a risk" },
  { cat: "Security Architecture", q: "What are data classification levels?", a: "<table class='algo-table'><tr><th>Government</th><th>Commercial</th></tr><tr><td>Top Secret</td><td>Restricted</td></tr><tr><td>Secret</td><td>Confidential</td></tr><tr><td>Confidential</td><td>Internal</td></tr><tr><td>Unclassified</td><td>Public</td></tr></table>Classification determines the security controls required for each data category." },
  { cat: "Security Architecture", q: "What are the three states of data and how is each protected?", a: "<strong>Data at rest</strong> – stored on disk; protected with <strong>full-disk encryption (AES)</strong><br><strong>Data in transit</strong> – moving over a network; protected with <strong>TLS/IPSec</strong><br><strong>Data in use</strong> – actively being processed in memory; protected with <strong>secure enclaves, memory encryption</strong>" },
  { cat: "Security Architecture", q: "What are BCP and DRP?", a: "<strong>BCP (Business Continuity Plan)</strong> ensures <strong>critical business functions continue</strong> during and after a disaster. <strong>DRP (Disaster Recovery Plan)</strong> focuses specifically on <strong>restoring IT systems and data</strong>. BCP is broader and encompasses DRP as a component." },
  { cat: "Security Architecture", q: "What are RTO, RPO, MTTR, and MTBF?", a: "<strong>RTO (Recovery Time Objective)</strong> – maximum acceptable downtime<br><strong>RPO (Recovery Point Objective)</strong> – maximum acceptable data loss (time-based)<br><strong>MTTR (Mean Time to Repair)</strong> – average time to fix a failure<br><strong>MTBF (Mean Time Between Failures)</strong> – average time a system runs before failure" },

  // ===== IDENTITY & ACCESS =====
  { cat: "Identity & Access", q: "What is OAuth 2.0?", a: "<strong>OAuth 2.0</strong> is an <strong>authorization framework</strong> that allows third-party applications to access user resources without sharing credentials. It uses <strong>access tokens</strong> issued by an authorization server. It handles authorization only — not authentication." },
  { cat: "Identity & Access", q: "What is OpenID Connect (OIDC)?", a: "<strong>OIDC</strong> is an <strong>authentication layer built on top of OAuth 2.0</strong>. It adds an <strong>ID token (JWT)</strong> containing user identity claims, enabling applications to verify who the user is. It provides both authentication and authorization in a single flow." },
  { cat: "Identity & Access", q: "What is SAML and how does it differ from OAuth 2.0?", a: "<strong>SAML (Security Assertion Markup Language)</strong> is an XML-based protocol for <strong>SSO authentication</strong> between an identity provider (IdP) and a service provider (SP). Unlike OAuth 2.0 which focuses on API authorization, SAML is designed for <strong>enterprise web SSO</strong> using browser redirects." },
  { cat: "Identity & Access", q: "What is Single Sign-On (SSO)?", a: "<strong>SSO</strong> allows users to <strong>authenticate once</strong> and access multiple applications without re-entering credentials. It improves user experience, reduces password fatigue, and centralizes authentication. Protocols like <span class='tag'>SAML</span>, <span class='tag'>OIDC</span>, and <span class='tag'>Kerberos</span> enable SSO." },
  { cat: "Identity & Access", q: "What is Privileged Access Management (PAM)?", a: "<strong>PAM</strong> secures, manages, and monitors <strong>privileged accounts</strong> (admin, root, service accounts) that have elevated access. Key features include <strong>credential vaulting, session recording, just-in-time access</strong>, and automated password rotation to limit exposure of high-risk credentials." },
  { cat: "Identity & Access", q: "What is the Zero Trust security model?", a: "<strong>Zero Trust</strong> operates on the principle of <strong>never trust, always verify</strong>. Every access request is authenticated, authorized, and encrypted regardless of network location. It eliminates implicit trust for users inside the perimeter and requires <strong>continuous verification, least privilege, and microsegmentation</strong>." },
  { cat: "Identity & Access", q: "What is microsegmentation?", a: "<strong>Microsegmentation</strong> divides a network into <strong>small, isolated segments</strong> with individual security controls. It restricts <strong>lateral movement</strong> so that even if an attacker compromises one segment, they cannot easily access others. It is a core component of <strong>Zero Trust architecture</strong>." },

  // ===== CRYPTOGRAPHY APPLIED =====
  { cat: "Cryptography Applied", q: "What is PKI and how does it work?", a: "<strong>PKI (Public Key Infrastructure)</strong> manages digital certificates and public-key encryption. Components include a <strong>Certificate Authority (CA)</strong> that issues and signs certificates, a <strong>Registration Authority (RA)</strong> that verifies identity, and a <strong>certificate repository</strong>. It enables trust for encryption, digital signatures, and authentication." },
  { cat: "Cryptography Applied", q: "What are the common PKI trust models?", a: "<strong>Single CA</strong> – one authority issues all certificates (simple but single point of failure)<br><strong>Hierarchical</strong> – root CA delegates to subordinate CAs (scalable, used by most browsers)<br><strong>Web of Trust</strong> – decentralized peer-based trust (used in PGP)<br><strong>Bridge CA</strong> – connects multiple independent PKI hierarchies" },
  { cat: "Cryptography Applied", q: "What is certificate pinning?", a: "<strong>Certificate pinning</strong> associates a host with its expected <strong>public key or certificate</strong>, rejecting any other certificate even if it is signed by a trusted CA. It prevents <strong>man-in-the-middle attacks</strong> that use fraudulent or compromised CA-signed certificates." },
  { cat: "Cryptography Applied", q: "What is the difference between hashing and encryption?", a: "<strong>Encryption</strong> is <strong>reversible</strong> — ciphertext can be converted back to plaintext with the correct key. <strong>Hashing</strong> is a <strong>one-way</strong> function that produces a fixed-length digest and cannot be reversed. Hashing verifies <strong>integrity</strong> while encryption provides <strong>confidentiality</strong>." },
  { cat: "Cryptography Applied", q: "What are symmetric vs. asymmetric encryption use cases?", a: "<table class='algo-table'><tr><th>Feature</th><th>Symmetric</th><th>Asymmetric</th></tr><tr><td>Speed</td><td>Fast</td><td>Slow</td></tr><tr><td>Keys</td><td>Shared secret key</td><td>Public/private pair</td></tr><tr><td>Examples</td><td>AES, 3DES</td><td>RSA, ECC</td></tr><tr><td>Use cases</td><td>Bulk data encryption</td><td>Key exchange, signatures</td></tr></table>" },
  { cat: "Cryptography Applied", q: "What is a digital signature and how does it provide non-repudiation?", a: "A <strong>digital signature</strong> is created by hashing a message and <strong>encrypting the hash with the sender's private key</strong>. The recipient verifies it using the sender's public key. It provides <strong>integrity</strong> (message was not altered), <strong>authentication</strong> (identity of sender), and <strong>non-repudiation</strong> (sender cannot deny sending)." },

  // ===== NETWORK SECURITY =====
  { cat: "Network Security", q: "What is a SIEM system?", a: "<strong>SIEM (Security Information and Event Management)</strong> collects, correlates, and analyzes <strong>log data from multiple sources</strong> in real time. It provides centralized visibility, threat detection through correlation rules, alerting, dashboarding, and compliance reporting. Examples include <span class='tag'>Splunk</span>, <span class='tag'>QRadar</span>, and <span class='tag'>Sentinel</span>." },
  { cat: "Network Security", q: "What is SOAR?", a: "<strong>SOAR (Security Orchestration, Automation, and Response)</strong> platforms automate <strong>incident response workflows</strong> by integrating with SIEM, ticketing, and security tools. They use playbooks to automatically triage alerts, enrich data, and execute response actions, reducing <strong>mean time to respond (MTTR)</strong>." },
  { cat: "Network Security", q: "What are the SOC tiers?", a: "<strong>Tier 1 (Alert Analyst)</strong> – monitors alerts, performs initial triage, escalates<br><strong>Tier 2 (Incident Responder)</strong> – deep investigation, containment, remediation<br><strong>Tier 3 (Threat Hunter)</strong> – proactive threat hunting, malware analysis, advanced forensics<br><strong>SOC Manager</strong> – oversees operations and strategy" },
  { cat: "Network Security", q: "What is network segmentation and why is it important?", a: "<strong>Network segmentation</strong> divides a network into smaller isolated zones using firewalls, VLANs, and access controls. It limits <strong>lateral movement</strong> by attackers, contains breaches to smaller areas, improves monitoring, and helps meet <strong>compliance requirements</strong> like PCI-DSS." },
  { cat: "Network Security", q: "What is the difference between NIDS and HIDS?", a: "<strong>NIDS (Network IDS)</strong> monitors <strong>network traffic</strong> for suspicious patterns across the entire segment. <strong>HIDS (Host IDS)</strong> monitors activity on a <strong>specific host</strong> including file changes, logs, and system calls. Both use signature-based and anomaly-based detection methods." },

  // ===== RISK MANAGEMENT =====
  { cat: "Risk Management", q: "What is the vulnerability management lifecycle?", a: "<strong>1.</strong> Discover – identify assets and scan for vulnerabilities<br><strong>2.</strong> Prioritize – rank by severity (CVSS score) and business impact<br><strong>3.</strong> Remediate – apply patches, configuration changes, or mitigations<br><strong>4.</strong> Verify – rescan to confirm vulnerabilities are resolved<br><strong>5.</strong> Report – document findings and track metrics over time" },
  { cat: "Risk Management", q: "What is patch management?", a: "<strong>Patch management</strong> is the process of identifying, testing, deploying, and verifying software updates to fix vulnerabilities. Best practices include <strong>prioritizing critical patches, testing in a staging environment</strong>, maintaining a rollback plan, and deploying within defined SLA windows." },
  { cat: "Risk Management", q: "What is change management in security operations?", a: "<strong>Change management</strong> is a structured process for requesting, reviewing, approving, and implementing changes to IT systems. It includes <strong>impact analysis, testing, rollback plans</strong>, and a Change Advisory Board (CAB) review to prevent unintended security impacts from system modifications." },
  { cat: "Risk Management", q: "What is a risk register?", a: "A <strong>risk register</strong> is a documented inventory of <strong>identified risks</strong> along with their likelihood, impact, risk rating, assigned owner, and mitigation strategy. It is a living document updated regularly and used by management to <strong>prioritize and track risk treatment</strong> decisions." },
  { cat: "Risk Management", q: "What is residual risk?", a: "<strong>Residual risk</strong> is the risk that remains <strong>after controls have been applied</strong>. No system can eliminate all risk. Management must formally <strong>accept residual risk</strong> when it falls within the organization's risk tolerance. The formula is: <span class='tag'>Residual Risk = Total Risk - Controls</span>." },

  // ===== SECURITY OPERATIONS =====
  { cat: "Security Operations", q: "What is log management and why is it critical?", a: "<strong>Log management</strong> involves collecting, storing, protecting, and analyzing logs from systems, applications, and network devices. It is critical for <strong>incident detection, forensic investigations, compliance auditing</strong>, and establishing timelines of events. Logs should be centralized and tamper-protected." },
  { cat: "Security Operations", q: "What is threat hunting?", a: "<strong>Threat hunting</strong> is the <strong>proactive search</strong> for threats that have evaded existing security controls. Analysts form hypotheses based on threat intelligence, search for indicators of compromise (IOCs) across logs and endpoints, and identify <strong>advanced persistent threats</strong> before they cause damage." },
  { cat: "Security Operations", q: "What is a security baseline?", a: "A <strong>security baseline</strong> is a minimum set of <strong>security configuration standards</strong> that all systems must meet. It defines required settings for OS hardening, patch levels, account policies, and network configurations. Baselines are derived from frameworks like <span class='tag'>CIS Benchmarks</span> or <span class='tag'>DISA STIGs</span>." },

  // ===== CLOUD & VIRTUALIZATION =====
  { cat: "Cloud & Virtualization", q: "What is the shared responsibility model in cloud security?", a: "In cloud computing, security responsibilities are <strong>split between the CSP and the customer</strong>. The CSP secures the <strong>infrastructure</strong> (physical, network, hypervisor). The customer secures <strong>data, identities, applications, and configurations</strong>. The dividing line shifts depending on the service model (IaaS, PaaS, SaaS)." },
  { cat: "Cloud & Virtualization", q: "How do IaaS, PaaS, and SaaS differ in security responsibility?", a: "<table class='algo-table'><tr><th>Model</th><th>CSP Manages</th><th>Customer Manages</th></tr><tr><td>IaaS</td><td>Hardware, network, storage</td><td>OS, apps, data, access</td></tr><tr><td>PaaS</td><td>Infrastructure + OS + runtime</td><td>Apps, data, access</td></tr><tr><td>SaaS</td><td>Everything except data/access</td><td>Data, user access</td></tr></table>" },
  { cat: "Cloud & Virtualization", q: "What is container security?", a: "<strong>Container security</strong> protects containerized applications throughout their lifecycle. Key practices include <strong>scanning images for vulnerabilities</strong>, using minimal base images, enforcing runtime policies, isolating containers with namespaces and cgroups, managing secrets securely, and implementing <strong>network policies</strong> between containers." },
  { cat: "Cloud & Virtualization", q: "What is DevSecOps?", a: "<strong>DevSecOps</strong> integrates <strong>security into every phase</strong> of the software development lifecycle rather than treating it as a final gate. It includes automated security testing in CI/CD pipelines (SAST, DAST, SCA), infrastructure as code scanning, and a <strong>shift-left</strong> approach to finding vulnerabilities early." },
  { cat: "Cloud & Virtualization", q: "What are the key risks of cloud computing?", a: "<strong>Data breaches</strong> from misconfigured storage<br><strong>Insufficient access control</strong> and identity management<br><strong>Insecure APIs</strong> exposed to the internet<br><strong>Vendor lock-in</strong> limiting portability<br><strong>Shared technology vulnerabilities</strong> in multi-tenant environments<br><strong>Compliance challenges</strong> with data residency and jurisdiction" },
  { cat: "Cloud & Virtualization", q: "What is a CASB?", a: "<strong>CASB (Cloud Access Security Broker)</strong> is a security policy enforcement point between users and <strong>cloud service providers</strong>. It provides <strong>visibility, data security, threat protection, and compliance</strong> enforcement for cloud applications. CASBs can operate inline (proxy) or via API integration." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
