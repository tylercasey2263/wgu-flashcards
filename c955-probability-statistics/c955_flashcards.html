<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU C955 – Applied Probability and Statistics Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU C955</div>
    <h1>Applied Probability and Statistics</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== DESCRIPTIVE STATISTICS =====
  { cat: "Descriptive Statistics", q: "What is the difference between a population and a sample?", a: "A <strong>population</strong> is the entire group of individuals or observations of interest. A <strong>sample</strong> is a subset drawn from the population for study. We use samples because measuring the entire population is often impractical or impossible." },
  { cat: "Descriptive Statistics", q: "What is the difference between a parameter and a statistic?", a: "A <strong>parameter</strong> is a numerical value describing a characteristic of a <strong>population</strong> (e.g., population mean &mu;). A <strong>statistic</strong> is a numerical value describing a characteristic of a <strong>sample</strong> (e.g., sample mean x&#772;). Statistics are used to estimate parameters." },
  { cat: "Descriptive Statistics", q: "What are the four levels of measurement?", a: "<strong>Nominal</strong> – categories with no order (eye color, gender)<br><strong>Ordinal</strong> – categories with a meaningful order but unequal intervals (satisfaction rating)<br><strong>Interval</strong> – equal intervals but no true zero (temperature in &deg;F)<br><strong>Ratio</strong> – equal intervals with a true zero (weight, height, age)" },
  { cat: "Descriptive Statistics", q: "What are the measures of central tendency?", a: "<strong>Mean</strong> – arithmetic average of all values; sensitive to outliers<br><strong>Median</strong> – middle value when data is ordered; resistant to outliers<br><strong>Mode</strong> – most frequently occurring value; useful for nominal data. For skewed distributions, the <strong>median</strong> is preferred over the mean." },
  { cat: "Descriptive Statistics", q: "What are the key measures of variability?", a: "<strong>Range</strong> – difference between max and min values<br><strong>Variance</strong> – average of squared deviations from the mean<br><strong>Standard Deviation</strong> – square root of variance; same units as data<br><strong>IQR</strong> – difference between Q3 and Q1; measures spread of the middle 50%." },
  { cat: "Descriptive Statistics", q: "What is a z-score and how is it calculated?", a: "A <strong>z-score</strong> measures how many standard deviations a data point is from the mean. Formula: <span class='tag'>z = (x - &mu;) / &sigma;</span>. A z-score of 2 means the value is 2 standard deviations above the mean. Z-scores allow comparison across different distributions." },
  { cat: "Descriptive Statistics", q: "How are outliers identified using the IQR method?", a: "An <strong>outlier</strong> is any value below <span class='tag'>Q1 - 1.5 &times; IQR</span> or above <span class='tag'>Q3 + 1.5 &times; IQR</span>. These boundaries are called <strong>fences</strong>. Outliers can distort the mean and standard deviation, so they should be investigated before removal." },
  { cat: "Descriptive Statistics", q: "How do you read a box plot?", a: "A <strong>box plot</strong> displays the five-number summary: minimum, Q1, median, Q3, and maximum. The box spans from Q1 to Q3 (the IQR), the line inside the box is the median, and whiskers extend to the smallest and largest non-outlier values. Dots beyond the whiskers indicate <strong>outliers</strong>." },
  { cat: "Descriptive Statistics", q: "What is the difference between a histogram and a frequency distribution?", a: "A <strong>frequency distribution</strong> is a table showing how often each value or range of values occurs. A <strong>histogram</strong> is the graphical representation of a frequency distribution using bars with no gaps. Histograms reveal the <strong>shape</strong> of the distribution (symmetric, skewed, bimodal)." },

  // ===== PROBABILITY =====
  { cat: "Probability", q: "What is the addition rule of probability?", a: "For any two events: <span class='tag'>P(A or B) = P(A) + P(B) - P(A and B)</span>. If events are <strong>mutually exclusive</strong> (cannot occur simultaneously), then P(A and B) = 0, simplifying to <span class='tag'>P(A or B) = P(A) + P(B)</span>." },
  { cat: "Probability", q: "What is the multiplication rule of probability?", a: "For independent events: <span class='tag'>P(A and B) = P(A) &times; P(B)</span>. For dependent events: <span class='tag'>P(A and B) = P(A) &times; P(B|A)</span>. The multiplication rule finds the probability that <strong>both</strong> events occur." },
  { cat: "Probability", q: "What is conditional probability?", a: "<strong>Conditional probability</strong> is the probability of event A occurring given that event B has already occurred. Formula: <span class='tag'>P(A|B) = P(A and B) / P(B)</span>. The vertical bar '|' means 'given that.'" },
  { cat: "Probability", q: "What is the basic idea behind Bayes' theorem?", a: "<strong>Bayes' theorem</strong> allows you to update the probability of a hypothesis based on new evidence. Formula: <span class='tag'>P(A|B) = P(B|A) &times; P(A) / P(B)</span>. It reverses conditional probabilities — if you know P(B|A), you can find P(A|B)." },
  { cat: "Probability", q: "What is the difference between independent and mutually exclusive events?", a: "<strong>Independent events</strong> do not affect each other's probability — P(A|B) = P(A). <strong>Mutually exclusive events</strong> cannot occur at the same time — P(A and B) = 0. Mutually exclusive events are <strong>not independent</strong> (if one occurs, the other cannot)." },
  { cat: "Probability", q: "What is the difference between combinations and permutations?", a: "<strong>Permutations</strong> count arrangements where <strong>order matters</strong>: <span class='tag'>nPr = n! / (n-r)!</span>. <strong>Combinations</strong> count selections where <strong>order does not matter</strong>: <span class='tag'>nCr = n! / [r!(n-r)!]</span>. Use permutations for rankings and combinations for groups." },

  // ===== DISTRIBUTIONS =====
  { cat: "Distributions", q: "What are the characteristics of a binomial distribution?", a: "A <strong>binomial distribution</strong> models the number of successes in a fixed number of independent trials. Requirements: <strong>fixed number of trials (n)</strong>, only two outcomes (success/failure), <strong>constant probability (p)</strong> per trial, and independent trials. Mean = np, SD = &radic;(np(1-p))." },
  { cat: "Distributions", q: "What is the normal distribution and its key properties?", a: "The <strong>normal distribution</strong> is a symmetric, bell-shaped curve defined by its mean (&mu;) and standard deviation (&sigma;). Properties: mean = median = mode, symmetric about the mean, total area under the curve equals 1, and it extends infinitely in both directions." },
  { cat: "Distributions", q: "What is the 68-95-99.7 (empirical) rule?", a: "For a normal distribution: approximately <strong>68%</strong> of data falls within 1 standard deviation of the mean, <strong>95%</strong> within 2 standard deviations, and <strong>99.7%</strong> within 3 standard deviations. This rule is used for quick probability estimates." },
  { cat: "Distributions", q: "What is the Central Limit Theorem (CLT)?", a: "The <strong>CLT</strong> states that the distribution of <strong>sample means</strong> approaches a normal distribution as sample size increases, regardless of the population's shape. Generally applies when n &ge; 30. The mean of sample means equals the population mean, and the standard deviation equals &sigma;/&radic;n." },
  { cat: "Distributions", q: "What is the standard error?", a: "The <strong>standard error (SE)</strong> is the standard deviation of the sampling distribution of a statistic. For the sample mean: <span class='tag'>SE = &sigma; / &radic;n</span>. A larger sample size produces a <strong>smaller standard error</strong>, meaning more precise estimates." },

  // ===== HYPOTHESIS TESTING =====
  { cat: "Hypothesis Testing", q: "What are the null and alternative hypotheses?", a: "The <strong>null hypothesis (H&#8320;)</strong> states there is no effect or no difference — it is the default assumption. The <strong>alternative hypothesis (H&#8321;)</strong> states there is an effect or difference. We test to determine whether evidence is strong enough to <strong>reject H&#8320;</strong>." },
  { cat: "Hypothesis Testing", q: "What are Type I and Type II errors?", a: "<table class='algo-table'><tr><th>Error</th><th>Definition</th><th>Also Called</th></tr><tr><td>Type I</td><td>Rejecting H&#8320; when it is true</td><td>False Positive (&alpha;)</td></tr><tr><td>Type II</td><td>Failing to reject H&#8320; when it is false</td><td>False Negative (&beta;)</td></tr></table>" },
  { cat: "Hypothesis Testing", q: "What is a p-value?", a: "The <strong>p-value</strong> is the probability of observing results at least as extreme as the sample data, assuming the null hypothesis is true. A <strong>small p-value</strong> (typically &lt; 0.05) provides evidence against H&#8320;. It does <strong>not</strong> tell you the probability that H&#8320; is true." },
  { cat: "Hypothesis Testing", q: "What is the significance level (&alpha;)?", a: "The <strong>significance level (&alpha;)</strong> is the threshold for rejecting the null hypothesis, typically set at <span class='tag'>0.05</span> (5%). If the p-value &le; &alpha;, we reject H&#8320;. Choosing a smaller &alpha; reduces Type I error risk but increases Type II error risk." },
  { cat: "Hypothesis Testing", q: "When do you use a t-test vs. a z-test?", a: "Use a <strong>z-test</strong> when the population standard deviation is known and the sample is large (n &ge; 30). Use a <strong>t-test</strong> when the population standard deviation is unknown and/or the sample is small. The t-distribution has heavier tails, accounting for extra uncertainty." },
  { cat: "Hypothesis Testing", q: "What is a chi-square test used for?", a: "A <strong>chi-square test</strong> assesses the relationship between <strong>categorical variables</strong>. The <strong>goodness-of-fit test</strong> checks if observed frequencies match expected frequencies. The <strong>test of independence</strong> checks if two categorical variables are related. It uses frequency counts, not means." },

  // ===== CONFIDENCE INTERVALS =====
  { cat: "Confidence Intervals", q: "What is a confidence interval?", a: "A <strong>confidence interval</strong> is a range of values that is likely to contain the true population parameter. A 95% CI means that if you repeated the sampling process many times, approximately <strong>95% of the intervals</strong> would contain the true parameter." },
  { cat: "Confidence Intervals", q: "How do 90%, 95%, and 99% confidence intervals compare?", a: "Higher confidence levels produce <strong>wider intervals</strong>. A 99% CI is wider than a 95% CI, which is wider than a 90% CI. The trade-off is between <strong>confidence</strong> (certainty) and <strong>precision</strong> (narrow width). Most research uses 95% as the standard." },
  { cat: "Confidence Intervals", q: "What is the margin of error?", a: "The <strong>margin of error (E)</strong> is the maximum expected difference between the sample statistic and the population parameter. Formula: <span class='tag'>E = z* &times; (SE)</span>. It determines the <strong>width</strong> of the confidence interval. Larger samples and lower confidence levels reduce the margin of error." },
  { cat: "Confidence Intervals", q: "How does sample size affect confidence intervals?", a: "Increasing the <strong>sample size</strong> decreases the standard error, which <strong>narrows the confidence interval</strong> without changing the confidence level. This means larger samples produce more precise estimates. Quadrupling the sample size cuts the margin of error in half." },

  // ===== REGRESSION =====
  { cat: "Regression", q: "What is linear regression?", a: "<strong>Linear regression</strong> models the relationship between an independent variable (x) and a dependent variable (y) using the equation <span class='tag'>&#375; = b&#8320; + b&#8321;x</span>. b&#8320; is the y-intercept and b&#8321; is the slope. It finds the line that minimizes the sum of squared residuals (least squares method)." },
  { cat: "Regression", q: "What is the correlation coefficient (r)?", a: "The <strong>correlation coefficient (r)</strong> measures the strength and direction of the linear relationship between two variables. It ranges from <strong>-1 to +1</strong>. Values near &plusmn;1 indicate a strong linear relationship, while values near 0 indicate a weak linear relationship." },
  { cat: "Regression", q: "What is R-squared (coefficient of determination)?", a: "<strong>R&sup2;</strong> is the proportion of variance in the dependent variable explained by the independent variable. It ranges from <strong>0 to 1</strong>. An R&sup2; of 0.85 means 85% of the variability in y is explained by x. It equals the square of the correlation coefficient r." },
  { cat: "Regression", q: "What does a scatter plot reveal about data?", a: "A <strong>scatter plot</strong> displays the relationship between two quantitative variables. It reveals the <strong>direction</strong> (positive/negative), <strong>form</strong> (linear/nonlinear), and <strong>strength</strong> of the relationship. Outliers and clusters are also easily identified on scatter plots." },

  // ===== DATA INTERPRETATION =====
  { cat: "Data Interpretation", q: "What is the difference between correlation and causation?", a: "<strong>Correlation</strong> means two variables move together in a predictable pattern. <strong>Causation</strong> means one variable directly causes a change in another. Correlation alone does <strong>not</strong> prove causation — confounding variables, reverse causation, or coincidence may explain the relationship." },
  { cat: "Data Interpretation", q: "What is sampling bias and how does it affect results?", a: "<strong>Sampling bias</strong> occurs when the sample is not representative of the population, leading to inaccurate conclusions. Common types include <strong>convenience sampling</strong> (selecting easy-to-reach subjects) and <strong>voluntary response bias</strong> (only motivated people respond). Random sampling reduces bias." },
  { cat: "Data Interpretation", q: "What types of graphs are used for different data types?", a: "<strong>Categorical data</strong>: bar chart, pie chart<br><strong>Quantitative data</strong>: histogram, box plot, stem-and-leaf plot<br><strong>Bivariate data</strong>: scatter plot<br><strong>Time series data</strong>: line graph<br>Choosing the correct graph type is essential for accurate data interpretation." },
  { cat: "Data Interpretation", q: "What is a skewed distribution?", a: "A <strong>right-skewed</strong> (positively skewed) distribution has a long tail to the right, and the mean is greater than the median. A <strong>left-skewed</strong> (negatively skewed) distribution has a long tail to the left, and the mean is less than the median. In both cases, the <strong>median</strong> is the better measure of center." },
  { cat: "Data Interpretation", q: "What are common misleading practices in data presentation?", a: "Common tactics include <strong>truncating the y-axis</strong> to exaggerate differences, using 3D charts that distort proportions, <strong>cherry-picking data</strong> to support a conclusion, and using inappropriate scales. Always check axis labels, scales, and sample sizes when interpreting graphs." },
  { cat: "Data Interpretation", q: "What is statistical significance vs. practical significance?", a: "<strong>Statistical significance</strong> means the result is unlikely due to chance alone (p &le; &alpha;). <strong>Practical significance</strong> means the result is large enough to matter in the real world. A very large sample can produce statistically significant results that have <strong>no meaningful practical impact</strong>." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
