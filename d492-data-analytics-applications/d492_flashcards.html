<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D492 – Data Analytics Applications Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D492</div>
    <h1>Data Analytics - Applications</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== ANALYTICS FOUNDATIONS =====
  { cat: "Analytics Foundations", q: "What are the four types of analytics?", a: "<strong>Descriptive</strong> – what happened? (dashboards, reports)<br><strong>Diagnostic</strong> – why did it happen? (root cause analysis)<br><strong>Predictive</strong> – what will happen? (forecasting, modeling)<br><strong>Prescriptive</strong> – what should we do? (optimization, recommendations). Each builds on the previous level." },
  { cat: "Analytics Foundations", q: "What is the data lifecycle?", a: "The <strong>data lifecycle</strong> includes: <strong>1)</strong> Data collection/generation, <strong>2)</strong> Storage, <strong>3)</strong> Processing/transformation, <strong>4)</strong> Analysis, <strong>5)</strong> Visualization/reporting, <strong>6)</strong> Archival or deletion. Each stage has quality, governance, and security considerations." },
  { cat: "Analytics Foundations", q: "What is the difference between structured, unstructured, and semi-structured data?", a: "<strong>Structured</strong> – organized in rows and columns with defined schema (SQL tables, spreadsheets)<br><strong>Unstructured</strong> – no predefined format (images, emails, videos, text)<br><strong>Semi-structured</strong> – has some organizational tags but no rigid schema (JSON, XML, CSV). Most enterprise data is unstructured." },
  { cat: "Analytics Foundations", q: "What is ETL (Extract, Transform, Load)?", a: "<strong>Extract</strong> – pull data from source systems (databases, APIs, files)<br><strong>Transform</strong> – clean, validate, and restructure data (formatting, deduplication, aggregation)<br><strong>Load</strong> – write the processed data into the target system (data warehouse). ETL is fundamental to building reliable analytics pipelines." },
  { cat: "Analytics Foundations", q: "What is data governance?", a: "<strong>Data governance</strong> is the framework of policies, processes, and standards that ensure data is managed properly across an organization. It covers <strong>data quality, security, privacy, compliance, ownership</strong>, and lifecycle management. It ensures data is trustworthy and used responsibly." },
  { cat: "Analytics Foundations", q: "What is data privacy in analytics?", a: "<strong>Data privacy</strong> ensures personal and sensitive data is collected, stored, and used in compliance with regulations like <strong>GDPR and HIPAA</strong>. Key practices include anonymization, encryption, access controls, consent management, and data minimization (collecting only what is needed)." },

  // ===== DATA PREPARATION =====
  { cat: "Data Preparation", q: "How do you handle missing values in a dataset?", a: "Common strategies: <strong>Deletion</strong> – remove rows or columns with missing values (risks losing data)<br><strong>Imputation</strong> – fill with mean, median, mode, or predicted values<br><strong>Flagging</strong> – create a binary indicator column for missingness. The best approach depends on the amount and pattern of missing data." },
  { cat: "Data Preparation", q: "How do you handle outliers in a dataset?", a: "First <strong>investigate</strong> whether outliers are errors or genuine values. Options: <strong>Remove</strong> – if caused by data entry errors<br><strong>Transform</strong> – apply log or winsorization to reduce impact<br><strong>Cap/Floor</strong> – set boundaries (e.g., at the 1st/99th percentile)<br><strong>Keep</strong> – if they represent valid rare events." },
  { cat: "Data Preparation", q: "How do you handle duplicate records?", a: "<strong>Duplicate records</strong> inflate counts and bias results. Steps: <strong>1)</strong> Identify duplicates using key columns (exact match or fuzzy match), <strong>2)</strong> Decide which record to keep (most recent, most complete), <strong>3)</strong> Remove duplicates. Prevention through data entry validation is ideal." },
  { cat: "Data Preparation", q: "What is feature engineering?", a: "<strong>Feature engineering</strong> is the process of creating new input variables from existing data to improve model performance. Techniques include <strong>binning</strong> continuous variables, creating <strong>interaction terms</strong>, extracting <strong>date components</strong> (day, month, year), and encoding categorical variables." },
  { cat: "Data Preparation", q: "What are common data types and encoding methods for categorical variables?", a: "<strong>Label encoding</strong> assigns integers to categories (small=1, medium=2, large=3) — suitable for ordinal data. <strong>One-hot encoding</strong> creates binary columns for each category — suitable for nominal data. Choosing the wrong encoding can introduce false ordinal relationships into the model." },
  { cat: "Data Preparation", q: "What is the train/test split and why is it important?", a: "The <strong>train/test split</strong> divides data into a training set (typically 70-80%) to build the model and a test set (20-30%) to evaluate it on unseen data. This prevents <strong>overfitting</strong> and provides an honest estimate of model performance on new data." },

  // ===== STATISTICAL ANALYSIS =====
  { cat: "Statistical Analysis", q: "What is the difference between overfitting and underfitting?", a: "<strong>Overfitting</strong> occurs when a model learns the training data too well, including noise, and performs poorly on new data (high variance, low bias). <strong>Underfitting</strong> occurs when a model is too simple to capture the underlying pattern (high bias, low variance). The goal is a balanced model." },
  { cat: "Statistical Analysis", q: "What is the difference between supervised and unsupervised learning?", a: "<strong>Supervised learning</strong> uses <strong>labeled data</strong> with known outcomes to train a model (classification, regression). <strong>Unsupervised learning</strong> finds patterns in <strong>unlabeled data</strong> without predefined outcomes (clustering, dimensionality reduction). The choice depends on whether target labels are available." },
  { cat: "Statistical Analysis", q: "What is the difference between classification and regression?", a: "<strong>Classification</strong> predicts a <strong>categorical</strong> outcome (spam/not spam, pass/fail). <strong>Regression</strong> predicts a <strong>continuous numerical</strong> outcome (price, temperature, sales). Both are supervised learning tasks but use different algorithms and evaluation metrics." },
  { cat: "Statistical Analysis", q: "What is SQL's role in data analytics?", a: "<strong>SQL</strong> is the primary language for querying relational databases in analytics. Key operations include filtering (WHERE), aggregation (GROUP BY with COUNT/SUM/AVG), joining tables (JOIN), window functions (RANK, ROW_NUMBER), and creating derived tables. SQL enables data extraction, transformation, and exploratory analysis." },
  { cat: "Statistical Analysis", q: "What are Python/pandas basics for data wrangling?", a: "<strong>pandas</strong> is a Python library for data manipulation. Key objects: <strong>DataFrame</strong> (2D table) and <strong>Series</strong> (1D column). Common operations: <span class='tag'>read_csv()</span>, <span class='tag'>head()</span>, <span class='tag'>describe()</span>, <span class='tag'>groupby()</span>, <span class='tag'>merge()</span>, <span class='tag'>fillna()</span>, and <span class='tag'>dropna()</span> for cleaning and analysis." },

  // ===== MACHINE LEARNING =====
  { cat: "Machine Learning", q: "How does k-means clustering work?", a: "<strong>K-means</strong> partitions data into k clusters: <strong>1)</strong> Choose k initial centroids randomly, <strong>2)</strong> Assign each point to the nearest centroid, <strong>3)</strong> Recalculate centroids as the mean of assigned points, <strong>4)</strong> Repeat until centroids stabilize. You must specify k in advance; the elbow method helps choose it." },
  { cat: "Machine Learning", q: "How do decision trees work?", a: "A <strong>decision tree</strong> splits data at each node based on the feature that best separates the target variable. It uses metrics like <strong>Gini impurity</strong> or <strong>information gain</strong> to choose splits. Trees are easy to interpret but prone to overfitting. Pruning and ensemble methods (Random Forest) address this." },
  { cat: "Machine Learning", q: "What is a confusion matrix?", a: "A <strong>confusion matrix</strong> summarizes classification results:<br><table class='algo-table'><tr><th></th><th>Predicted Positive</th><th>Predicted Negative</th></tr><tr><td>Actual Positive</td><td>True Positive (TP)</td><td>False Negative (FN)</td></tr><tr><td>Actual Negative</td><td>False Positive (FP)</td><td>True Negative (TN)</td></tr></table>" },
  { cat: "Machine Learning", q: "What are accuracy, precision, recall, and F1 score?", a: "<strong>Accuracy</strong> = (TP+TN) / Total — overall correctness<br><strong>Precision</strong> = TP / (TP+FP) — of predicted positives, how many are correct<br><strong>Recall</strong> = TP / (TP+FN) — of actual positives, how many were found<br><strong>F1 Score</strong> = 2 &times; (Precision &times; Recall) / (Precision + Recall) — harmonic mean balancing both" },
  { cat: "Machine Learning", q: "What is the ROC curve and AUC?", a: "The <strong>ROC curve</strong> plots <strong>True Positive Rate</strong> (recall) vs. <strong>False Positive Rate</strong> at various classification thresholds. <strong>AUC (Area Under the Curve)</strong> summarizes overall model performance — 1.0 is perfect, 0.5 is random guessing. Higher AUC indicates better discrimination ability." },

  // ===== VISUALIZATION =====
  { cat: "Visualization", q: "What chart type should you use for different data situations?", a: "<strong>Bar chart</strong> – comparing categories<br><strong>Line chart</strong> – trends over time<br><strong>Scatter plot</strong> – relationship between two numeric variables<br><strong>Pie chart</strong> – parts of a whole (use sparingly)<br><strong>Heatmap</strong> – showing intensity across two dimensions<br><strong>Histogram</strong> – distribution of a single numeric variable" },
  { cat: "Visualization", q: "What are key dashboard design principles?", a: "Effective dashboards: <strong>1)</strong> Focus on the audience's key questions, <strong>2)</strong> Use clear, minimal design (avoid clutter), <strong>3)</strong> Place the most important metrics prominently, <strong>4)</strong> Use consistent colors and formatting, <strong>5)</strong> Enable drill-down for detail, <strong>6)</strong> Update in real-time or near-real-time when possible." },
  { cat: "Visualization", q: "What are KPIs and metrics?", a: "A <strong>metric</strong> is any quantifiable measure used to track performance (e.g., page views, revenue). A <strong>KPI (Key Performance Indicator)</strong> is a metric specifically tied to a strategic business objective (e.g., customer retention rate). All KPIs are metrics, but not all metrics are KPIs." },
  { cat: "Visualization", q: "What are Tableau and Power BI used for?", a: "<strong>Tableau</strong> and <strong>Power BI</strong> are business intelligence tools for data visualization. They connect to data sources, enable drag-and-drop chart creation, support interactive dashboards, and allow sharing with stakeholders. Tableau is known for visual flexibility; Power BI integrates tightly with the Microsoft ecosystem." },

  // ===== BI TOOLS =====
  { cat: "BI Tools", q: "What is the difference between a report and a dashboard?", a: "A <strong>report</strong> is a detailed, static document designed for in-depth analysis of a specific topic, often exported as PDF. A <strong>dashboard</strong> is an interactive, real-time visual display showing key metrics at a glance, designed for ongoing monitoring and quick decision-making." },
  { cat: "BI Tools", q: "What is R used for in analytics?", a: "<strong>R</strong> is a statistical programming language widely used for data analysis, statistical modeling, and visualization. Key packages include <strong>ggplot2</strong> (visualization), <strong>dplyr</strong> (data manipulation), and <strong>caret</strong> (machine learning). It excels at statistical testing and academic research." },
  { cat: "BI Tools", q: "What are calculated fields and LOD expressions in Tableau?", a: "<strong>Calculated fields</strong> create new data from existing fields using formulas (e.g., profit margin = profit/sales). <strong>LOD (Level of Detail) expressions</strong> compute aggregations at a granularity different from the current view — FIXED, INCLUDE, and EXCLUDE control the calculation level." },

  // ===== STORYTELLING WITH DATA =====
  { cat: "Storytelling with Data", q: "What is data storytelling?", a: "<strong>Data storytelling</strong> combines <strong>data, visuals, and narrative</strong> to communicate insights effectively. It follows a structure: <strong>context</strong> (why it matters), <strong>conflict</strong> (what the data reveals), and <strong>resolution</strong> (what action to take). Good storytelling makes data actionable for non-technical audiences." },
  { cat: "Storytelling with Data", q: "What makes an effective data presentation?", a: "Effective presentations: <strong>1)</strong> Start with a clear question or thesis, <strong>2)</strong> Choose the right visualization for the data, <strong>3)</strong> Remove chart junk and unnecessary decoration, <strong>4)</strong> Highlight key insights with annotations, <strong>5)</strong> End with a clear call to action or recommendation." },
  { cat: "Storytelling with Data", q: "What are common data visualization mistakes?", a: "<strong>Truncated y-axis</strong> – exaggerates differences<br><strong>3D charts</strong> – distort proportions and area perception<br><strong>Dual axes</strong> – can mislead by implying correlation<br><strong>Too many colors/categories</strong> – overwhelms the viewer<br><strong>Missing context</strong> – no title, labels, or source. Always design for clarity and honesty." },
  { cat: "Storytelling with Data", q: "How do you choose the right level of detail for your audience?", a: "<strong>Executive audience</strong> – high-level KPIs, trends, and recommendations; keep it brief<br><strong>Analyst audience</strong> – detailed data, methodology, and statistical results<br><strong>Technical audience</strong> – model specifics, code, and parameters. Tailor the depth, vocabulary, and format to the audience's needs." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
