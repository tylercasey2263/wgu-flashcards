<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D324 – Business of IT Project Management Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D324</div>
    <h1>Business of IT - Project Management</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== PM FUNDAMENTALS =====
  { cat: "PM Fundamentals", q: "What is a project according to PMBOK?", a: "A project is a <strong>temporary endeavor</strong> undertaken to create a unique product, service, or result. It has a defined <strong>beginning and end</strong>, distinguishing it from ongoing operations." },
  { cat: "PM Fundamentals", q: "What is the difference between a project, program, and portfolio?", a: "<strong>Project</strong> – a temporary effort producing a unique result<br><strong>Program</strong> – a group of related projects managed together for benefits not available individually<br><strong>Portfolio</strong> – a collection of projects, programs, and operations managed to achieve strategic objectives" },
  { cat: "PM Fundamentals", q: "What are the key responsibilities of a project manager?", a: "The project manager is responsible for <strong>planning, executing, and closing</strong> the project. Key duties include managing scope, schedule, cost, quality, resources, communication, risk, procurement, and <strong>stakeholder engagement</strong>." },
  { cat: "PM Fundamentals", q: "What is a project charter?", a: "A document that formally <strong>authorizes a project</strong> and gives the project manager authority to apply resources. It includes the project purpose, objectives, high-level requirements, milestones, budget summary, and <strong>key stakeholders</strong>." },
  { cat: "PM Fundamentals", q: "What are the PMBOK knowledge areas?", a: "The 10 knowledge areas are: <strong>Integration, Scope, Schedule, Cost, Quality, Resource, Communication, Risk, Procurement, and Stakeholder</strong> management. They represent the key competencies a project manager must coordinate." },
  { cat: "PM Fundamentals", q: "What is the triple constraint (iron triangle)?", a: "The <strong>triple constraint</strong> links <strong>scope, schedule, and cost</strong> — changing one affects the others. Quality sits at the center. A project manager must balance these competing demands to deliver a successful project." },

  // ===== PROJECT LIFECYCLE =====
  { cat: "Project Lifecycle", q: "What are the five project management process groups?", a: "<strong>Initiating</strong> – define and authorize the project<br><strong>Planning</strong> – establish scope, objectives, and actions<br><strong>Executing</strong> – perform the work<br><strong>Monitoring & Controlling</strong> – track and regulate progress<br><strong>Closing</strong> – finalize all activities and formally close" },
  { cat: "Project Lifecycle", q: "What happens during the Initiating process group?", a: "The project is formally <strong>authorized via the project charter</strong>. Key stakeholders are identified, the business case is validated, and the project manager is assigned. This phase sets the <strong>vision and justification</strong> for the project." },
  { cat: "Project Lifecycle", q: "What happens during the Planning process group?", a: "The project management plan is developed, including <strong>scope, schedule, cost, quality, resource, communication, risk, procurement, and stakeholder</strong> plans. The WBS, budget, and detailed schedule are created." },
  { cat: "Project Lifecycle", q: "What happens during the Monitoring & Controlling process group?", a: "Performance is tracked against the <strong>project management plan</strong> using metrics and KPIs. Variances are identified and <strong>corrective actions</strong> are taken. Change requests are evaluated through integrated change control." },
  { cat: "Project Lifecycle", q: "What happens during the Closing process group?", a: "All project activities are <strong>formally completed</strong>. Deliverables are verified and accepted, <strong>lessons learned</strong> are documented, contracts are closed, resources are released, and final reports are archived." },
  { cat: "Project Lifecycle", q: "What are lessons learned and when are they captured?", a: "<strong>Lessons learned</strong> document what went well, what went wrong, and what should be done differently. They should be captured <strong>throughout the project</strong> — not just at closing — and stored in the organizational process assets." },

  // ===== SCOPE & SCHEDULE =====
  { cat: "Scope & Schedule", q: "What is a Work Breakdown Structure (WBS)?", a: "A <strong>hierarchical decomposition</strong> of the total scope of work into smaller, manageable components called <strong>work packages</strong>. The WBS organizes and defines the total scope of the project and is a key deliverable of scope planning." },
  { cat: "Scope & Schedule", q: "What is scope creep and how is it prevented?", a: "<strong>Scope creep</strong> is the uncontrolled expansion of project scope without adjustments to time, cost, or resources. It is prevented through a formal <strong>change control process</strong>, a clear scope statement, and stakeholder agreement on requirements." },
  { cat: "Scope & Schedule", q: "What is the Critical Path Method (CPM)?", a: "CPM identifies the <strong>longest sequence of dependent activities</strong> that determines the minimum project duration. Activities on the critical path have <strong>zero float</strong> — any delay directly delays the project finish date." },
  { cat: "Scope & Schedule", q: "What is float (slack) in project scheduling?", a: "<strong>Float</strong> is the amount of time an activity can be delayed without delaying the project finish date. <strong>Free float</strong> is the delay possible without affecting the next activity. Activities on the critical path have <strong>zero total float</strong>." },
  { cat: "Scope & Schedule", q: "What is a Gantt chart?", a: "A <strong>horizontal bar chart</strong> that visually displays the project schedule. Each bar represents an activity, showing its <strong>start date, end date, and duration</strong>. Dependencies between tasks can also be shown with connecting arrows." },
  { cat: "Scope & Schedule", q: "What is PERT estimation?", a: "PERT uses three estimates to calculate expected duration: <strong>Optimistic (O)</strong>, <strong>Most Likely (M)</strong>, and <strong>Pessimistic (P)</strong>. The formula is <span class='tag'>(O + 4M + P) / 6</span>. It accounts for uncertainty by weighting the most likely estimate." },
  { cat: "Scope & Schedule", q: "What is an Activity-on-Node (AON) network diagram?", a: "A diagram where <strong>nodes represent activities</strong> and arrows represent dependencies. It is used to determine the critical path, calculate float, and visualize the <strong>sequence and relationships</strong> between project activities." },

  // ===== RISK MANAGEMENT =====
  { cat: "Risk Management", q: "What is a risk register?", a: "A document that records <strong>identified risks</strong>, their probability, impact, risk score, response strategies, owners, and status. It is a <strong>living document</strong> updated throughout the project as new risks emerge or existing risks change." },
  { cat: "Risk Management", q: "What is a risk probability and impact matrix?", a: "A grid that plots each risk's <strong>likelihood of occurrence</strong> against its <strong>potential impact</strong> on project objectives. Risks are categorized as high, medium, or low priority to focus response planning on the most critical threats." },
  { cat: "Risk Management", q: "What is the difference between qualitative and quantitative risk analysis?", a: "<strong>Qualitative</strong> – subjective assessment using probability/impact scales to prioritize risks<br><strong>Quantitative</strong> – numerical analysis (Monte Carlo simulation, decision trees, EMV) to model the overall effect of risks on project objectives" },
  { cat: "Risk Management", q: "What are the four negative risk response strategies?", a: "<strong>Avoid</strong> – eliminate the threat entirely by changing the plan<br><strong>Transfer</strong> – shift impact to a third party (insurance, contracts)<br><strong>Mitigate</strong> – reduce probability or impact<br><strong>Accept</strong> – acknowledge the risk without action (active or passive)" },
  { cat: "Risk Management", q: "What is Expected Monetary Value (EMV)?", a: "EMV is calculated as <span class='tag'>Probability x Impact</span> for each risk. It provides a <strong>quantitative dollar value</strong> representing the average outcome. Positive EMV represents opportunities; negative EMV represents threats." },
  { cat: "Risk Management", q: "What is a risk owner?", a: "A <strong>risk owner</strong> is the person assigned responsibility for monitoring and implementing the response plan for a specific risk. They track the risk status and ensure the response strategy is executed when triggered." },

  // ===== AGILE & SCRUM =====
  { cat: "Agile & Scrum", q: "What are the four values of the Agile Manifesto?", a: "<strong>Individuals and interactions</strong> over processes and tools<br><strong>Working software</strong> over comprehensive documentation<br><strong>Customer collaboration</strong> over contract negotiation<br><strong>Responding to change</strong> over following a plan" },
  { cat: "Agile & Scrum", q: "What are the three Scrum roles?", a: "<strong>Product Owner</strong> – maximizes value by managing the product backlog<br><strong>Scrum Master</strong> – serves the team by removing impediments and facilitating Scrum events<br><strong>Development Team</strong> – self-organizing, cross-functional group that delivers increments" },
  { cat: "Agile & Scrum", q: "What is a sprint in Scrum?", a: "A <strong>time-boxed iteration</strong> (typically 1–4 weeks) during which the team creates a potentially shippable product increment. Sprints have a consistent duration and include planning, daily standups, a review, and a retrospective." },
  { cat: "Agile & Scrum", q: "What is the product backlog vs. sprint backlog?", a: "<strong>Product backlog</strong> – an ordered list of everything needed in the product, owned by the Product Owner<br><strong>Sprint backlog</strong> – the subset of product backlog items selected for the current sprint plus the plan to deliver them, owned by the Development Team" },
  { cat: "Agile & Scrum", q: "What are velocity and burndown charts?", a: "<strong>Velocity</strong> is the amount of work a team completes per sprint (measured in story points or hours). A <strong>burndown chart</strong> tracks remaining work over time, showing whether the team is on pace to complete the sprint." },
  { cat: "Agile & Scrum", q: "What is Kanban?", a: "<strong>Kanban</strong> is a visual workflow management method using a board with columns (To Do, In Progress, Done). It emphasizes <strong>limiting work in progress (WIP)</strong>, continuous flow, and pull-based scheduling rather than time-boxed sprints." },
  { cat: "Agile & Scrum", q: "What is SAFe (Scaled Agile Framework)?", a: "<strong>SAFe</strong> scales Agile practices to the enterprise level. It organizes teams into <strong>Agile Release Trains (ARTs)</strong> that plan and deliver together in Program Increments. It combines Lean, Agile, and DevOps principles for large organizations." },

  // ===== STAKEHOLDERS & COMMUNICATION =====
  { cat: "Stakeholders & Communication", q: "What is a stakeholder register?", a: "A document listing all identified stakeholders with their <strong>interests, influence, impact, and classification</strong>. It helps the project manager develop appropriate engagement and communication strategies for each stakeholder." },
  { cat: "Stakeholders & Communication", q: "What is a RACI matrix?", a: "A responsibility assignment matrix defining roles for each task: <strong>R</strong>esponsible (does the work), <strong>A</strong>ccountable (approves/owns), <strong>C</strong>onsulted (provides input), <strong>I</strong>nformed (kept updated). Each task should have exactly <strong>one A</strong>." },
  { cat: "Stakeholders & Communication", q: "What should a communication plan include?", a: "A communication plan defines <strong>what information</strong> is communicated, <strong>to whom</strong>, <strong>how often</strong>, through <strong>what method</strong>, and <strong>who is responsible</strong>. It ensures stakeholders receive the right information at the right time to support project decisions." },
  { cat: "Stakeholders & Communication", q: "What is the stakeholder power/interest grid?", a: "A matrix classifying stakeholders by their <strong>level of power</strong> and <strong>level of interest</strong>:<br><strong>High power/High interest</strong> – Manage closely<br><strong>High power/Low interest</strong> – Keep satisfied<br><strong>Low power/High interest</strong> – Keep informed<br><strong>Low power/Low interest</strong> – Monitor" },
  { cat: "Stakeholders & Communication", q: "How do you calculate communication channels?", a: "The formula is <span class='tag'>n(n-1)/2</span> where n is the number of stakeholders. For example, with 10 stakeholders there are <strong>45 communication channels</strong>. This shows why communication management becomes more complex as team size grows." },

  // ===== COST & QUALITY =====
  { cat: "Cost & Quality", q: "What is Earned Value Management (EVM)?", a: "EVM integrates scope, schedule, and cost to measure project performance. The three key values are:<br><strong>PV</strong> (Planned Value) – budgeted cost of planned work<br><strong>EV</strong> (Earned Value) – budgeted cost of completed work<br><strong>AC</strong> (Actual Cost) – actual cost of completed work" },
  { cat: "Cost & Quality", q: "What are CPI and SPI in EVM?", a: "<strong>CPI</strong> (Cost Performance Index) = <span class='tag'>EV / AC</span> — measures cost efficiency (>1 = under budget)<br><strong>SPI</strong> (Schedule Performance Index) = <span class='tag'>EV / PV</span> — measures schedule efficiency (>1 = ahead of schedule)<br>Values below 1.0 indicate the project is over budget or behind schedule." },
  { cat: "Cost & Quality", q: "What is the difference between QA and QC?", a: "<strong>Quality Assurance (QA)</strong> is a <strong>proactive, process-oriented</strong> approach that prevents defects by improving processes. <strong>Quality Control (QC)</strong> is a <strong>reactive, product-oriented</strong> approach that identifies defects through inspection and testing of deliverables." },
  { cat: "Cost & Quality", q: "What is cost of quality?", a: "Cost of quality includes: <strong>Prevention costs</strong> (training, planning) + <strong>Appraisal costs</strong> (inspection, testing) = <strong>Cost of Conformance</strong>. <strong>Internal failure costs</strong> (rework, scrap) + <strong>External failure costs</strong> (warranty, liability) = <strong>Cost of Non-Conformance</strong>." },
  { cat: "Cost & Quality", q: "What is integrated change control?", a: "A process that reviews all <strong>change requests</strong>, evaluates their impact on scope, schedule, cost, and quality, and approves or rejects them. All changes go through the <strong>Change Control Board (CCB)</strong> and are documented in the change log." },
  { cat: "Cost & Quality", q: "What are the types of cost estimates?", a: "<strong>Rough Order of Magnitude (ROM)</strong> – early estimate, -25% to +75% accuracy<br><strong>Budget Estimate</strong> – planning phase, -10% to +25%<br><strong>Definitive Estimate</strong> – detailed planning, -5% to +10%<br>Accuracy improves as more project information becomes available." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
