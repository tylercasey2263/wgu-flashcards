<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D325 – Networks Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D325</div>
    <h1>Networks</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== ROUTING =====
  { cat: "Routing", q: "What is the difference between static routing and dynamic routing?", a: "<strong>Static routing</strong> uses manually configured routes that do not change unless an administrator updates them. <strong>Dynamic routing</strong> uses protocols (RIP, OSPF, EIGRP, BGP) to automatically discover and update routes based on network topology changes. Static is simpler but does not scale well." },
  { cat: "Routing", q: "How do RIP, OSPF, EIGRP, and BGP compare as routing protocols?", a: "<table class='algo-table'><tr><th>Protocol</th><th>Type</th><th>Metric</th><th>Max Hops</th></tr><tr><td>RIP</td><td>Distance Vector</td><td>Hop count</td><td>15</td></tr><tr><td>OSPF</td><td>Link State</td><td>Cost (bandwidth)</td><td>None</td></tr><tr><td>EIGRP</td><td>Advanced Distance Vector</td><td>Composite (bandwidth, delay)</td><td>255</td></tr><tr><td>BGP</td><td>Path Vector</td><td>AS path attributes</td><td>None</td></tr></table>" },
  { cat: "Routing", q: "What is a routing table and what key information does it contain?", a: "A <strong>routing table</strong> is a data structure in a router that stores the best paths to destination networks. It contains the <strong>destination network/subnet</strong>, <strong>next-hop IP address</strong>, <strong>outgoing interface</strong>, <strong>metric</strong> (cost), and <strong>administrative distance</strong>. Routes can be learned statically, dynamically, or be directly connected." },
  { cat: "Routing", q: "What is administrative distance (AD) and which protocols have the lowest AD?", a: "<strong>Administrative distance</strong> is a value that ranks the trustworthiness of routing sources. Lower AD is preferred.<br><strong>Directly connected</strong> – <span class='tag'>AD 0</span><br><strong>Static route</strong> – <span class='tag'>AD 1</span><br><strong>EIGRP</strong> – <span class='tag'>AD 90</span><br><strong>OSPF</strong> – <span class='tag'>AD 110</span><br><strong>RIP</strong> – <span class='tag'>AD 120</span>" },
  { cat: "Routing", q: "What is the difference between interior and exterior gateway protocols?", a: "<strong>Interior Gateway Protocols (IGPs)</strong> route within a single autonomous system (e.g., <strong>OSPF</strong>, <strong>EIGRP</strong>, <strong>RIP</strong>). <strong>Exterior Gateway Protocols (EGPs)</strong> route between autonomous systems. <strong>BGP</strong> is the only EGP in use today and is the protocol that connects internet service providers." },
  { cat: "Routing", q: "What does OSPF use to build its routing table?", a: "<strong>OSPF (Open Shortest Path First)</strong> uses <strong>link-state advertisements (LSAs)</strong> to build a complete topology map of the network called the <strong>Link-State Database (LSDB)</strong>. It then runs <strong>Dijkstra's SPF algorithm</strong> to calculate the shortest path to each destination. OSPF uses <strong>cost based on bandwidth</strong> as its metric." },
  // ===== SWITCHING =====
  { cat: "Switching", q: "What is STP (Spanning Tree Protocol) and why is it needed?", a: "<strong>STP (802.1D)</strong> prevents Layer 2 switching loops by placing redundant ports in a blocking state. Without STP, broadcast frames would loop endlessly, causing <strong>broadcast storms</strong>, MAC table instability, and network failure. STP elects a <strong>root bridge</strong> and calculates loop-free paths." },
  { cat: "Switching", q: "What are the STP port states?", a: "<strong>Blocking</strong> – does not forward frames, listens for BPDUs only<br><strong>Listening</strong> – processes BPDUs to determine topology, no frame forwarding<br><strong>Learning</strong> – builds MAC address table, no frame forwarding<br><strong>Forwarding</strong> – fully operational, forwards frames and learns MACs<br><strong>Disabled</strong> – administratively shut down" },
  { cat: "Switching", q: "How does a switch build and use a MAC address table?", a: "A <strong>switch</strong> learns MAC addresses by examining the source MAC of incoming frames and recording the MAC-to-port mapping in its <strong>MAC address table (CAM table)</strong>. When forwarding, it looks up the destination MAC. If found, it forwards to that port (<strong>unicast</strong>); if unknown, it <strong>floods</strong> the frame out all ports except the source." },
  { cat: "Switching", q: "What are the differences between Cat5e, Cat6, Cat6a, and fiber optic cable?", a: "<table class='algo-table'><tr><th>Cable</th><th>Speed</th><th>Max Distance</th></tr><tr><td>Cat5e</td><td>1 Gbps</td><td>100m</td></tr><tr><td>Cat6</td><td>10 Gbps (55m)</td><td>100m</td></tr><tr><td>Cat6a</td><td>10 Gbps</td><td>100m</td></tr><tr><td>Single-mode fiber</td><td>10+ Gbps</td><td>Up to 80 km</td></tr><tr><td>Multi-mode fiber</td><td>10+ Gbps</td><td>Up to 550m</td></tr></table>" },
  // ===== VLANs =====
  { cat: "VLANs", q: "What is a VLAN and why is it used?", a: "A <strong>VLAN (Virtual Local Area Network)</strong> logically segments a single physical switch into multiple broadcast domains. VLANs improve <strong>security</strong> by isolating traffic, reduce <strong>broadcast traffic</strong>, and allow flexible network design without rewiring. Devices in different VLANs cannot communicate without a Layer 3 device." },
  { cat: "VLANs", q: "What is a trunk port and what protocol does it use?", a: "A <strong>trunk port</strong> carries traffic for multiple VLANs between switches. It uses <strong>802.1Q</strong> tagging to insert a VLAN ID tag into each Ethernet frame so the receiving switch knows which VLAN the frame belongs to. The <strong>native VLAN</strong> carries untagged traffic (default VLAN 1)." },
  { cat: "VLANs", q: "What is inter-VLAN routing and how is it implemented?", a: "<strong>Inter-VLAN routing</strong> allows communication between different VLANs using a Layer 3 device. The most common method is <strong>router-on-a-stick</strong>, where a single router interface uses subinterfaces with 802.1Q encapsulation. Alternatively, a <strong>Layer 3 switch</strong> can route between VLANs using SVIs (Switched Virtual Interfaces)." },
  { cat: "VLANs", q: "What is the difference between an access port and a trunk port?", a: "An <strong>access port</strong> belongs to a single VLAN and connects end devices like PCs and printers. It does not tag frames. A <strong>trunk port</strong> carries traffic for multiple VLANs between switches and tags frames with 802.1Q VLAN IDs to maintain VLAN separation." },
  // ===== WAN TECHNOLOGIES =====
  { cat: "WAN Technologies", q: "What are common WAN connection types?", a: "<strong>MPLS</strong> – label-switched paths, provider-managed, reliable<br><strong>Metro Ethernet</strong> – Ethernet-based WAN, scalable<br><strong>Leased Line</strong> – dedicated point-to-point, expensive<br><strong>DSL</strong> – uses phone lines, asymmetric speeds<br><strong>Cable</strong> – uses coaxial, shared bandwidth<br><strong>SD-WAN</strong> – software-defined, uses multiple links intelligently" },
  { cat: "WAN Technologies", q: "What is SD-WAN and how does it differ from traditional WAN?", a: "<strong>SD-WAN (Software-Defined WAN)</strong> uses software to manage multiple WAN connections (MPLS, broadband, LTE) and intelligently routes traffic based on application requirements. Unlike traditional WAN, it provides <strong>centralized management</strong>, <strong>lower cost</strong>, and <strong>application-aware routing</strong> without requiring expensive dedicated circuits." },
  { cat: "WAN Technologies", q: "What is NAT and what are its three types?", a: "<strong>NAT (Network Address Translation)</strong> translates private IP addresses to public addresses for internet access.<br><strong>Static NAT</strong> – one-to-one mapping (private to public)<br><strong>Dynamic NAT</strong> – maps to a pool of public IPs<br><strong>PAT (Port Address Translation)</strong> – many-to-one, uses port numbers to distinguish sessions (most common)" },
  { cat: "WAN Technologies", q: "What is the difference between bandwidth, throughput, and latency?", a: "<strong>Bandwidth</strong> is the maximum theoretical data rate of a link (e.g., 1 Gbps). <strong>Throughput</strong> is the actual measured data rate achieved, which is always less than bandwidth due to overhead and congestion. <strong>Latency</strong> is the time delay for a packet to travel from source to destination, measured in milliseconds." },
  // ===== NETWORK SERVICES =====
  { cat: "Network Services", q: "What is a DHCP relay agent and why is it needed?", a: "A <strong>DHCP relay agent</strong> (ip helper-address) forwards DHCP broadcast requests from clients to a DHCP server on a different subnet. Since routers do not forward broadcasts by default, a relay agent is needed when the DHCP server is not on the same network segment as the clients." },
  { cat: "Network Services", q: "What are ACLs and how do standard and extended ACLs differ?", a: "<strong>ACLs (Access Control Lists)</strong> filter network traffic on routers.<br><strong>Standard ACLs</strong> – filter based on <strong>source IP only</strong>, placed close to the destination (numbered 1-99)<br><strong>Extended ACLs</strong> – filter based on <strong>source/destination IP, port, and protocol</strong>, placed close to the source (numbered 100-199)" },
  { cat: "Network Services", q: "What is QoS and why is it important?", a: "<strong>QoS (Quality of Service)</strong> is a set of techniques that prioritize certain types of network traffic to ensure performance. It is critical for <strong>latency-sensitive applications</strong> like VoIP and video conferencing. Key mechanisms include <strong>classification</strong>, <strong>marking</strong> (DSCP), <strong>queuing</strong>, and <strong>traffic shaping/policing</strong>." },
  { cat: "Network Services", q: "What is the difference between CDP and LLDP?", a: "<strong>CDP (Cisco Discovery Protocol)</strong> is a Cisco proprietary Layer 2 protocol that discovers directly connected Cisco devices. <strong>LLDP (Link Layer Discovery Protocol)</strong> is the vendor-neutral IEEE 802.1AB standard that performs the same function across all manufacturers. Both advertise device identity, capabilities, and interface information." },
  { cat: "Network Services", q: "What is SNMP and what are its components?", a: "<strong>SNMP (Simple Network Management Protocol)</strong> monitors and manages network devices. Components include the <strong>SNMP Manager</strong> (monitoring station), <strong>SNMP Agent</strong> (software on managed devices), and <strong>MIB (Management Information Base)</strong> (database of device objects). SNMPv3 adds <strong>authentication and encryption</strong>." },
  { cat: "Network Services", q: "What is NetFlow and how is it used?", a: "<strong>NetFlow</strong> is a Cisco protocol that collects IP traffic statistics as flows (source/dest IP, ports, protocol, bytes). It is used for <strong>traffic analysis</strong>, <strong>capacity planning</strong>, <strong>billing</strong>, and <strong>security monitoring</strong>. NetFlow data is exported to a <strong>flow collector</strong> for analysis and reporting." },
  // ===== TROUBLESHOOTING =====
  { cat: "Troubleshooting", q: "What is the bottom-up troubleshooting methodology using the OSI model?", a: "The <strong>bottom-up approach</strong> starts at Layer 1 (Physical) and works upward:<br><strong>L1</strong> – Check cables, link lights, power<br><strong>L2</strong> – Verify MAC addresses, switch ports, VLANs<br><strong>L3</strong> – Test IP addressing, routing, ping<br><strong>L4</strong> – Check port connectivity, firewall rules<br><strong>L5-7</strong> – Verify application, DNS, services" },
  { cat: "Troubleshooting", q: "What common tools are used for network troubleshooting?", a: "<strong>ping</strong> – tests connectivity (ICMP)<br><strong>traceroute/tracert</strong> – shows path to destination<br><strong>nslookup/dig</strong> – tests DNS resolution<br><strong>ipconfig/ifconfig</strong> – displays network configuration<br><strong>netstat</strong> – shows active connections and ports<br><strong>Wireshark</strong> – packet capture and analysis" },
  { cat: "Troubleshooting", q: "A user cannot access any websites but can ping IP addresses. What is the likely issue?", a: "The user has network connectivity but <strong>DNS resolution is failing</strong>. The user can reach hosts by IP, which confirms Layer 3 is working. Troubleshooting steps include checking the <strong>DNS server configuration</strong>, testing with <span class='tag'>nslookup</span>, and trying an alternate DNS server like <span class='tag'>8.8.8.8</span>." },
  { cat: "Troubleshooting", q: "What is a broadcast storm and how is it prevented?", a: "A <strong>broadcast storm</strong> occurs when broadcast frames loop endlessly in a switched network without loop prevention, consuming all bandwidth and causing network failure. It is prevented by <strong>STP (Spanning Tree Protocol)</strong>, which detects loops and places redundant ports in a blocking state." },
  // ===== NETWORK DESIGN =====
  { cat: "Network Design", q: "What are the main network topologies and their characteristics?", a: "<table class='algo-table'><tr><th>Topology</th><th>Description</th><th>Key Trait</th></tr><tr><td>Star</td><td>All nodes connect to central switch</td><td>Single point of failure at center</td></tr><tr><td>Mesh</td><td>Every node connects to every other</td><td>High redundancy, expensive</td></tr><tr><td>Ring</td><td>Nodes form a circular loop</td><td>Token passing, single failure breaks ring</td></tr><tr><td>Bus</td><td>Single shared backbone cable</td><td>Simple but collision-prone</td></tr></table>" },
  { cat: "Network Design", q: "What is the three-tier network architecture?", a: "The <strong>three-tier model</strong> organizes enterprise networks into:<br><strong>Access Layer</strong> – connects end devices (switches, wireless APs)<br><strong>Distribution Layer</strong> – aggregates access layer traffic, applies policies, inter-VLAN routing<br><strong>Core Layer</strong> – high-speed backbone, fast forwarding, no packet manipulation<br>This design provides scalability, redundancy, and easier management." },
  { cat: "Network Design", q: "What is the difference between a full mesh and a partial mesh topology?", a: "In a <strong>full mesh topology</strong>, every device is connected to every other device, providing maximum redundancy. The number of links required is <strong>n(n-1)/2</strong>. In a <strong>partial mesh</strong>, only some devices have redundant connections, balancing cost and reliability." },
  { cat: "Network Design", q: "What is PPP and where is it used?", a: "<strong>PPP (Point-to-Point Protocol)</strong> is a Layer 2 WAN protocol used to establish direct connections between two nodes over serial links. It supports <strong>authentication</strong> (PAP, CHAP), <strong>error detection</strong>, and <strong>multilink bundling</strong>. PPP is commonly used on dedicated leased lines and DSL connections." },
  { cat: "Network Design", q: "What is the purpose of subnetting a network?", a: "<strong>Subnetting</strong> divides a large network into smaller, more manageable subnetworks. Benefits include <strong>reduced broadcast domains</strong>, <strong>improved security</strong> through segmentation, <strong>efficient IP address utilization</strong>, and <strong>easier network management</strong>. Each subnet acts as its own broadcast domain." },
  { cat: "Network Design", q: "Given 192.168.10.0/26, how many subnets and hosts per subnet are available?", a: "A <span class='tag'>/26</span> subnet borrows 2 bits from a Class C /24, creating <strong>4 subnets</strong> (2^2). Each subnet has 6 host bits, giving <strong>62 usable hosts</strong> per subnet (2^6 - 2). The subnets are: <span class='tag'>192.168.10.0</span>, <span class='tag'>192.168.10.64</span>, <span class='tag'>192.168.10.128</span>, and <span class='tag'>192.168.10.192</span>." },
  { cat: "Routing", q: "What is the default gateway and why is it important?", a: "The <strong>default gateway</strong> is the IP address of the router interface on the local network that forwards traffic to other networks. If a device's destination is not on the local subnet, the packet is sent to the default gateway. Without it, devices can only communicate within their own subnet." },
  { cat: "Routing", q: "What is a floating static route?", a: "A <strong>floating static route</strong> is a static route configured with a higher administrative distance than the primary route. It acts as a <strong>backup route</strong> that is only used when the primary route (learned via dynamic routing) becomes unavailable. This provides simple failover redundancy." },
  { cat: "Switching", q: "What is Rapid Spanning Tree Protocol (RSTP) and how does it improve on STP?", a: "<strong>RSTP (802.1w)</strong> improves on STP by providing <strong>faster convergence</strong> (seconds versus 30-50 seconds for STP). RSTP defines new port roles (<strong>alternate</strong> and <strong>backup</strong>) and reduces port states from five to three (<strong>discarding</strong>, <strong>learning</strong>, <strong>forwarding</strong>). It is backward compatible with STP." },
  { cat: "VLANs", q: "What is a voice VLAN and why is it used?", a: "A <strong>voice VLAN</strong> is a dedicated VLAN for VoIP traffic, separate from the data VLAN. It ensures <strong>QoS prioritization</strong> for voice packets, reducing latency and jitter. A switch port can be configured with both an access VLAN (data) and a voice VLAN, allowing an IP phone and PC to share the same port." },
  { cat: "WAN Technologies", q: "What is MPLS and how does it work?", a: "<strong>MPLS (Multiprotocol Label Switching)</strong> routes traffic using short <strong>labels</strong> instead of long IP addresses, enabling fast forwarding decisions. Labels are assigned at the ingress router and stripped at the egress. MPLS supports <strong>traffic engineering</strong>, <strong>QoS</strong>, and <strong>VPNs</strong>. It operates between Layer 2 and Layer 3 (sometimes called Layer 2.5)." },
  { cat: "Troubleshooting", q: "What does the traceroute command reveal about network paths?", a: "<strong>Traceroute</strong> (tracert on Windows) shows every router hop between the source and destination by sending packets with incrementing <strong>TTL values</strong>. Each hop responds with an ICMP Time Exceeded message. It reveals <strong>the path taken</strong>, <strong>round-trip time per hop</strong>, and helps identify where latency or failures occur in the network." },
  { cat: "Network Services", q: "What is the difference between syslog and SNMP for network monitoring?", a: "<strong>Syslog</strong> collects and stores log messages from network devices in a centralized server for event recording and troubleshooting. <strong>SNMP</strong> actively queries devices for status information (polling) and receives alerts (traps). Syslog is <strong>event-driven</strong> and passive, while SNMP provides <strong>real-time performance metrics</strong> and device management." },
  { cat: "Network Design", q: "What is the collapsed core (two-tier) network architecture?", a: "The <strong>collapsed core</strong> model combines the core and distribution layers into a single layer, reducing cost and complexity. It uses a <strong>collapsed core switch</strong> that performs both high-speed forwarding and policy enforcement. This design is suitable for <strong>smaller networks</strong> that do not require the scalability of a full three-tier architecture." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
