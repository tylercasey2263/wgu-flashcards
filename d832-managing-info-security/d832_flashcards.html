<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D832 – Managing Information Security Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D832</div>
    <h1>Managing Information Security</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== SECURITY GOVERNANCE =====
  { cat: "Security Governance", q: "What is information security governance?", a: "The system by which an organization's <strong>security activities are directed and controlled</strong>. It ensures security strategy aligns with business objectives and includes roles for the <strong>board of directors, executive leadership, and CISO</strong>." },
  { cat: "Security Governance", q: "What is the role of the CISO?", a: "The <strong>Chief Information Security Officer</strong> leads the information security program. Responsibilities include developing <strong>security strategy</strong>, managing risk, ensuring compliance, reporting to executive leadership, and overseeing incident response and security operations." },
  { cat: "Security Governance", q: "What is the board of directors' role in security governance?", a: "The board provides <strong>oversight and strategic direction</strong> for security. They approve security policy, ensure adequate funding, review risk reports, and hold management accountable for maintaining an effective security program aligned with <strong>business risk appetite</strong>." },
  { cat: "Security Governance", q: "What is security program management?", a: "The ongoing process of <strong>planning, implementing, and maintaining</strong> the organization's security controls and initiatives. It includes setting objectives, allocating resources, measuring effectiveness through <strong>metrics</strong>, and continuously improving the security posture." },
  { cat: "Security Governance", q: "What are security metrics and why do they matter?", a: "Security metrics are <strong>quantifiable measurements</strong> of security program effectiveness. Examples include patch compliance rate, MTTD/MTTR, and incident volume. They enable <strong>data-driven decisions</strong>, justify budgets, and demonstrate program maturity to leadership." },
  { cat: "Security Governance", q: "What is due diligence vs. due care in security?", a: "<strong>Due diligence</strong> is the research and assessment done to understand risks (knowing what should be done). <strong>Due care</strong> is taking reasonable steps to address those risks (actually doing it). Both are required to demonstrate <strong>legal responsibility</strong>." },

  // ===== RISK MANAGEMENT =====
  { cat: "Risk Management", q: "What is quantitative risk analysis in security?", a: "A method using <strong>numerical values</strong> to calculate risk exposure. Key formulas:<br><span class='tag'>SLE = Asset Value x EF</span><br><span class='tag'>ALE = SLE x ARO</span><br>Where <strong>SLE</strong> = Single Loss Expectancy, <strong>EF</strong> = Exposure Factor, <strong>ARO</strong> = Annualized Rate of Occurrence." },
  { cat: "Risk Management", q: "What is qualitative risk assessment?", a: "A <strong>subjective method</strong> that uses categories (high/medium/low) rather than dollar amounts to assess risk. It uses expert judgment, surveys, and scenarios to rank risks. It is faster but less precise than <strong>quantitative analysis</strong>." },
  { cat: "Risk Management", q: "What is risk appetite vs. risk tolerance?", a: "<strong>Risk appetite</strong> is the <strong>level and type of risk</strong> an organization is willing to accept in pursuit of objectives (strategic). <strong>Risk tolerance</strong> is the <strong>acceptable variation</strong> from the risk appetite for specific risks (operational, more granular)." },
  { cat: "Risk Management", q: "What are the four risk treatment options?", a: "<strong>Accept</strong> – acknowledge the risk and take no further action<br><strong>Mitigate</strong> – implement controls to reduce likelihood or impact<br><strong>Transfer</strong> – shift risk to a third party (insurance, outsourcing)<br><strong>Avoid</strong> – eliminate the risk by removing the cause" },
  { cat: "Risk Management", q: "What is residual risk?", a: "<strong>Residual risk</strong> is the risk that remains <strong>after controls are applied</strong>. No control eliminates risk entirely. Organizations must ensure residual risk falls within the <strong>risk tolerance</strong> level. If it exceeds tolerance, additional controls are needed." },
  { cat: "Risk Management", q: "What is a risk register in security?", a: "A centralized document listing <strong>identified risks, risk owners, likelihood, impact, risk score, current controls, and treatment plans</strong>. It serves as the primary tracking tool for the risk management program and is reviewed and updated regularly." },

  // ===== SECURITY POLICY =====
  { cat: "Security Policy", q: "What is the security policy hierarchy?", a: "<strong>Policies</strong> – high-level, mandatory statements approved by management<br><strong>Standards</strong> – specific mandatory requirements<br><strong>Baselines</strong> – minimum security configurations<br><strong>Guidelines</strong> – recommended best practices (not mandatory)<br><strong>Procedures</strong> – step-by-step instructions for tasks" },
  { cat: "Security Policy", q: "What is the purpose of a security awareness training program?", a: "To educate employees on <strong>security threats, policies, and best practices</strong> so they can recognize and respond to risks. Effective programs reduce <strong>human error</strong> — the leading cause of security breaches — and create a security-conscious culture." },
  { cat: "Security Policy", q: "What is data classification?", a: "The process of categorizing data based on its <strong>sensitivity and value</strong> to the organization. Common levels include <strong>Public, Internal, Confidential, and Restricted</strong>. Classification determines the required handling, storage, and access controls for each data type." },
  { cat: "Security Policy", q: "What is an acceptable use policy (AUP)?", a: "A policy that defines <strong>permitted and prohibited uses</strong> of organizational IT resources. It covers email, internet, devices, and data handling. Users typically must <strong>sign the AUP</strong> to acknowledge understanding and agreement." },
  { cat: "Security Policy", q: "What are data handling procedures?", a: "Step-by-step instructions for how data should be <strong>created, stored, transmitted, and destroyed</strong> based on its classification level. They specify required <strong>encryption, access controls, labeling, retention periods</strong>, and secure disposal methods." },

  // ===== BCP & DRP =====
  { cat: "BCP & DRP", q: "What are the phases of Business Continuity Planning?", a: "<strong>1)</strong> Project initiation and management<br><strong>2)</strong> Business Impact Analysis (BIA)<br><strong>3)</strong> Recovery strategy development<br><strong>4)</strong> Plan development and implementation<br><strong>5)</strong> Testing and exercises<br><strong>6)</strong> Ongoing maintenance and review" },
  { cat: "BCP & DRP", q: "What is a Business Impact Analysis (BIA)?", a: "A process that identifies <strong>critical business functions</strong> and quantifies the impact of their disruption. It determines <strong>RTO, RPO, and MTPD</strong> for each function and prioritizes recovery efforts based on business impact." },
  { cat: "BCP & DRP", q: "What is the difference between RTO, RPO, MTTR, and MTBF?", a: "<table class='algo-table'><tr><th>Metric</th><th>Definition</th></tr><tr><td><strong>RTO</strong></td><td>Maximum time to restore a function after disruption</td></tr><tr><td><strong>RPO</strong></td><td>Maximum acceptable data loss measured in time</td></tr><tr><td><strong>MTTR</strong></td><td>Average time to repair a failed component</td></tr><tr><td><strong>MTBF</strong></td><td>Average time between failures of a system</td></tr></table>" },
  { cat: "BCP & DRP", q: "What are hot, warm, and cold disaster recovery sites?", a: "<strong>Hot site</strong> – fully equipped, real-time data replication, immediate failover (most expensive)<br><strong>Warm site</strong> – partially equipped, needs data restoration, hours to days recovery<br><strong>Cold site</strong> – empty facility, all equipment must be installed, days to weeks recovery (least expensive)" },
  { cat: "BCP & DRP", q: "What are the types of BCP/DRP testing exercises?", a: "<strong>Tabletop</strong> – discussion-based walkthrough of scenarios<br><strong>Walkthrough</strong> – team members review their roles and procedures step by step<br><strong>Simulation</strong> – practice response to a simulated event<br><strong>Parallel</strong> – activate alternate site while primary runs<br><strong>Full interruption</strong> – shut down primary and switch to alternate" },
  { cat: "BCP & DRP", q: "Why must BCP/DRP plans be maintained regularly?", a: "Plans become <strong>outdated</strong> as systems, personnel, and business processes change. Regular maintenance ensures <strong>contact lists, recovery procedures, and technology</strong> are current. Plans should be reviewed at least annually and after any significant organizational change." },

  // ===== SECURITY FRAMEWORKS =====
  { cat: "Security Frameworks", q: "What is ISO 27001?", a: "An <strong>international standard</strong> for establishing, implementing, maintaining, and continually improving an Information Security Management System (ISMS). It uses a <strong>risk-based approach</strong> and is the basis for formal certification of an organization's security program." },
  { cat: "Security Frameworks", q: "What is ISO 27002?", a: "A <strong>supplementary standard</strong> to ISO 27001 that provides detailed <strong>implementation guidance</strong> for security controls. It covers areas like access control, cryptography, physical security, and incident management. It is a <strong>code of practice</strong>, not a certification standard." },
  { cat: "Security Frameworks", q: "What is NIST SP 800-53?", a: "A catalog of <strong>security and privacy controls</strong> for federal information systems organized into families (Access Control, Audit, etc.). It provides a comprehensive set of <strong>safeguards and countermeasures</strong> that can be tailored to an organization's risk profile." },
  { cat: "Security Frameworks", q: "What is the NIST Risk Management Framework (SP 800-37)?", a: "A six-step process for managing security risk:<br><strong>1)</strong> Categorize the system<br><strong>2)</strong> Select controls<br><strong>3)</strong> Implement controls<br><strong>4)</strong> Assess controls<br><strong>5)</strong> Authorize the system<br><strong>6)</strong> Monitor controls continuously" },
  { cat: "Security Frameworks", q: "What is COBIT?", a: "<strong>COBIT</strong> (Control Objectives for Information and Related Technologies) is a governance framework for <strong>IT management and governance</strong>. It aligns IT with business goals, manages risk, and ensures regulatory compliance through defined processes and maturity models." },
  { cat: "Security Frameworks", q: "What are SOC 1, SOC 2, and SOC 3 reports?", a: "<strong>SOC 1</strong> – focuses on controls relevant to <strong>financial reporting</strong> (ICFR)<br><strong>SOC 2</strong> – evaluates controls for <strong>security, availability, processing integrity, confidentiality, and privacy</strong> (Trust Services Criteria)<br><strong>SOC 3</strong> – a general-use summary of SOC 2 for public distribution" },

  // ===== PERSONNEL SECURITY =====
  { cat: "Personnel Security", q: "What is separation of duties?", a: "A control that <strong>divides critical tasks</strong> among multiple people so no single individual can complete a sensitive action alone. It prevents <strong>fraud and errors</strong> by requiring collusion to circumvent controls (e.g., separating authorization from payment)." },
  { cat: "Personnel Security", q: "Why are mandatory vacations a security control?", a: "<strong>Mandatory vacations</strong> force employees to be away from their duties, allowing others to perform their tasks. This helps <strong>detect fraud, embezzlement, or policy violations</strong> that the employee may have been concealing through continuous presence." },
  { cat: "Personnel Security", q: "What is job rotation and its security benefit?", a: "<strong>Job rotation</strong> periodically moves employees between roles. It reduces the risk of <strong>fraud and collusion</strong>, cross-trains staff for resilience, and limits how long any one person has exclusive control over a critical function." },
  { cat: "Personnel Security", q: "What is an insider threat program?", a: "A program designed to <strong>detect, deter, and respond</strong> to threats from employees, contractors, or partners. It includes behavioral monitoring, access controls, <strong>user activity monitoring</strong>, reporting mechanisms, and awareness training to identify warning signs." },
  { cat: "Personnel Security", q: "What role do background checks play in personnel security?", a: "Background checks verify a candidate's <strong>identity, criminal history, education, and employment history</strong> before granting access. They are a <strong>preventive control</strong> that reduces the risk of hiring individuals who may pose a security threat to the organization." },

  // ===== VENDOR & THIRD-PARTY =====
  { cat: "Vendor & Third-Party", q: "What is third-party risk management?", a: "The process of <strong>identifying, assessing, and mitigating risks</strong> introduced by vendors, suppliers, and partners who have access to organizational data or systems. It includes due diligence, contract requirements, ongoing monitoring, and <strong>right-to-audit clauses</strong>." },
  { cat: "Vendor & Third-Party", q: "What is a vendor risk assessment?", a: "An evaluation of a vendor's <strong>security posture, financial stability, and compliance</strong> before and during the engagement. Methods include questionnaires, on-site audits, reviewing <strong>SOC reports</strong>, and evaluating their security certifications and incident history." },
  { cat: "Vendor & Third-Party", q: "What should security requirements in vendor contracts include?", a: "Contracts should specify <strong>data protection obligations, breach notification timelines, right-to-audit clauses, compliance requirements</strong>, security SLAs, incident response responsibilities, data return/destruction at termination, and <strong>liability provisions</strong>." },
  { cat: "Vendor & Third-Party", q: "What is supply chain risk in information security?", a: "<strong>Supply chain risk</strong> arises when third-party products or services introduce vulnerabilities. Examples include compromised software updates, counterfeit hardware, and insecure development practices. Organizations must assess and monitor <strong>the entire supply chain</strong> for threats." },
  { cat: "Vendor & Third-Party", q: "What is a service level agreement (SLA) in security?", a: "An <strong>SLA</strong> defines the expected level of security service a vendor must provide. It includes <strong>uptime guarantees, response times, incident notification requirements</strong>, and penalties for non-compliance. SLAs are legally enforceable parts of vendor contracts." },
  { cat: "Security Governance", q: "What is the difference between security strategy and security operations?", a: "<strong>Security strategy</strong> defines long-term goals, risk appetite, and resource allocation aligned with business objectives. <strong>Security operations</strong> handles the day-to-day execution — monitoring, incident response, and vulnerability management. Strategy guides operations; operations inform strategy through <strong>metrics and lessons learned</strong>." },
  { cat: "Risk Management", q: "What is a risk assessment methodology?", a: "A structured approach for evaluating risks that includes <strong>asset identification, threat identification, vulnerability assessment, likelihood analysis, and impact analysis</strong>. Common methodologies include NIST SP 800-30, OCTAVE, and FAIR. The chosen methodology must be consistent and repeatable." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
