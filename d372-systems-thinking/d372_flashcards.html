<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D372 – Introduction to Systems Thinking Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D372</div>
    <h1>Introduction to Systems Thinking</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== SYSTEMS FUNDAMENTALS =====
  { cat: "Systems Fundamentals", q: "What is a system in systems thinking?", a: "A <strong>system</strong> is an interconnected set of elements organized to achieve a purpose. Every system has three key parts: <strong>elements</strong> (components), <strong>interconnections</strong> (relationships and flows between elements), and a <strong>function or purpose</strong> (the overall goal the system achieves)." },
  { cat: "Systems Fundamentals", q: "What are emergent properties?", a: "<strong>Emergent properties</strong> are characteristics that arise from the interactions of a system's parts but cannot be found in any individual component. For example, consciousness emerges from neurons, or traffic jams emerge from individual drivers. The whole is <strong>greater than the sum of its parts</strong>." },
  { cat: "Systems Fundamentals", q: "What is the difference between linear and nonlinear thinking?", a: "<strong>Linear thinking</strong> assumes simple cause-and-effect chains where A causes B causes C. <strong>Nonlinear thinking</strong> recognizes that causes and effects are often <strong>circular</strong>, <strong>delayed</strong>, and <strong>disproportionate</strong> — small changes can have large effects, and large interventions can produce minimal results." },
  { cat: "Systems Fundamentals", q: "What is whole-system optimization?", a: "<strong>Whole-system optimization</strong> means improving the performance of the entire system rather than optimizing individual parts. Optimizing one subsystem in isolation can actually <strong>degrade overall performance</strong> — a concept called <strong>suboptimization</strong>. Systems thinkers focus on the system's purpose and overall behavior." },
  { cat: "Systems Fundamentals", q: "What is resilience in systems thinking?", a: "<strong>Resilience</strong> is a system's ability to survive and recover from disturbances while maintaining its essential function. Resilient systems have <strong>diversity</strong>, <strong>redundancy</strong>, and <strong>modularity</strong>. A resilient ecosystem, for example, can withstand disease because its biodiversity provides backup functions." },
  { cat: "Systems Fundamentals", q: "What is a boundary in systems thinking?", a: "A <strong>boundary</strong> defines what is inside the system and what is outside (the environment). Boundaries are often <strong>human-made distinctions</strong> rather than physical realities. Choosing where to draw a boundary affects what you see, what you measure, and what solutions you propose." },

  // ===== FEEDBACK LOOPS =====
  { cat: "Feedback Loops", q: "What is a reinforcing (positive) feedback loop?", a: "A <strong>reinforcing feedback loop</strong> amplifies change in the same direction — growth leads to more growth, or decline accelerates decline. Examples include compound interest, population growth, and viral social media posts. Reinforcing loops create <strong>exponential growth or collapse</strong> and are labeled with <strong>R</strong> in diagrams." },
  { cat: "Feedback Loops", q: "What is a balancing (negative) feedback loop?", a: "A <strong>balancing feedback loop</strong> seeks equilibrium by counteracting change. When the system moves away from a goal, the loop pushes it back. Examples include a thermostat maintaining room temperature or hunger driving you to eat. Balancing loops are labeled with <strong>B</strong> in diagrams." },
  { cat: "Feedback Loops", q: "How do delays affect feedback loops?", a: "<strong>Delays</strong> are time lags between an action and its observable effect. Delays in feedback loops can cause <strong>overshooting</strong> (going past the target) and <strong>oscillation</strong> (swinging back and forth around the goal). For example, adjusting a shower's temperature too aggressively because of the delay in hot water arriving." },
  { cat: "Feedback Loops", q: "What is a causal loop diagram (CLD)?", a: "A <strong>causal loop diagram</strong> maps the cause-and-effect relationships in a system using arrows. An arrow with a <strong>+</strong> means variables change in the same direction. An arrow with a <strong>-</strong> means they change in opposite directions. CLDs reveal <strong>reinforcing (R)</strong> and <strong>balancing (B)</strong> loops that drive system behavior." },
  { cat: "Feedback Loops", q: "Why are feedback loops important in systems thinking?", a: "Feedback loops are the <strong>engine of system behavior</strong>. They explain why systems grow, stabilize, oscillate, or collapse. Understanding feedback loops helps identify <strong>root causes</strong> rather than symptoms, predict <strong>unintended consequences</strong>, and find effective <strong>leverage points</strong> for intervention." },
  { cat: "Feedback Loops", q: "Give a real-world example of a reinforcing loop causing problems.", a: "A <strong>bank run</strong> is a destructive reinforcing loop: fear that a bank will fail causes people to withdraw money, which weakens the bank, which increases fear, which causes more withdrawals. Each cycle <strong>amplifies</strong> the previous one until the bank actually collapses — a self-fulfilling prophecy." },

  // ===== STOCKS & FLOWS =====
  { cat: "Stocks & Flows", q: "What is a stock in systems thinking?", a: "A <strong>stock</strong> is an accumulation — a quantity that can be measured at a point in time. It represents the <strong>memory</strong> of a system. Examples include water in a bathtub, money in a bank account, population of a city, or carbon dioxide in the atmosphere. Stocks change through <strong>inflows and outflows</strong>." },
  { cat: "Stocks & Flows", q: "What is a flow in systems thinking?", a: "A <strong>flow</strong> is a rate of change that fills or drains a stock over time. <strong>Inflows</strong> increase the stock (income, births, rainfall). <strong>Outflows</strong> decrease the stock (spending, deaths, evaporation). The stock's level at any time equals accumulated inflows minus accumulated outflows." },
  { cat: "Stocks & Flows", q: "How do stocks create stability in systems?", a: "Stocks act as <strong>buffers</strong> that absorb fluctuations, creating stability and providing time to respond. A water reservoir (stock) smooths out irregular rainfall (inflow) to provide steady supply (outflow). Stocks decouple inflows from outflows, allowing them to be <strong>temporarily independent</strong>." },
  { cat: "Stocks & Flows", q: "What is a stock-and-flow diagram?", a: "A <strong>stock-and-flow diagram</strong> is a visual tool showing stocks as rectangles (boxes), flows as arrows with valve symbols (rate controls), and clouds representing sources/sinks outside the system boundary. These diagrams help quantify system behavior and are the basis for <strong>computer simulation models</strong>." },
  { cat: "Stocks & Flows", q: "How does a stock reach dynamic equilibrium?", a: "A stock reaches <strong>dynamic equilibrium</strong> when its inflow rate equals its outflow rate — the level stays constant even though material continues to flow through. This is different from static equilibrium (no flows at all). For example, a bathtub at constant level with the faucet on and drain open equally." },

  // ===== COMPLEXITY =====
  { cat: "Complexity", q: "What is a complex adaptive system?", a: "A <strong>complex adaptive system (CAS)</strong> consists of many diverse, interconnected agents that <strong>learn and adapt</strong> their behavior based on experience. Examples include ecosystems, economies, and the immune system. CAS features include <strong>emergence</strong>, <strong>self-organization</strong>, <strong>adaptation</strong>, and <strong>nonlinear</strong> behavior." },
  { cat: "Complexity", q: "What are unintended consequences?", a: "<strong>Unintended consequences</strong> are unexpected outcomes of an action, often arising because the intervenor did not understand the full system. They can be <strong>positive</strong> (unexpected benefits), <strong>negative</strong> (making things worse), or <strong>perverse</strong> (opposite of intended). Systems thinking helps anticipate them by mapping feedback loops and delays." },
  { cat: "Complexity", q: "What is the difference between complicated and complex systems?", a: "A <strong>complicated</strong> system (like a jet engine) has many parts but is predictable — it can be understood by analyzing its components. A <strong>complex</strong> system (like a city or ecosystem) has agents that <strong>interact and adapt</strong>, producing emergent, often <strong>unpredictable</strong> behavior that cannot be understood by analyzing parts alone." },

  // ===== MENTAL MODELS =====
  { cat: "Mental Models", q: "What are mental models in systems thinking?", a: "<strong>Mental models</strong> are deeply held assumptions, beliefs, and generalizations that shape how we understand the world and take action. They act as internal <strong>filters</strong> that determine what we notice and ignore. Mental models are often <strong>unconscious</strong> and can limit our ability to see the full system." },
  { cat: "Mental Models", q: "Why are mental models important to examine?", a: "Unexamined mental models can lead to <strong>blind spots</strong> and <strong>flawed decisions</strong>. Two people can see the same data and reach different conclusions because of different mental models. Systems thinkers practice <strong>surfacing and testing</strong> their assumptions to improve understanding and avoid repeating ineffective strategies." },
  { cat: "Mental Models", q: "Who is Donella Meadows and why is she significant?", a: "<strong>Donella Meadows</strong> (1941-2001) was a pioneering environmental scientist and systems thinker. She co-authored <strong>The Limits to Growth</strong> (1972) and wrote <strong>Thinking in Systems: A Primer</strong>. She is famous for her influential essay on <strong>leverage points</strong> — places to intervene in a system ranked by effectiveness." },
  { cat: "Mental Models", q: "What is systems mapping?", a: "<strong>Systems mapping</strong> is a visual technique for representing the components, relationships, and dynamics of a system. Tools include <strong>causal loop diagrams</strong> (feedback structure), <strong>stock-and-flow diagrams</strong> (accumulations), <strong>iceberg models</strong> (visible events to underlying structures), and <strong>connection circles</strong> (relationships between variables)." },

  // ===== SYSTEMS ARCHETYPES =====
  { cat: "Systems Archetypes", q: "What is the 'Fixes That Fail' archetype?", a: "<strong>Fixes That Fail</strong> occurs when a quick fix solves the symptom but creates <strong>unintended consequences</strong> that worsen the original problem over time. Example: using pesticides kills pests (fix) but also kills natural predators (unintended consequence), leading to worse pest outbreaks later." },
  { cat: "Systems Archetypes", q: "What is the 'Shifting the Burden' archetype?", a: "<strong>Shifting the Burden</strong> occurs when a symptomatic solution is applied instead of addressing the fundamental cause. Over time, the fundamental solution <strong>atrophies</strong> from disuse while <strong>dependency</strong> on the symptomatic solution grows. Example: relying on painkillers instead of treating the underlying injury." },
  { cat: "Systems Archetypes", q: "What is the 'Limits to Growth' archetype?", a: "<strong>Limits to Growth</strong> occurs when a reinforcing growth process encounters a <strong>balancing constraint</strong> that slows or stops growth. Early success creates a reinforcing loop, but eventually a limit is reached. The solution is to identify and address the limiting factor <strong>before</strong> growth stalls. Example: a startup growing until it hits hiring capacity limits." },
  { cat: "Systems Archetypes", q: "What is the 'Tragedy of the Commons' archetype?", a: "The <strong>Tragedy of the Commons</strong> occurs when individuals use a shared resource for personal gain without regard for the collective impact. Each user benefits individually while the total use <strong>depletes</strong> the resource. Examples include overfishing, overgrazing, and groundwater depletion. Solutions involve regulation or shared governance." },
  { cat: "Systems Archetypes", q: "What is the 'Escalation' archetype?", a: "The <strong>Escalation</strong> archetype occurs when two parties each respond to the other's actions with increasingly aggressive countermoves. Each side perceives the other's action as a threat and responds more forcefully, creating a <strong>reinforcing loop</strong> of escalation. Examples include arms races and price wars." },
  { cat: "Systems Archetypes", q: "Why are systems archetypes useful?", a: "Systems archetypes are <strong>common patterns of behavior</strong> that recur across different domains. Recognizing an archetype helps you <strong>diagnose problems faster</strong>, predict future behavior, avoid common traps, and identify <strong>high-leverage interventions</strong>. They provide a shared language for discussing systemic issues." },

  // ===== APPLICATIONS =====
  { cat: "Applications", q: "What are leverage points in a system?", a: "<strong>Leverage points</strong> are places in a system where a small change can produce large effects. Donella Meadows ranked them from least to most effective: <strong>parameters</strong> (numbers), <strong>buffers</strong> (stock sizes), <strong>feedback loops</strong>, <strong>information flows</strong>, <strong>rules</strong>, <strong>self-organization</strong>, <strong>goals</strong>, and <strong>paradigms</strong> (mindsets)." },
  { cat: "Applications", q: "How is systems thinking applied in business?", a: "In business, systems thinking helps leaders understand <strong>organizational dynamics</strong>, identify <strong>root causes</strong> of recurring problems, and design better strategies. Applications include <strong>supply chain optimization</strong>, <strong>learning organizations</strong> (Peter Senge), <strong>change management</strong>, and avoiding short-term fixes that create long-term problems." },
  { cat: "Applications", q: "How is systems thinking applied to environmental issues?", a: "Systems thinking reveals how <strong>feedback loops</strong> drive environmental problems. Climate change involves reinforcing loops (ice melts, less reflection, more warming) and delayed effects. Solutions require understanding <strong>stocks</strong> (atmospheric CO2), <strong>flows</strong> (emissions vs. absorption), and <strong>leverage points</strong> (energy policy, paradigm shifts)." },
  { cat: "Applications", q: "What is the iceberg model in systems thinking?", a: "The <strong>iceberg model</strong> has four levels:<br><strong>Events</strong> — what happened (visible, reactive).<br><strong>Patterns</strong> — trends over time (adaptive).<br><strong>Structures</strong> — systems causing patterns (creative/redesign).<br><strong>Mental Models</strong> — beliefs driving structures (transformative).<br>Effective intervention targets the deeper levels, not just visible events." },
  { cat: "Applications", q: "How can systems thinking help avoid policy resistance?", a: "<strong>Policy resistance</strong> occurs when interventions are defeated by the system's response. It happens because actors in the system have their own goals and feedback loops. Systems thinking helps by <strong>mapping all stakeholder feedback loops</strong>, finding goals that align multiple actors, and designing policies that work <strong>with</strong> system dynamics rather than against them." },
  { cat: "Applications", q: "What does it mean to 'think in systems' rather than in events?", a: "Thinking in <strong>events</strong> is reactive — you respond to what just happened. Thinking in <strong>systems</strong> means looking for <strong>patterns</strong>, understanding the <strong>structures</strong> that produce those patterns, and examining the <strong>mental models</strong> that created those structures. This shift enables proactive, long-lasting solutions instead of short-term fixes." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
