<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D385 – Software Security and Testing Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D385</div>
    <h1>Software Security and Testing</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== SECURE CODING =====
  { cat: "Secure Coding", q: "What is input validation vs. input sanitization?", a: "<strong>Input validation</strong> checks that data meets expected format, type, and range before processing (reject bad input). <strong>Input sanitization</strong> cleans or transforms data to remove harmful content (modify bad input). Both should be applied — <strong>validate first, then sanitize</strong>." },
  { cat: "Secure Coding", q: "What is output encoding?", a: "<strong>Output encoding</strong> converts special characters into safe representations before rendering them in a specific context (HTML, URL, JavaScript). It prevents <strong>injection attacks</strong> by ensuring user input is treated as data, not executable code. Context determines the encoding method." },
  { cat: "Secure Coding", q: "What are secure HTTP headers?", a: "<strong>CSP</strong> (Content-Security-Policy) – restricts resource loading to prevent XSS<br><strong>HSTS</strong> – forces HTTPS connections<br><strong>X-Frame-Options</strong> – prevents clickjacking<br><strong>X-Content-Type-Options</strong> – prevents MIME sniffing<br>These headers add <strong>defense-in-depth</strong> at the transport layer." },
  { cat: "Secure Coding", q: "What is a buffer overflow?", a: "A <strong>buffer overflow</strong> occurs when a program writes data beyond the allocated memory buffer, overwriting adjacent memory. Attackers exploit this to <strong>inject malicious code or crash</strong> the application. Prevention includes bounds checking and using memory-safe languages." },
  { cat: "Secure Coding", q: "What are race conditions?", a: "A <strong>race condition</strong> occurs when the behavior of software depends on the <strong>timing or sequence</strong> of uncontrollable events (e.g., two threads accessing shared data). They create security vulnerabilities like <strong>TOCTOU</strong> (time-of-check to time-of-use) exploits." },
  { cat: "Secure Coding", q: "What is insecure deserialization?", a: "<strong>Insecure deserialization</strong> occurs when an application deserializes untrusted data without validation, allowing attackers to <strong>execute arbitrary code, escalate privileges, or tamper with data</strong>. Prevention includes integrity checks, type constraints, and avoiding native serialization formats." },
  { cat: "Secure Coding", q: "What is secrets management?", a: "The practice of <strong>securely storing and accessing</strong> credentials, API keys, tokens, and certificates. <strong>Never hardcode secrets</strong> in source code. Use environment variables, vault services (HashiCorp Vault, AWS Secrets Manager), and encrypted configuration files." },

  // ===== OWASP TOP 10 =====
  { cat: "OWASP Top 10", q: "What is the OWASP Top 10 (2021)?", a: "A regularly updated list of the <strong>most critical web application security risks</strong>:<br>1. Broken Access Control<br>2. Cryptographic Failures<br>3. Injection<br>4. Insecure Design<br>5. Security Misconfiguration<br>6. Vulnerable Components<br>7. Auth Failures<br>8. Software Integrity Failures<br>9. Logging Failures<br>10. SSRF" },
  { cat: "OWASP Top 10", q: "What is SQL injection and how is it prevented?", a: "<strong>SQL injection</strong> inserts malicious SQL through user input to manipulate database queries. Prevention: use <strong>parameterized queries/prepared statements</strong> (never concatenate user input into SQL), apply least privilege to database accounts, and validate all input." },
  { cat: "OWASP Top 10", q: "What are the three types of XSS?", a: "<strong>Reflected XSS</strong> – malicious script in a URL is reflected back to the user<br><strong>Stored XSS</strong> – script is permanently stored on the server (database, comments)<br><strong>DOM-based XSS</strong> – script executes via client-side JavaScript manipulating the DOM<br>Prevention: <strong>output encoding and CSP</strong>." },
  { cat: "OWASP Top 10", q: "What is CSRF and how is it prevented?", a: "<strong>Cross-Site Request Forgery</strong> tricks an authenticated user into submitting unwanted requests to a trusted site. Prevention: <strong>anti-CSRF tokens</strong> (unique per session/request), <strong>SameSite cookie attribute</strong>, verifying the Origin/Referer header, and requiring re-authentication for sensitive actions." },
  { cat: "OWASP Top 10", q: "What is Broken Access Control?", a: "The #1 OWASP risk where users can act <strong>outside their intended permissions</strong>. Examples include accessing other users' data by changing IDs, privilege escalation, and missing function-level access checks. Prevention: <strong>deny by default, enforce server-side</strong>, and test authorization logic." },
  { cat: "OWASP Top 10", q: "What is Server-Side Request Forgery (SSRF)?", a: "<strong>SSRF</strong> occurs when an attacker makes the server <strong>send requests to unintended locations</strong>, such as internal services, cloud metadata endpoints, or other networks. Prevention: validate and whitelist URLs, block internal IPs, and segment network access." },
  { cat: "OWASP Top 10", q: "What is Security Misconfiguration?", a: "A risk caused by <strong>insecure default settings</strong>, open cloud storage, missing patches, unnecessary features enabled, or verbose error messages exposing internal details. Prevention: <strong>harden configurations</strong>, remove defaults, automate configuration checks, and apply least functionality." },

  // ===== TESTING TYPES =====
  { cat: "Testing Types", q: "What is unit testing?", a: "<strong>Unit testing</strong> verifies individual <strong>functions or methods</strong> in isolation. Tests are fast, automated, and test a single behavior. They use mocks/stubs to isolate dependencies. Unit tests form the <strong>base of the testing pyramid</strong>." },
  { cat: "Testing Types", q: "What is integration testing?", a: "<strong>Integration testing</strong> verifies that <strong>multiple components work together</strong> correctly. It tests interfaces between modules, APIs, and databases. Unlike unit tests, integration tests use real (or realistic) dependencies to validate <strong>end-to-end data flow</strong>." },
  { cat: "Testing Types", q: "What is the difference between system and acceptance testing?", a: "<strong>System testing</strong> validates the <strong>complete, integrated system</strong> against requirements in a production-like environment. <strong>Acceptance testing</strong> (UAT) verifies the system meets <strong>business needs</strong> and is performed by end users or stakeholders before release." },
  { cat: "Testing Types", q: "What is regression testing?", a: "<strong>Regression testing</strong> re-runs existing tests after code changes to ensure that new code <strong>has not broken existing functionality</strong>. It is typically automated and run as part of CI/CD pipelines to catch unintended side effects of modifications." },
  { cat: "Testing Types", q: "What is fuzz testing?", a: "<strong>Fuzz testing (fuzzing)</strong> feeds <strong>random, malformed, or unexpected data</strong> into a program to discover crashes, memory leaks, and security vulnerabilities. It is effective at finding input handling bugs that manual testing might miss." },
  { cat: "Testing Types", q: "What is the difference between penetration testing and vulnerability scanning?", a: "<strong>Vulnerability scanning</strong> is an <strong>automated</strong> process that identifies known vulnerabilities but does not exploit them. <strong>Penetration testing</strong> is a <strong>manual, skilled assessment</strong> that actively exploits vulnerabilities to determine real-world impact and attack paths." },

  // ===== SDLC & DEVSECOPS =====
  { cat: "SDLC & DevSecOps", q: "What are SDLC security gates?", a: "Checkpoints at each <strong>SDLC phase</strong> where security is evaluated:<br><strong>Requirements</strong> – security requirements<br><strong>Design</strong> – threat modeling<br><strong>Development</strong> – secure coding, SAST<br><strong>Testing</strong> – DAST, pen testing<br><strong>Deployment</strong> – configuration review<br><strong>Maintenance</strong> – patching, monitoring" },
  { cat: "SDLC & DevSecOps", q: "What is DevSecOps?", a: "<strong>DevSecOps</strong> integrates security practices into every phase of the <strong>DevOps pipeline</strong> rather than treating security as a final gate. It automates security testing (SAST/DAST), dependency scanning, and compliance checks in CI/CD to enable <strong>continuous security</strong>." },
  { cat: "SDLC & DevSecOps", q: "What is threat modeling using STRIDE?", a: "<strong>STRIDE</strong> identifies six threat categories:<br><strong>S</strong>poofing – impersonating identity<br><strong>T</strong>ampering – modifying data<br><strong>R</strong>epudiation – denying actions<br><strong>I</strong>nformation Disclosure – exposing data<br><strong>D</strong>enial of Service – disrupting availability<br><strong>E</strong>levation of Privilege – gaining unauthorized access" },
  { cat: "SDLC & DevSecOps", q: "What is dependency scanning?", a: "<strong>Dependency scanning</strong> analyzes third-party libraries and packages for <strong>known vulnerabilities</strong> using CVE databases. Tools like Snyk, Dependabot, and OWASP Dependency-Check automate this process. It prevents <strong>supply chain attacks</strong> through vulnerable components." },
  { cat: "SDLC & DevSecOps", q: "What is secure API design?", a: "Secure APIs implement <strong>authentication</strong> (API keys, OAuth), <strong>rate limiting</strong> to prevent abuse, <strong>input validation</strong> on all parameters, proper error handling (no sensitive data in errors), and <strong>least privilege</strong> access controls. API gateways centralize security enforcement." },

  // ===== VULNERABILITY ANALYSIS =====
  { cat: "Vulnerability Analysis", q: "What is SAST (Static Application Security Testing)?", a: "<strong>SAST</strong> analyzes <strong>source code without executing it</strong> to find security vulnerabilities like injection flaws, hardcoded secrets, and insecure patterns. It runs early in the SDLC (shift-left) and provides <strong>line-of-code remediation guidance</strong>." },
  { cat: "Vulnerability Analysis", q: "What is DAST (Dynamic Application Security Testing)?", a: "<strong>DAST</strong> tests a <strong>running application</strong> by sending requests and analyzing responses for vulnerabilities. It simulates real attacks against the live application without access to source code. DAST finds runtime issues like <strong>misconfigurations, authentication flaws, and injection</strong>." },
  { cat: "Vulnerability Analysis", q: "What is IAST (Interactive Application Security Testing)?", a: "<strong>IAST</strong> combines SAST and DAST by using <strong>agents inside the running application</strong> to monitor code execution in real time. It provides high accuracy with <strong>fewer false positives</strong>, identifies the exact vulnerable code line, and works during normal testing activities." },
  { cat: "Vulnerability Analysis", q: "How are vulnerabilities prioritized?", a: "Vulnerabilities are ranked using <strong>CVSS (Common Vulnerability Scoring System)</strong> from 0.0 to 10.0 based on exploitability, impact, and environmental factors. Combined with <strong>business context</strong> (data sensitivity, exposure), this determines remediation priority." },

  // ===== CODE REVIEW =====
  { cat: "Code Review", q: "What is a secure code review?", a: "A <strong>manual or tool-assisted examination</strong> of source code to identify security defects. Reviewers look for <strong>injection points, authentication flaws, access control gaps</strong>, and insecure patterns. It complements automated tools by catching logic flaws that scanners miss." },
  { cat: "Code Review", q: "What should a secure code review checklist include?", a: "<strong>Input validation</strong> on all user inputs<br><strong>Output encoding</strong> for context-specific rendering<br><strong>Authentication and session management</strong><br><strong>Access control</strong> enforcement<br><strong>Error handling</strong> without information leakage<br><strong>No hardcoded credentials</strong><br><strong>Secure cryptographic usage</strong>" },
  { cat: "Code Review", q: "What is the difference between manual and automated code review?", a: "<strong>Automated review</strong> (SAST tools) is fast, consistent, and catches known patterns but produces <strong>false positives</strong>. <strong>Manual review</strong> is slower but catches <strong>business logic flaws, design issues</strong>, and context-specific vulnerabilities that tools miss. Both are needed." },

  // ===== CRYPTOGRAPHY IN CODE =====
  { cat: "Cryptography in Code", q: "What is the difference between hashing and encryption?", a: "<strong>Hashing</strong> is a <strong>one-way</strong> function that produces a fixed-length digest (SHA-256). It cannot be reversed and is used for password storage and integrity verification. <strong>Encryption</strong> is <strong>reversible</strong> with a key and is used to protect data confidentiality." },
  { cat: "Cryptography in Code", q: "Why should passwords be hashed with salt?", a: "<strong>Salting</strong> adds a unique random value to each password before hashing, ensuring identical passwords produce <strong>different hashes</strong>. This defeats <strong>rainbow table attacks</strong> and precomputed hash lookups. Use bcrypt, scrypt, or Argon2 — never plain SHA or MD5 for passwords." },
  { cat: "Cryptography in Code", q: "What are common cryptographic mistakes in software?", a: "Common mistakes include using <strong>weak algorithms</strong> (MD5, SHA1, DES), hardcoding encryption keys, using ECB mode, implementing custom cryptography, <strong>insufficient key length</strong>, and not using authenticated encryption (AES-GCM). Always use well-vetted cryptographic libraries." },
  { cat: "Cryptography in Code", q: "What is TLS and why is it important for software?", a: "<strong>TLS (Transport Layer Security)</strong> encrypts data in transit between client and server, preventing eavesdropping and tampering. Applications should enforce <strong>TLS 1.2 or higher</strong>, validate certificates, and use HSTS headers to prevent protocol downgrade attacks." },
  { cat: "OWASP Top 10", q: "What are Cryptographic Failures (OWASP #2)?", a: "Failures related to <strong>weak or missing encryption</strong> of sensitive data. Examples include transmitting data in cleartext, using deprecated algorithms (MD5, SHA1), weak key generation, and missing encryption at rest. Prevention: use <strong>strong algorithms (AES-256, SHA-256), TLS everywhere</strong>, and proper key management." },
  { cat: "OWASP Top 10", q: "What are Software and Data Integrity Failures (OWASP #8)?", a: "Occur when code or infrastructure does not protect against <strong>integrity violations</strong>. Examples include insecure CI/CD pipelines, auto-updates without verification, and <strong>insecure deserialization</strong>. Prevention: use digital signatures, verified repositories, and software composition analysis." },
  { cat: "Testing Types", q: "What is black box vs. white box testing?", a: "<strong>Black box testing</strong> evaluates functionality <strong>without knowledge</strong> of internal code structure — focuses on inputs and outputs. <strong>White box testing</strong> examines <strong>internal code logic</strong>, paths, and branches. Black box tests user experience; white box tests code correctness." },
  { cat: "Secure Coding", q: "What is the principle of least privilege in application design?", a: "Applications should run with the <strong>minimum permissions needed</strong> for their function. Database connections should use restricted accounts, APIs should limit scopes, and file access should be narrowly defined. This limits damage if the application is <strong>compromised</strong>." },
  { cat: "SDLC & DevSecOps", q: "What is shift-left security?", a: "<strong>Shift-left</strong> means integrating security testing <strong>earlier in the development lifecycle</strong> rather than at the end. By running SAST during coding, threat modeling during design, and security requirements during planning, defects are caught when they are <strong>cheapest and easiest to fix</strong>." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
