<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D270 – Composition Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D270</div>
    <h1>Composition: Successful Self-Expression</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== WRITING PROCESS =====
  { cat: "Writing Process", q: "What are the five stages of the writing process?", a: "<strong>Prewriting</strong> – brainstorming and planning ideas<br><strong>Drafting</strong> – writing the first version<br><strong>Revising</strong> – improving content, structure, and organization<br><strong>Editing</strong> – correcting grammar, spelling, and mechanics<br><strong>Publishing</strong> – producing the final version for the audience" },
  { cat: "Writing Process", q: "What are common prewriting techniques?", a: "<strong>Freewriting</strong> – writing without stopping to generate ideas<br><strong>Brainstorming</strong> – listing ideas quickly<br><strong>Clustering/Mind mapping</strong> – visually connecting related ideas<br><strong>Outlining</strong> – organizing ideas hierarchically<br><strong>Questioning</strong> – using who, what, when, where, why, and how" },
  { cat: "Writing Process", q: "What is the difference between revising and editing?", a: "<strong>Revising</strong> focuses on big-picture changes: reorganizing ideas, strengthening arguments, improving clarity, and ensuring the thesis is well-supported. <strong>Editing</strong> focuses on surface-level corrections: grammar, punctuation, spelling, and formatting." },
  { cat: "Writing Process", q: "What is the purpose of a rough draft?", a: "A <strong>rough draft</strong> translates prewriting ideas into connected prose. Its purpose is to <strong>get ideas on paper without worrying about perfection</strong>. It is meant to be revised and refined — not submitted as a final product." },
  { cat: "Writing Process", q: "What is peer review in the writing process?", a: "<strong>Peer review</strong> involves having other writers read and provide feedback on a draft. Effective peer reviewers focus on <strong>clarity, organization, evidence, and argument strength</strong> rather than just grammar. It provides an outside perspective the writer cannot have alone." },

  // ===== ESSAY STRUCTURE =====
  { cat: "Essay Structure", q: "What is a thesis statement?", a: "A <strong>thesis statement</strong> is a single, clear sentence that presents the <strong>main argument or central claim</strong> of an essay. It appears in the introduction and guides the entire paper. A strong thesis is specific, arguable, and supportable with evidence." },
  { cat: "Essay Structure", q: "What are topic sentences and why are they important?", a: "A <strong>topic sentence</strong> is the first sentence of a body paragraph that states the paragraph's main idea. It connects to the thesis and acts as a <strong>mini-thesis</strong> for that paragraph. It helps readers follow the argument's logical progression." },
  { cat: "Essay Structure", q: "What is the function of transitions in writing?", a: "<strong>Transitions</strong> are words, phrases, or sentences that connect ideas between and within paragraphs. They create <strong>coherence</strong> by showing relationships (contrast, addition, cause/effect, sequence). Examples: however, furthermore, consequently, in contrast." },
  { cat: "Essay Structure", q: "What is the difference between coherence and unity in an essay?", a: "<strong>Unity</strong> means every sentence in a paragraph supports the topic sentence and every paragraph supports the thesis. <strong>Coherence</strong> means ideas flow logically and smoothly from one to the next using transitions, repetition, and consistent organization." },
  { cat: "Essay Structure", q: "What should an effective introduction include?", a: "An effective introduction includes a <strong>hook</strong> (attention-grabber), <strong>background information</strong> that provides context, and a clear <strong>thesis statement</strong> that presents the main argument. It moves from general context to the specific claim of the essay." },
  { cat: "Essay Structure", q: "What should an effective conclusion include?", a: "An effective conclusion <strong>restates the thesis</strong> in new words, <strong>summarizes key points</strong>, and provides a <strong>final thought</strong> (call to action, broader implication, or memorable statement). It should not introduce new arguments or evidence." },
  { cat: "Essay Structure", q: "What are the four common essay organizational patterns?", a: "<strong>Chronological</strong> – events in time order<br><strong>Compare/Contrast</strong> – similarities and differences<br><strong>Cause/Effect</strong> – reasons and results<br><strong>Problem/Solution</strong> – identifies an issue and proposes a fix<br>The pattern should match the essay's purpose and thesis." },

  // ===== ARGUMENT & RHETORIC =====
  { cat: "Argument & Rhetoric", q: "What are ethos, pathos, and logos?", a: "<strong>Ethos</strong> – credibility and trustworthiness of the speaker/writer<br><strong>Pathos</strong> – emotional appeal to the audience<br><strong>Logos</strong> – logical reasoning and evidence<br>Effective persuasion typically uses all three appeals in balance." },
  { cat: "Argument & Rhetoric", q: "What is the rhetorical situation?", a: "The <strong>rhetorical situation</strong> is the context in which communication occurs. It includes the <strong>author</strong> (who is writing), <strong>audience</strong> (who is reading), <strong>purpose</strong> (why it is written), <strong>topic</strong> (what it is about), and <strong>context</strong> (when and where)." },
  { cat: "Argument & Rhetoric", q: "What is a counterargument and rebuttal?", a: "A <strong>counterargument</strong> is a potential objection to your thesis that an opponent might raise. A <strong>rebuttal</strong> is your response that explains why the counterargument is flawed, limited, or does not undermine your position. Including both strengthens your essay." },
  { cat: "Argument & Rhetoric", q: "What is the difference between a persuasive and an argumentative essay?", a: "A <strong>persuasive essay</strong> aims to convince readers using emotional appeals and personal opinion. An <strong>argumentative essay</strong> uses <strong>logical reasoning and evidence</strong> to prove a claim, acknowledges counterarguments, and maintains an objective tone." },
  { cat: "Argument & Rhetoric", q: "What is audience analysis in writing?", a: "<strong>Audience analysis</strong> involves considering the reader's knowledge level, values, beliefs, and expectations. Writers adjust <strong>tone, vocabulary, evidence type, and level of detail</strong> based on whether the audience is academic, professional, or general public." },
  { cat: "Argument & Rhetoric", q: "What is the Toulmin model of argument?", a: "A framework with six elements:<br><strong>Claim</strong> – the thesis<br><strong>Data/Grounds</strong> – evidence supporting it<br><strong>Warrant</strong> – the logical connection between data and claim<br><strong>Backing</strong> – support for the warrant<br><strong>Qualifier</strong> – limits on the claim (most, usually)<br><strong>Rebuttal</strong> – acknowledgment of exceptions" },
  { cat: "Argument & Rhetoric", q: "What is tone in writing and why does it matter?", a: "<strong>Tone</strong> is the writer's attitude toward the subject and audience, conveyed through word choice, sentence structure, and detail. It matters because an inappropriate tone (too casual for academic work, or too formal for a blog) can undermine credibility and reader engagement." },

  // ===== STYLE & MECHANICS =====
  { cat: "Style & Mechanics", q: "What is the difference between active and passive voice?", a: "<strong>Active voice</strong>: the subject performs the action ('The researcher conducted the study'). <strong>Passive voice</strong>: the subject receives the action ('The study was conducted by the researcher'). Active voice is generally preferred for clarity and directness." },
  { cat: "Style & Mechanics", q: "What is parallel structure?", a: "<strong>Parallel structure</strong> means using the same grammatical form for items in a series, list, or comparison. Example: 'She likes <strong>swimming, running, and hiking</strong>' (correct) vs. 'She likes swimming, to run, and hikes' (incorrect). It improves readability and rhythm." },
  { cat: "Style & Mechanics", q: "What is a comma splice and how do you fix it?", a: "A <strong>comma splice</strong> incorrectly joins two independent clauses with only a comma. Fix it by: <strong>1)</strong> Using a period to make two sentences, <strong>2)</strong> Adding a coordinating conjunction (for, and, nor, but, or, yet, so), or <strong>3)</strong> Using a semicolon." },
  { cat: "Style & Mechanics", q: "What is a run-on sentence?", a: "A <strong>run-on sentence</strong> (or fused sentence) joins two or more independent clauses without proper punctuation or a conjunction. Example: 'I love writing I do it every day.' Fix it the same way as a comma splice: period, semicolon, or conjunction." },
  { cat: "Style & Mechanics", q: "What is a sentence fragment?", a: "A <strong>sentence fragment</strong> is an incomplete sentence that lacks a subject, a verb, or a complete thought. Example: 'Because she left early.' It is a dependent clause that cannot stand alone. Fix it by attaching it to an independent clause." },
  { cat: "Style & Mechanics", q: "What is word choice (diction) and why does it matter?", a: "<strong>Diction</strong> is the selection of words based on context, audience, and purpose. Precise diction conveys meaning accurately and establishes tone. Avoid <strong>cliches, jargon</strong> (unless for expert audiences), and <strong>vague language</strong> to strengthen writing." },
  { cat: "Style & Mechanics", q: "What is conciseness in writing?", a: "<strong>Conciseness</strong> means expressing ideas in as few words as necessary without losing meaning. Eliminate <strong>wordiness, redundancy, and filler phrases</strong> (e.g., replace 'due to the fact that' with 'because'). Concise writing respects the reader's time and improves clarity." },
  { cat: "Style & Mechanics", q: "What is subject-verb agreement?", a: "<strong>Subject-verb agreement</strong> requires that a singular subject takes a singular verb and a plural subject takes a plural verb. Common errors occur with compound subjects, indefinite pronouns, and phrases that separate the subject from its verb." },

  // ===== RESEARCH & CITATION =====
  { cat: "Research & Citation", q: "What is plagiarism?", a: "<strong>Plagiarism</strong> is presenting someone else's words, ideas, or work as your own without proper attribution. It includes copying text, paraphrasing without citation, self-plagiarism, and buying papers. It is an academic integrity violation with serious consequences." },
  { cat: "Research & Citation", q: "What is the difference between paraphrasing and quoting?", a: "<strong>Paraphrasing</strong> restates another's ideas in your own words and sentence structure — it still requires a citation. <strong>Quoting</strong> uses the exact words of the source in quotation marks with a citation. Paraphrasing is preferred when the original wording is not essential." },
  { cat: "Research & Citation", q: "What is the difference between APA and MLA citation formats?", a: "<table class='algo-table'><tr><th>Feature</th><th>APA</th><th>MLA</th></tr><tr><td>Used in</td><td>Social sciences, business</td><td>Humanities, liberal arts</td></tr><tr><td>In-text</td><td>(Author, Year)</td><td>(Author Page#)</td></tr><tr><td>Reference page</td><td>References</td><td>Works Cited</td></tr><tr><td>Title page</td><td>Required</td><td>Not required</td></tr></table>" },
  { cat: "Research & Citation", q: "What is an annotated bibliography?", a: "An <strong>annotated bibliography</strong> is a list of sources with a brief summary and evaluation of each. Each entry includes the full citation followed by a <strong>150-200 word annotation</strong> that describes the source's content, credibility, and relevance to your research." },
  { cat: "Research & Citation", q: "What is a signal phrase in citation?", a: "A <strong>signal phrase</strong> introduces a quote or paraphrase by naming the source author, providing context. Example: 'According to Smith (2020), ...' Signal phrases integrate sources smoothly into writing and give credit to the original author." },
  { cat: "Research & Citation", q: "How do you evaluate the credibility of a source?", a: "Use the <strong>CRAAP test</strong>:<br><strong>C</strong>urrency – Is it recent enough?<br><strong>R</strong>elevance – Does it relate to your topic?<br><strong>A</strong>uthority – Is the author qualified?<br><strong>A</strong>ccuracy – Is the information verifiable?<br><strong>P</strong>urpose – Is it objective or biased?" },
  { cat: "Research & Citation", q: "What is a scholarly (peer-reviewed) source?", a: "A <strong>scholarly source</strong> is written by experts, reviewed by other experts before publication, and published in academic journals. It includes original research, methodology, citations, and is written for an academic audience. It is the <strong>gold standard</strong> for academic writing." },

  // ===== AUDIENCE & PURPOSE =====
  { cat: "Audience & Purpose", q: "What is the purpose of expository writing?", a: "<strong>Expository writing</strong> aims to <strong>explain, inform, or describe</strong> a topic to the reader. It uses facts, examples, and logical organization rather than persuasion or storytelling. Examples include textbooks, how-to guides, and news articles." },
  { cat: "Audience & Purpose", q: "What is the purpose of narrative writing?", a: "<strong>Narrative writing</strong> tells a story, either real or fictional. It uses <strong>characters, setting, plot, conflict, and resolution</strong> to engage readers. In academic contexts, personal narratives or anecdotes may support a larger argument." },
  { cat: "Audience & Purpose", q: "What is the purpose of descriptive writing?", a: "<strong>Descriptive writing</strong> creates a vivid picture using sensory details (sight, sound, touch, taste, smell). Its purpose is to help the reader <strong>experience</strong> the subject. It relies on concrete, specific language rather than abstract generalizations." },
  { cat: "Audience & Purpose", q: "How does audience affect writing choices?", a: "Audience determines <strong>vocabulary level</strong> (technical vs. accessible), <strong>tone</strong> (formal vs. casual), <strong>evidence type</strong> (data vs. anecdotes), and <strong>depth of explanation</strong>. Writing for experts requires less background; writing for general audiences requires more context and simpler language." },
  { cat: "Audience & Purpose", q: "What is register in writing?", a: "<strong>Register</strong> is the level of formality in language, ranging from frozen (legal documents) to intimate (close friends). Academic writing uses a <strong>formal register</strong> — avoiding slang, contractions, and first person. Matching register to context is key to effective communication." },
  { cat: "Audience & Purpose", q: "What is the difference between summary and analysis?", a: "<strong>Summary</strong> restates the main points of a source without adding interpretation. <strong>Analysis</strong> breaks down the source's argument, examines how it works, evaluates its effectiveness, and offers original insight. Academic writing emphasizes analysis over summary." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
