<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU C458 – Health, Fitness, and Wellness Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU C458</div>
    <h1>Health, Fitness, and Wellness</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== WELLNESS DIMENSIONS =====
  { cat: "Wellness Dimensions", q: "What are the seven dimensions of wellness?", a: "<strong>Physical</strong> – body health and fitness<br><strong>Emotional</strong> – managing feelings effectively<br><strong>Social</strong> – healthy relationships and connections<br><strong>Intellectual</strong> – lifelong learning and mental stimulation<br><strong>Spiritual</strong> – purpose, meaning, and values<br><strong>Environmental</strong> – healthy surroundings<br><strong>Occupational</strong> – fulfillment through work" },
  { cat: "Wellness Dimensions", q: "What is the difference between health and wellness?", a: "<strong>Health</strong> is the absence of disease or illness — a state of physical, mental, and social well-being. <strong>Wellness</strong> is an active, ongoing process of making choices toward a more balanced, fulfilling life across multiple dimensions." },
  { cat: "Wellness Dimensions", q: "What is emotional wellness?", a: "<strong>Emotional wellness</strong> involves understanding and managing your emotions, coping with challenges, and maintaining a positive outlook. Key components include <strong>self-awareness, resilience, emotional regulation</strong>, and the ability to form healthy relationships." },
  { cat: "Wellness Dimensions", q: "What is spiritual wellness?", a: "<strong>Spiritual wellness</strong> involves having a sense of <strong>purpose, meaning, and connection</strong> in life. It may include religious faith but also encompasses personal values, ethics, and practices like meditation. It helps guide decisions and cope with adversity." },
  { cat: "Wellness Dimensions", q: "How are the dimensions of wellness interconnected?", a: "The dimensions of wellness are <strong>interdependent</strong> — a change in one area affects others. For example, <strong>poor physical health</strong> (chronic pain) can reduce <strong>emotional wellness</strong> (depression), which may harm <strong>social wellness</strong> (isolation). Optimal health requires balance across all dimensions." },
  { cat: "Wellness Dimensions", q: "What is occupational wellness?", a: "<strong>Occupational wellness</strong> involves finding personal satisfaction and enrichment through work. It includes maintaining a healthy <strong>work-life balance</strong>, managing workplace stress, and pursuing a career that aligns with your values and interests." },

  // ===== FITNESS PRINCIPLES =====
  { cat: "Fitness Principles", q: "What is the FITT principle?", a: "<strong>F</strong>requency – how often you exercise<br><strong>I</strong>ntensity – how hard you exercise<br><strong>T</strong>ime – duration of exercise session<br><strong>T</strong>ype – the kind of exercise performed<br>FITT provides a framework for designing an effective, individualized exercise program." },
  { cat: "Fitness Principles", q: "What is the principle of progressive overload?", a: "<strong>Progressive overload</strong> states that to continue making fitness gains, you must <strong>gradually increase the demands</strong> placed on the body (weight, reps, intensity, or duration). Without progressive overload, the body adapts and improvements plateau." },
  { cat: "Fitness Principles", q: "What is the principle of specificity?", a: "The <strong>specificity principle</strong> states that training adaptations are <strong>specific to the type of exercise performed</strong>. Running improves cardiovascular endurance but will not significantly increase upper-body strength. Training must target the desired fitness component." },
  { cat: "Fitness Principles", q: "What is the principle of reversibility?", a: "The <strong>reversibility principle</strong> (use it or lose it) states that fitness gains are <strong>lost when training stops</strong>. Cardiovascular fitness declines within 1-2 weeks of inactivity. Strength declines more slowly but is also reversible without continued training." },
  { cat: "Fitness Principles", q: "What is the difference between muscular strength and muscular endurance?", a: "<strong>Muscular strength</strong> is the maximum force a muscle can produce in a <strong>single effort</strong> (1-rep max). <strong>Muscular endurance</strong> is the ability of a muscle to perform <strong>repeated contractions over time</strong> without fatigue. Strength uses heavier weights with fewer reps; endurance uses lighter weights with more reps." },
  { cat: "Fitness Principles", q: "What is the difference between aerobic and anaerobic exercise?", a: "<strong>Aerobic exercise</strong> uses oxygen for sustained energy production (running, cycling, swimming) and improves cardiovascular fitness. <strong>Anaerobic exercise</strong> uses energy stored in muscles without oxygen for short, intense bursts (sprinting, heavy weightlifting) and builds power and strength." },
  { cat: "Fitness Principles", q: "What are the five components of health-related fitness?", a: "<strong>Cardiovascular endurance</strong> – heart/lung efficiency<br><strong>Muscular strength</strong> – max force production<br><strong>Muscular endurance</strong> – sustained effort<br><strong>Flexibility</strong> – range of motion<br><strong>Body composition</strong> – ratio of fat to lean mass" },
  { cat: "Fitness Principles", q: "What is VO2 max?", a: "<strong>VO2 max</strong> is the maximum amount of oxygen your body can use during intense exercise. It is the gold standard measure of <strong>cardiovascular fitness</strong>. Higher VO2 max indicates a more efficient heart, lungs, and muscles. It is measured in mL/kg/min." },

  // ===== NUTRITION =====
  { cat: "Nutrition", q: "What are the three macronutrients and their caloric values?", a: "<table class='algo-table'><tr><th>Macronutrient</th><th>Cal/gram</th><th>Function</th></tr><tr><td>Carbohydrates</td><td>4</td><td>Primary energy source</td></tr><tr><td>Proteins</td><td>4</td><td>Build and repair tissue</td></tr><tr><td>Fats</td><td>9</td><td>Energy storage, insulation, hormone production</td></tr></table>" },
  { cat: "Nutrition", q: "What is the MyPlate model?", a: "<strong>MyPlate</strong> is the USDA's current dietary guideline visual. The plate is divided into four sections: <strong>fruits, vegetables, grains, and protein</strong>, with a side circle for <strong>dairy</strong>. Vegetables and grains occupy the largest portions. It replaced the Food Pyramid in 2011." },
  { cat: "Nutrition", q: "What is caloric balance?", a: "<strong>Caloric balance</strong> is the relationship between calories consumed and calories expended. A <strong>positive balance</strong> (surplus) leads to weight gain. A <strong>negative balance</strong> (deficit) leads to weight loss. Approximately <strong>3,500 calories equals one pound</strong> of body fat." },
  { cat: "Nutrition", q: "What are micronutrients?", a: "<strong>Micronutrients</strong> are vitamins and minerals needed in small amounts for essential body functions. <strong>Vitamins</strong> (A, C, D, E, K, B-complex) regulate metabolic processes. <strong>Minerals</strong> (calcium, iron, potassium, zinc) support bone health, oxygen transport, and nerve function." },
  { cat: "Nutrition", q: "What is BMI and what are its limitations?", a: "<strong>BMI</strong> (Body Mass Index) = weight (kg) / height (m)^2. Categories: underweight (<18.5), normal (18.5-24.9), overweight (25-29.9), obese (30+). <strong>Limitations</strong>: does not distinguish between muscle and fat mass, does not account for age, gender, or body composition." },
  { cat: "Nutrition", q: "What is the difference between simple and complex carbohydrates?", a: "<strong>Simple carbs</strong> (sugars) are quickly digested and cause rapid blood sugar spikes (candy, soda, fruit). <strong>Complex carbs</strong> (starches, fiber) digest slowly and provide sustained energy (whole grains, vegetables, legumes). Complex carbs are generally preferred for overall health." },
  { cat: "Nutrition", q: "What is basal metabolic rate (BMR)?", a: "<strong>BMR</strong> is the number of calories your body burns at rest to maintain basic life functions (breathing, circulation, cell production). It accounts for <strong>60-75% of daily energy expenditure</strong>. Factors affecting BMR include age, sex, muscle mass, and genetics." },
  { cat: "Nutrition", q: "What is body composition and how is it measured?", a: "<strong>Body composition</strong> is the ratio of <strong>fat mass to lean mass</strong> (muscle, bone, water, organs). Measurement methods include <strong>skinfold calipers, bioelectrical impedance, DEXA scans</strong>, and hydrostatic weighing. It is a more accurate indicator of health than weight or BMI alone." },

  // ===== CARDIOVASCULAR HEALTH =====
  { cat: "Cardiovascular Health", q: "What are the major risk factors for cardiovascular disease (CVD)?", a: "<strong>Modifiable</strong>: high blood pressure, high cholesterol, smoking, physical inactivity, obesity, diabetes, poor diet, excessive alcohol<br><strong>Non-modifiable</strong>: age, family history, gender (males at higher risk earlier), race/ethnicity" },
  { cat: "Cardiovascular Health", q: "What is the difference between HDL and LDL cholesterol?", a: "<strong>LDL</strong> (low-density lipoprotein) is 'bad' cholesterol — it deposits fat on artery walls, forming <strong>plaque</strong> (atherosclerosis). <strong>HDL</strong> (high-density lipoprotein) is 'good' cholesterol — it <strong>removes LDL from arteries</strong> and transports it to the liver." },
  { cat: "Cardiovascular Health", q: "What is atherosclerosis?", a: "<strong>Atherosclerosis</strong> is the buildup of fatty <strong>plaque</strong> inside artery walls, narrowing and hardening them. It restricts blood flow and can lead to <strong>heart attack</strong> (blocked coronary artery) or <strong>stroke</strong> (blocked brain artery). It develops over decades." },
  { cat: "Cardiovascular Health", q: "What is hypertension and why is it dangerous?", a: "<strong>Hypertension</strong> is chronically elevated blood pressure (above <span class='tag'>130/80 mmHg</span>). It is called the 'silent killer' because it often has <strong>no symptoms</strong> but damages arteries, increases risk of heart attack, stroke, kidney disease, and heart failure over time." },
  { cat: "Cardiovascular Health", q: "How does regular exercise benefit cardiovascular health?", a: "Regular aerobic exercise <strong>strengthens the heart muscle</strong>, lowers resting heart rate, reduces blood pressure, raises HDL cholesterol, lowers LDL cholesterol, improves blood vessel elasticity, and helps maintain healthy body weight. The AHA recommends <strong>150 minutes per week</strong> of moderate-intensity activity." },

  // ===== MENTAL HEALTH =====
  { cat: "Mental Health", q: "What is the difference between stress and anxiety?", a: "<strong>Stress</strong> is a response to an identifiable external trigger and typically resolves when the stressor is removed. <strong>Anxiety</strong> is persistent worry or unease that may occur <strong>without a clear trigger</strong> and can interfere with daily functioning when chronic." },
  { cat: "Mental Health", q: "What is sleep hygiene?", a: "<strong>Sleep hygiene</strong> refers to habits and practices that promote consistent, quality sleep. Key practices include maintaining a <strong>regular sleep schedule, limiting screen time before bed, avoiding caffeine</strong> late in the day, keeping the bedroom dark and cool, and aiming for <strong>7-9 hours</strong> per night." },
  { cat: "Mental Health", q: "What is the relationship between exercise and mental health?", a: "Regular exercise improves mental health by releasing <strong>endorphins</strong> (natural mood elevators), reducing <strong>cortisol</strong> (stress hormone), improving sleep quality, increasing self-esteem, and reducing symptoms of <strong>depression and anxiety</strong>. Both aerobic and resistance exercise show benefits." },
  { cat: "Mental Health", q: "What are the warning signs of depression?", a: "Warning signs include <strong>persistent sadness, loss of interest</strong> in activities, changes in appetite or weight, sleep disturbances, fatigue, difficulty concentrating, feelings of worthlessness or guilt, withdrawal from social activities, and in severe cases, thoughts of self-harm." },
  { cat: "Mental Health", q: "What is self-efficacy and how does it relate to wellness?", a: "<strong>Self-efficacy</strong> is a person's belief in their ability to succeed in specific situations. Proposed by <strong>Albert Bandura</strong>, higher self-efficacy leads to greater motivation, persistence, and healthier behaviors. People with high self-efficacy are more likely to set and achieve wellness goals." },

  // ===== STRESS MANAGEMENT =====
  { cat: "Stress Management", q: "What is the fight-or-flight response?", a: "The <strong>fight-or-flight response</strong> is the body's acute stress reaction controlled by the <strong>sympathetic nervous system</strong>. It releases adrenaline and cortisol, increasing heart rate, blood pressure, and blood sugar. It evolved to respond to physical threats but is triggered by modern psychological stressors." },
  { cat: "Stress Management", q: "What is cortisol and what happens when it is chronically elevated?", a: "<strong>Cortisol</strong> is the primary stress hormone produced by the adrenal glands. Short-term, it helps manage stress. <strong>Chronic elevation</strong> leads to weakened immune function, weight gain (especially abdominal), high blood pressure, poor sleep, anxiety, and increased risk of heart disease." },
  { cat: "Stress Management", q: "What is the difference between eustress and distress?", a: "<strong>Eustress</strong> is positive, beneficial stress that motivates and enhances performance (job promotion, exercise, exciting challenge). <strong>Distress</strong> is negative stress that causes anxiety, decreases performance, and harms health (financial problems, illness, loss). The body responds similarly to both." },
  { cat: "Stress Management", q: "What are effective stress management techniques?", a: "<strong>Physical</strong>: regular exercise, adequate sleep, deep breathing<br><strong>Cognitive</strong>: positive self-talk, time management, realistic goal-setting<br><strong>Behavioral</strong>: social support, hobbies, journaling<br><strong>Relaxation</strong>: meditation, progressive muscle relaxation, yoga" },
  { cat: "Stress Management", q: "What is the General Adaptation Syndrome (GAS)?", a: "Developed by <strong>Hans Selye</strong>, GAS describes three stages of the body's response to prolonged stress:<br><strong>1) Alarm</strong> – fight-or-flight activation<br><strong>2) Resistance</strong> – body adapts but remains on alert<br><strong>3) Exhaustion</strong> – resources depleted, vulnerability to illness increases" },
  { cat: "Stress Management", q: "What is the Transtheoretical Model (Stages of Change)?", a: "<strong>Precontemplation</strong> – not considering change<br><strong>Contemplation</strong> – thinking about change<br><strong>Preparation</strong> – planning to change soon<br><strong>Action</strong> – actively making changes<br><strong>Maintenance</strong> – sustaining the change over time<br>This model explains how people adopt healthier behaviors." },

  // ===== DISEASE PREVENTION =====
  { cat: "Disease Prevention", q: "What are the risk factors for type 2 diabetes?", a: "<strong>Modifiable</strong>: obesity, physical inactivity, poor diet, high blood pressure, high cholesterol<br><strong>Non-modifiable</strong>: family history, age (45+), race/ethnicity (higher risk in African Americans, Hispanics, Native Americans)<br>Prevention focuses on <strong>weight management and regular exercise</strong>." },
  { cat: "Disease Prevention", q: "What is the difference between communicable and non-communicable diseases?", a: "<strong>Communicable (infectious) diseases</strong> are caused by pathogens and can spread person-to-person (flu, COVID-19, tuberculosis). <strong>Non-communicable (chronic) diseases</strong> are not transmitted and develop over time (heart disease, cancer, diabetes). Chronic diseases are the <strong>leading cause of death</strong> in the US." },
  { cat: "Disease Prevention", q: "What lifestyle changes can reduce cancer risk?", a: "Key preventive behaviors include <strong>not smoking, maintaining healthy weight, regular physical activity, limiting alcohol, eating fruits and vegetables, protecting skin from UV</strong>, and getting recommended screenings (mammograms, colonoscopies, Pap smears)." },
  { cat: "Disease Prevention", q: "What is metabolic syndrome?", a: "<strong>Metabolic syndrome</strong> is a cluster of conditions that occur together: <strong>high blood pressure, high blood sugar, excess abdominal fat, abnormal cholesterol/triglycerides</strong>. Having three or more increases risk of <strong>heart disease, stroke, and type 2 diabetes</strong>. Treatment involves lifestyle changes." },
  { cat: "Disease Prevention", q: "What is the role of immunizations in disease prevention?", a: "<strong>Immunizations (vaccines)</strong> stimulate the immune system to produce <strong>antibodies</strong> against specific pathogens without causing the disease. They create <strong>herd immunity</strong> when enough of the population is vaccinated, protecting those who cannot be vaccinated. Vaccines have eliminated or reduced many infectious diseases." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
