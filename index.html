<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.08);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 1.5rem;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  header {
    margin-bottom: 3rem;
    text-align: center;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--muted);
    font-size: 1rem;
  }

  .section-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .course-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .course-card {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.15s;
  }

  .course-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .course-badge {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: rgba(45,204,143,0.12);
    color: var(--accent);
    border: 1px solid rgba(45,204,143,0.25);
    border-radius: 6px;
    padding: 0.25rem 0.6rem;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .course-info h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.15rem;
  }

  .course-info p {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .arrow {
    margin-left: auto;
    color: var(--muted);
    font-size: 1.1rem;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .course-card:hover .arrow {
    color: var(--accent);
  }

  footer {
    margin-top: 3rem;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
  }

  footer a {
    color: var(--accent2);
    text-decoration: none;
  }

  footer a:hover { text-decoration: underline; }

  .search-wrap {
    position: relative;
    margin-bottom: 1.25rem;
  }

  .search-wrap svg {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    flex-shrink: 0;
  }

  #search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 0.7rem 1rem 0.7rem 2.5rem;
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: var(--accent); }

  #no-results {
    display: none;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    padding: 2rem 0;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>WGU Flashcards</h1>
    <p>Browser-based study cards for WGU coursework</p>
  </header>

  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="search" placeholder="Search by course code or topic…" autocomplete="off">
  </div>

  <div class="section-label">Courses</div>
  <div class="course-list" id="courseList">

    <a class="course-card" href="d830-cryptography/d830_flashcards.html">
      <span class="course-badge">D830</span>
      <div class="course-info">
        <h2>Cryptography</h2>
        <p>Algorithms, protocols, key concepts &amp; terminology</p>
      </div>
      <span class="arrow">›</span>
    </a>

    <!-- Add new courses above this line following the same pattern:
    <a class="course-card" href="<folder>/<code>_flashcards.html">
      <span class="course-badge"><CODE></span>
      <div class="course-info">
        <h2>Course Title</h2>
        <p>Brief description</p>
      </div>
      <span class="arrow">›</span>
    </a>
    -->

  </div>
  <p id="no-results">No courses match your search.</p>

  <footer>
    <a href="https://github.com/tylercasey2263/wgu-flashcards">GitHub</a>
  </footer>
</div>
<script>
  const search = document.getElementById('search');
  const list   = document.getElementById('courseList');
  const none   = document.getElementById('no-results');

  search.addEventListener('input', () => {
    const q = search.value.trim().toLowerCase();
    let visible = 0;
    list.querySelectorAll('a.course-card').forEach(card => {
      const text = card.textContent.toLowerCase();
      const show = !q || text.includes(q);
      card.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    none.style.display = visible === 0 ? 'block' : 'none';
  });
</script>
</body>
</html>
