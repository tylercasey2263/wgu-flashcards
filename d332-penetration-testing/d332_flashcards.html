<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D332 – Penetration Testing and Vulnerability Analysis Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D332</div>
    <h1>Penetration Testing and Vulnerability Analysis</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== PEN TEST METHODOLOGY =====
  { cat: "Pen Test Methodology", q: "What are the pen test types (black, white, gray box)?", a: "<strong>Black box</strong> – tester has <strong>no prior knowledge</strong> of the target (simulates external attacker)<br><strong>White box</strong> – tester has <strong>full knowledge</strong> (source code, network diagrams, credentials)<br><strong>Gray box</strong> – tester has <strong>partial knowledge</strong> (user-level access, limited documentation)" },
  { cat: "Pen Test Methodology", q: "What are the different engagement types?", a: "<strong>Network</strong> – testing infrastructure, hosts, and services<br><strong>Web application</strong> – testing web apps for OWASP vulnerabilities<br><strong>Social engineering</strong> – testing human factors (phishing, pretexting)<br><strong>Physical</strong> – testing physical security controls (badges, locks, tailgating)" },
  { cat: "Pen Test Methodology", q: "What are rules of engagement (ROE)?", a: "A formal document that defines the <strong>scope, boundaries, and constraints</strong> of a penetration test. It specifies <strong>authorized targets, testing hours, prohibited techniques</strong>, escalation procedures, emergency contacts, and legal protections for the tester." },
  { cat: "Pen Test Methodology", q: "Why is scope and authorization critical?", a: "<strong>Written authorization</strong> (permission to test) legally protects the tester from criminal liability. <strong>Scope</strong> defines exactly which systems, networks, and applications are in bounds. Testing <strong>without authorization is illegal</strong> regardless of intent — it violates the CFAA." },
  { cat: "Pen Test Methodology", q: "What are common pen test frameworks?", a: "<strong>PTES</strong> (Penetration Testing Execution Standard) – comprehensive methodology with 7 phases<br><strong>OWASP Testing Guide</strong> – web application testing methodology<br><strong>NIST SP 800-115</strong> – technical guide to security testing and assessment<br>Each provides structured approaches to ensure <strong>thorough, repeatable testing</strong>." },
  { cat: "Pen Test Methodology", q: "What are the phases of a penetration test?", a: "<strong>1)</strong> Pre-engagement (scope, ROE, authorization)<br><strong>2)</strong> Reconnaissance (OSINT, active recon)<br><strong>3)</strong> Scanning & Enumeration<br><strong>4)</strong> Exploitation<br><strong>5)</strong> Post-exploitation (privilege escalation, lateral movement)<br><strong>6)</strong> Reporting (findings, risk ratings, remediation)" },

  // ===== RECONNAISSANCE =====
  { cat: "Reconnaissance", q: "What is passive reconnaissance (OSINT)?", a: "<strong>Passive recon</strong> gathers information <strong>without directly interacting</strong> with the target. Tools include <strong>Shodan</strong> (internet-facing devices), <strong>Maltego</strong> (relationship mapping), <strong>theHarvester</strong> (emails/subdomains), <strong>WHOIS</strong> (domain registration), and <strong>Google dorks</strong> (targeted search queries)." },
  { cat: "Reconnaissance", q: "What are Google dorks?", a: "<strong>Google dorks</strong> are advanced search operators used to find <strong>exposed information</strong>. Examples:<br><span class='tag'>site:target.com filetype:pdf</span><br><span class='tag'>intitle:\"index of\" passwords</span><br><span class='tag'>inurl:admin login</span><br>They reveal files, directories, and pages not intended to be public." },
  { cat: "Reconnaissance", q: "What is active reconnaissance?", a: "<strong>Active recon</strong> directly interacts with the target to gather information, which may be <strong>detectable by the target</strong>. Techniques include port scanning, ping sweeps, DNS zone transfers, and banner grabbing. It provides more detailed information but carries higher risk of detection." },
  { cat: "Reconnaissance", q: "What is WHOIS and DNS enumeration?", a: "<strong>WHOIS</strong> queries reveal <strong>domain registration details</strong> (registrant, nameservers, dates). <strong>DNS enumeration</strong> discovers subdomains, mail servers, and IP addresses. Tools include <span class='tag'>dig</span>, <span class='tag'>nslookup</span>, and <span class='tag'>dnsrecon</span>. These reveal the target's <strong>attack surface</strong>." },
  { cat: "Reconnaissance", q: "What is Shodan?", a: "<strong>Shodan</strong> is a search engine for <strong>internet-connected devices</strong>. It indexes banners from servers, IoT devices, webcams, databases, and industrial systems. Penetration testers use it to discover <strong>exposed services, default credentials, and vulnerable software</strong> without active scanning." },

  // ===== SCANNING & ENUMERATION =====
  { cat: "Scanning & Enumeration", q: "What are the common Nmap scan types?", a: "<span class='tag'>-sS</span> – SYN scan (stealthy, half-open)<br><span class='tag'>-sV</span> – version detection<br><span class='tag'>-sC</span> – default scripts<br><span class='tag'>-O</span> – OS detection<br><span class='tag'>-A</span> – aggressive (OS + version + scripts + traceroute)<br><span class='tag'>-sU</span> – UDP scan<br>SYN scan is the default and most common." },
  { cat: "Scanning & Enumeration", q: "What is banner grabbing?", a: "<strong>Banner grabbing</strong> captures the <strong>service identification text</strong> returned by open ports. It reveals software name, version, and OS information. Tools include <span class='tag'>Nmap -sV</span>, <span class='tag'>netcat</span>, and <span class='tag'>telnet</span>. This information helps identify <strong>known vulnerabilities</strong>." },
  { cat: "Scanning & Enumeration", q: "What is vulnerability scanning?", a: "<strong>Vulnerability scanning</strong> uses automated tools to identify <strong>known vulnerabilities</strong> in systems, networks, and applications. <strong>Nessus</strong> and <strong>OpenVAS</strong> are popular scanners. They compare findings against CVE databases and produce reports with <strong>CVSS scores and remediation guidance</strong>." },
  { cat: "Scanning & Enumeration", q: "What is CVE and CVSS?", a: "<strong>CVE</strong> (Common Vulnerabilities and Exposures) is a standardized <strong>identifier</strong> for known vulnerabilities (e.g., CVE-2021-44228). <strong>CVSS</strong> (Common Vulnerability Scoring System) rates severity from <strong>0.0 to 10.0</strong> based on exploitability, impact, and environmental factors." },
  { cat: "Scanning & Enumeration", q: "What are common Nmap port states?", a: "<strong>Open</strong> – a service is listening and accepting connections<br><strong>Closed</strong> – accessible but no service listening<br><strong>Filtered</strong> – firewall is blocking probes, state cannot be determined<br><strong>Open|Filtered</strong> – cannot determine if open or filtered (common with UDP)" },

  // ===== EXPLOITATION =====
  { cat: "Exploitation", q: "What is Metasploit and how is it used?", a: "<strong>Metasploit</strong> is an exploitation framework. Workflow: <span class='tag'>msfconsole</span> to launch, <span class='tag'>search</span> for exploits, <span class='tag'>use</span> a module, <span class='tag'>set</span> options (RHOSTS, LHOST, payload), <span class='tag'>run/exploit</span> to execute, and <span class='tag'>sessions</span> to manage active connections." },
  { cat: "Exploitation", q: "What is a payload in exploitation?", a: "A <strong>payload</strong> is the code that runs on the target system <strong>after an exploit succeeds</strong>. Common payloads include <strong>reverse shells</strong> (target connects back to attacker), <strong>bind shells</strong> (target opens a port), and <strong>Meterpreter</strong> (advanced, in-memory payload with post-exploitation features)." },
  { cat: "Exploitation", q: "What is EternalBlue (MS17-010)?", a: "<strong>EternalBlue</strong> exploits a vulnerability in <strong>SMBv1</strong> (Windows Server Message Block) allowing remote code execution. It was used in the <strong>WannaCry and NotPetya</strong> ransomware attacks. The exploit targets port 445 and affects unpatched Windows systems." },
  { cat: "Exploitation", q: "What are common password attacks?", a: "<strong>Brute force</strong> – tries all possible combinations<br><strong>Dictionary</strong> – uses wordlists of common passwords<br><strong>Credential stuffing</strong> – uses leaked username/password pairs<br><strong>Hashcat</strong> and <strong>John the Ripper</strong> crack password hashes using GPU acceleration and rule-based mutations." },
  { cat: "Exploitation", q: "What is web application testing with Burp Suite?", a: "<strong>Burp Suite</strong> is a web app testing platform. <strong>Proxy</strong> intercepts and modifies HTTP requests. <strong>Intruder</strong> automates attacks (fuzzing, brute force). <strong>Repeater</strong> replays and modifies individual requests. <strong>SQLmap</strong> automates SQL injection detection and exploitation." },

  // ===== POST-EXPLOITATION =====
  { cat: "Post-Exploitation", q: "What is privilege escalation on Windows?", a: "Common Windows privilege escalation techniques:<br><strong>Token impersonation</strong> – stealing tokens from higher-privileged processes<br><strong>Unquoted service paths</strong> – exploiting spaces in service paths<br><strong>DLL hijacking</strong> – placing malicious DLLs in search paths<br><strong>AlwaysInstallElevated</strong> – exploiting MSI installer policy" },
  { cat: "Post-Exploitation", q: "What is privilege escalation on Linux?", a: "Common Linux privilege escalation techniques:<br><strong>SUID binaries</strong> – exploiting executables running as root<br><strong>sudo misconfig</strong> – commands allowed without password<br><strong>Cron jobs</strong> – writable scripts run by root<br><strong>Kernel exploits</strong> – targeting known kernel vulnerabilities<br><strong>Writable /etc/passwd</strong> – adding a root user" },
  { cat: "Post-Exploitation", q: "What is lateral movement?", a: "<strong>Lateral movement</strong> is the process of moving through a network <strong>from one compromised system to another</strong> to reach high-value targets. Techniques include pass-the-hash, remote execution (PsExec, WMI), RDP, and exploiting trust relationships between systems." },
  { cat: "Post-Exploitation", q: "What is persistence in post-exploitation?", a: "<strong>Persistence</strong> ensures an attacker maintains access <strong>even after reboots or remediation attempts</strong>. Techniques include scheduled tasks, registry run keys, services, startup scripts, backdoor accounts, and web shells. Testers document these to help defenders identify real threats." },
  { cat: "Post-Exploitation", q: "What is pivoting?", a: "<strong>Pivoting</strong> uses a compromised system as a <strong>relay to access networks</strong> that are not directly reachable from the attacker's position. It enables reaching internal segments through the compromised host using SSH tunnels, port forwarding, or Metasploit's route command." },
  { cat: "Post-Exploitation", q: "What is a C2 (Command and Control) framework?", a: "A <strong>C2 framework</strong> provides a centralized server for <strong>managing compromised systems</strong>. It enables remote command execution, file transfer, and coordination of post-exploitation activities. Knowledge of C2 concepts (beaconing, callback intervals) helps pen testers and defenders alike." },

  // ===== VULNERABILITY MANAGEMENT =====
  { cat: "Vulnerability Management", q: "What is the vulnerability management lifecycle?", a: "<strong>1)</strong> Asset discovery and inventory<br><strong>2)</strong> Vulnerability scanning and assessment<br><strong>3)</strong> Prioritization by risk (CVSS + context)<br><strong>4)</strong> Remediation (patch, configure, mitigate)<br><strong>5)</strong> Verification and validation<br><strong>6)</strong> Reporting and metrics tracking" },
  { cat: "Vulnerability Management", q: "How are vulnerabilities prioritized for remediation?", a: "Prioritization combines <strong>CVSS score</strong> with <strong>business context</strong>: asset criticality, data sensitivity, exposure (internet-facing vs. internal), exploit availability, and compensating controls. A medium CVSS on a critical internet-facing system may take priority over a high CVSS on an isolated internal system." },
  { cat: "Vulnerability Management", q: "What is the difference between a vulnerability and an exploit?", a: "A <strong>vulnerability</strong> is a <strong>weakness</strong> in a system that could be taken advantage of. An <strong>exploit</strong> is the actual <strong>code or technique</strong> used to take advantage of that vulnerability. Not all vulnerabilities have known exploits, but those that do are higher priority for remediation." },

  // ===== TOOLS & REPORTING =====
  { cat: "Tools & Reporting", q: "What should a pen test report include?", a: "A report includes: <strong>Executive summary</strong> (non-technical overview for leadership), <strong>technical findings</strong> (each with description, evidence, CVSS score, affected systems), <strong>risk ratings</strong> (critical/high/medium/low), and <strong>remediation recommendations</strong> with prioritized action items." },
  { cat: "Tools & Reporting", q: "What is the difference between an executive summary and technical findings?", a: "The <strong>executive summary</strong> is written for <strong>non-technical leadership</strong> — it highlights overall risk posture, business impact, and key recommendations. <strong>Technical findings</strong> are for <strong>security and IT teams</strong> — they include detailed steps to reproduce, evidence (screenshots), and specific remediation steps." },
  { cat: "Tools & Reporting", q: "How are findings rated in a pen test report?", a: "Findings are rated using <strong>CVSS scores</strong> mapped to severity levels:<br><span class='tag'>Critical (9.0-10.0)</span> – immediate remediation<br><span class='tag'>High (7.0-8.9)</span> – urgent remediation<br><span class='tag'>Medium (4.0-6.9)</span> – planned remediation<br><span class='tag'>Low (0.1-3.9)</span> – risk acceptance or fix during next cycle" },
  { cat: "Tools & Reporting", q: "What are essential pen testing tools?", a: "<table class='algo-table'><tr><th>Category</th><th>Tools</th></tr><tr><td>Scanning</td><td>Nmap, Nessus, OpenVAS</td></tr><tr><td>Exploitation</td><td>Metasploit, SQLmap</td></tr><tr><td>Web Testing</td><td>Burp Suite, OWASP ZAP</td></tr><tr><td>Password</td><td>Hashcat, John the Ripper</td></tr><tr><td>OSINT</td><td>Shodan, Maltego, theHarvester</td></tr></table>" },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
