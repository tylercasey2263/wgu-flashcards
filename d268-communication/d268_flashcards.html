<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D268 – Introduction to Communication Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D268</div>
    <h1>Introduction to Communication: Connecting with Others</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== FOUNDATIONS =====
  { cat: "Foundations", q: "What is the Shannon-Weaver model of communication?", a: "A <strong>linear model</strong> consisting of sender, encoder, channel, decoder, receiver, and noise. It was one of the earliest models and treats communication as a <strong>one-way process</strong> without feedback." },
  { cat: "Foundations", q: "What is the transactional model of communication?", a: "A model showing communication as a <strong>simultaneous, two-way process</strong> where both parties are sender and receiver at the same time. It accounts for <strong>shared meaning, context, and feedback</strong> occurring in real time." },
  { cat: "Foundations", q: "What are the four types of noise in communication?", a: "<strong>Physical</strong> – external environmental interference (loud room)<br><strong>Psychological</strong> – internal mental distractions (stress, bias)<br><strong>Semantic</strong> – misunderstanding of word meanings<br><strong>Physiological</strong> – biological factors (hearing loss, illness)" },
  { cat: "Foundations", q: "What is encoding and decoding in communication?", a: "<strong>Encoding</strong> is the process of converting thoughts into symbols (words, gestures). <strong>Decoding</strong> is interpreting those symbols back into meaning. Miscommunication occurs when the decoder assigns a different meaning than the encoder intended." },
  { cat: "Foundations", q: "What is the difference between a channel and a medium in communication?", a: "A <strong>channel</strong> is the sensory route (auditory, visual, tactile) through which a message travels. A <strong>medium</strong> is the specific tool or method used, such as a phone call, email, or face-to-face conversation." },
  { cat: "Foundations", q: "What is communication competence?", a: "The ability to communicate <strong>effectively and appropriately</strong> in a given context. It involves knowledge of communication rules, skill in applying them, and motivation to interact well with others." },
  { cat: "Foundations", q: "What is self-concept and how does it affect communication?", a: "<strong>Self-concept</strong> is how you perceive yourself — your beliefs, values, and identity. It shapes how you encode messages, respond to feedback, and interpret others' behavior. A <strong>positive self-concept</strong> generally leads to more confident, open communication." },
  { cat: "Foundations", q: "What is perception checking?", a: "A three-step process for verifying your interpretation of another person's behavior: <strong>1)</strong> Describe the behavior you noticed, <strong>2)</strong> Offer two possible interpretations, <strong>3)</strong> Ask for clarification. It reduces misunderstandings and assumptions." },

  // ===== VERBAL COMMUNICATION =====
  { cat: "Verbal Communication", q: "What is the difference between denotative and connotative meaning?", a: "<strong>Denotative meaning</strong> is the dictionary definition of a word. <strong>Connotative meaning</strong> is the emotional or cultural associations a word carries. For example, 'home' denotes a dwelling but connotes warmth and belonging." },
  { cat: "Verbal Communication", q: "What is the Sapir-Whorf hypothesis?", a: "The theory that <strong>language shapes thought and perception</strong>. The strong version claims language determines thought; the weak version (linguistic relativity) claims language influences but does not determine thought." },
  { cat: "Verbal Communication", q: "What are the rules that govern verbal communication?", a: "<strong>Phonological</strong> – pronunciation rules<br><strong>Syntactic</strong> – grammar and sentence structure<br><strong>Semantic</strong> – word meaning rules<br><strong>Pragmatic</strong> – contextual rules for appropriate language use" },
  { cat: "Verbal Communication", q: "What is the difference between assertive, aggressive, and passive communication styles?", a: "<strong>Assertive</strong> – expresses needs directly while respecting others<br><strong>Aggressive</strong> – dominates, disregards others' feelings<br><strong>Passive</strong> – avoids expressing needs, gives in to others<br>Assertive communication is generally the most effective style." },
  { cat: "Verbal Communication", q: "What are euphemisms and why are they used?", a: "<strong>Euphemisms</strong> are mild or indirect words substituted for ones considered too harsh or blunt (e.g., 'passed away' instead of 'died'). They soften the impact of sensitive topics and reflect social norms of politeness." },
  { cat: "Verbal Communication", q: "What is abstract vs. concrete language?", a: "<strong>Abstract language</strong> refers to intangible ideas or concepts (freedom, love). <strong>Concrete language</strong> refers to specific, observable things (red car, 3 p.m.). Effective communicators use <strong>concrete language</strong> to improve clarity." },

  // ===== NONVERBAL COMMUNICATION =====
  { cat: "Nonverbal Communication", q: "What is kinesics?", a: "<strong>Kinesics</strong> is the study of body movement in communication, including <strong>gestures, posture, facial expressions, and eye contact</strong>. Research suggests that a large portion of emotional meaning is conveyed through kinesic cues." },
  { cat: "Nonverbal Communication", q: "What is proxemics and what are the four distance zones?", a: "<strong>Proxemics</strong> is the study of how people use space in communication.<br><strong>Intimate</strong>: 0–18 inches<br><strong>Personal</strong>: 18 inches – 4 feet<br><strong>Social</strong>: 4–12 feet<br><strong>Public</strong>: 12+ feet" },
  { cat: "Nonverbal Communication", q: "What is haptics in nonverbal communication?", a: "<strong>Haptics</strong> is the study of touch as communication. Types include functional-professional (doctor exam), social-polite (handshake), friendship-warmth (hug), and love-intimacy (holding hands). Touch norms vary significantly across cultures." },
  { cat: "Nonverbal Communication", q: "What is chronemics?", a: "<strong>Chronemics</strong> is the study of how time affects communication. <strong>Monochronic cultures</strong> view time as linear and value punctuality, while <strong>polychronic cultures</strong> view time as fluid and prioritize relationships over schedules." },
  { cat: "Nonverbal Communication", q: "What is paralanguage (vocalics)?", a: "<strong>Paralanguage</strong> refers to vocal cues that accompany speech but are not words themselves — including <strong>pitch, rate, volume, tone, and pauses</strong>. These cues convey emotion, emphasis, and attitude." },
  { cat: "Nonverbal Communication", q: "What are the primary functions of nonverbal communication?", a: "<strong>Repeating</strong> – reinforces verbal message<br><strong>Complementing</strong> – adds to verbal message<br><strong>Contradicting</strong> – conflicts with verbal message<br><strong>Substituting</strong> – replaces verbal message<br><strong>Regulating</strong> – controls conversational flow<br><strong>Accenting</strong> – emphasizes parts of a message" },
  { cat: "Nonverbal Communication", q: "What are emblems in nonverbal communication?", a: "<strong>Emblems</strong> are nonverbal gestures that have a <strong>direct verbal translation</strong> understood by a cultural group (e.g., thumbs up means approval). Their meaning is culturally specific and can vary or offend across cultures." },

  // ===== LISTENING =====
  { cat: "Listening", q: "What is the HURIER model of listening?", a: "A six-stage model of effective listening:<br><strong>H</strong>earing – physically receiving the sound<br><strong>U</strong>nderstanding – comprehending the message<br><strong>R</strong>emembering – storing the information<br><strong>I</strong>nterpreting – assigning meaning<br><strong>E</strong>valuating – critically analyzing<br><strong>R</strong>esponding – providing feedback" },
  { cat: "Listening", q: "What is the difference between hearing and listening?", a: "<strong>Hearing</strong> is the <strong>passive, physiological</strong> process of sound waves reaching the ear. <strong>Listening</strong> is an <strong>active, cognitive</strong> process that involves paying attention, interpreting, and responding to messages with intent." },
  { cat: "Listening", q: "What are common barriers to effective listening?", a: "<strong>Pseudolistening</strong> – pretending to listen<br><strong>Selective listening</strong> – hearing only what you want<br><strong>Defensive listening</strong> – taking messages as personal attacks<br><strong>Ambushing</strong> – listening to attack the speaker<br><strong>Glazing over</strong> – mentally drifting away" },
  { cat: "Listening", q: "What is active listening?", a: "<strong>Active listening</strong> involves fully concentrating, understanding, and responding to a speaker. Key techniques include <strong>paraphrasing, asking clarifying questions, providing feedback</strong>, and demonstrating attention through nonverbal cues like nodding." },
  { cat: "Listening", q: "What are the four listening styles?", a: "<strong>People-oriented</strong> – focuses on speaker's feelings and relationships<br><strong>Action-oriented</strong> – prefers concise, organized messages<br><strong>Content-oriented</strong> – enjoys analyzing complex information<br><strong>Time-oriented</strong> – values efficiency and time management" },

  // ===== INTERPERSONAL =====
  { cat: "Interpersonal", q: "What is social penetration theory?", a: "Also called the <strong>onion model</strong>, it proposes that relationships develop through gradual <strong>self-disclosure</strong> from superficial to intimate layers. Breadth (range of topics) and depth (level of detail) increase as trust grows." },
  { cat: "Interpersonal", q: "What are the five conflict management styles?", a: "<strong>Competing</strong> – win-lose, assertive<br><strong>Avoiding</strong> – withdrawing from conflict<br><strong>Accommodating</strong> – yielding to the other<br><strong>Compromising</strong> – both give something up<br><strong>Collaborating</strong> – win-win, addresses all concerns" },
  { cat: "Interpersonal", q: "What is Johari Window?", a: "A model of self-awareness with four quadrants:<br><strong>Open</strong> – known to self and others<br><strong>Blind</strong> – known to others but not self<br><strong>Hidden</strong> – known to self but not others<br><strong>Unknown</strong> – not known to anyone<br>Effective communication expands the Open area." },
  { cat: "Interpersonal", q: "What is self-disclosure and what factors affect it?", a: "<strong>Self-disclosure</strong> is the deliberate sharing of personal information. Factors include <strong>reciprocity</strong> (matched disclosure), trust level, cultural norms, gender, and relationship stage. Appropriate self-disclosure strengthens relationships." },
  { cat: "Interpersonal", q: "What are confirming and disconfirming messages?", a: "<strong>Confirming messages</strong> show that you value the other person (recognition, acknowledgment, endorsement). <strong>Disconfirming messages</strong> deny the person's value or existence (interrupting, ignoring, being impervious to their communication)." },
  { cat: "Interpersonal", q: "What is defensive vs. supportive communication climate?", a: "<table class='algo-table'><tr><th>Defensive</th><th>Supportive</th></tr><tr><td>Evaluation</td><td>Description</td></tr><tr><td>Control</td><td>Problem orientation</td></tr><tr><td>Strategy</td><td>Spontaneity</td></tr><tr><td>Neutrality</td><td>Empathy</td></tr><tr><td>Superiority</td><td>Equality</td></tr><tr><td>Certainty</td><td>Provisionalism</td></tr></table>" },

  // ===== INTERCULTURAL =====
  { cat: "Intercultural", q: "What are high-context and low-context cultures?", a: "<strong>High-context cultures</strong> (Japan, China, Arab nations) rely on implicit cues, shared understanding, and nonverbal communication. <strong>Low-context cultures</strong> (US, Germany, Scandinavia) rely on explicit, direct verbal messages. Misunderstanding occurs when styles clash." },
  { cat: "Intercultural", q: "What are Hofstede's cultural dimensions?", a: "<strong>Power Distance</strong> – acceptance of unequal power<br><strong>Individualism vs. Collectivism</strong> – self vs. group focus<br><strong>Masculinity vs. Femininity</strong> – competition vs. cooperation<br><strong>Uncertainty Avoidance</strong> – tolerance for ambiguity<br><strong>Long-term vs. Short-term Orientation</strong> – future vs. present focus<br><strong>Indulgence vs. Restraint</strong> – gratification norms" },
  { cat: "Intercultural", q: "What is ethnocentrism?", a: "<strong>Ethnocentrism</strong> is the tendency to judge other cultures by the standards of one's own culture, viewing one's own as superior. It is a major <strong>barrier to intercultural communication</strong> because it prevents understanding and respect for cultural differences." },
  { cat: "Intercultural", q: "What is cultural relativism?", a: "<strong>Cultural relativism</strong> is the practice of understanding and evaluating a culture by <strong>its own standards</strong> rather than judging it by another culture's values. It promotes open-mindedness and reduces ethnocentric bias." },
  { cat: "Intercultural", q: "What is code-switching in intercultural communication?", a: "<strong>Code-switching</strong> is the practice of alternating between languages, dialects, or communication styles depending on the social context. People code-switch to <strong>fit in, show solidarity, or communicate more effectively</strong> with different audiences." },
  { cat: "Intercultural", q: "What is intercultural communication competence?", a: "The ability to communicate <strong>effectively and appropriately</strong> across cultural boundaries. Key components include <strong>motivation</strong> (desire to interact), <strong>knowledge</strong> (understanding of cultural norms), and <strong>skill</strong> (ability to adapt behavior)." },

  // ===== DIGITAL/MEDIATED =====
  { cat: "Digital/Mediated", q: "What is computer-mediated communication (CMC)?", a: "<strong>CMC</strong> is any communication that occurs through electronic devices — including email, social media, texting, and video calls. It differs from face-to-face by offering <strong>reduced nonverbal cues</strong> and potential for asynchronous interaction." },
  { cat: "Digital/Mediated", q: "What is the difference between synchronous and asynchronous communication?", a: "<strong>Synchronous</strong> communication occurs in real time (video calls, phone calls, live chat). <strong>Asynchronous</strong> communication has a time delay between sending and receiving (email, discussion boards). Each has advantages depending on context and urgency." },
  { cat: "Digital/Mediated", q: "What is media richness theory?", a: "<strong>Media richness theory</strong> ranks communication channels by their ability to convey information effectively. <strong>Rich media</strong> (face-to-face) allows immediate feedback and multiple cues. <strong>Lean media</strong> (text messages) offers fewer cues but is efficient for simple messages." },
  { cat: "Digital/Mediated", q: "What is the hyperpersonal model of CMC?", a: "Proposed by <strong>Joseph Walther</strong>, it suggests that CMC can become <strong>more intimate than face-to-face</strong> interaction because users selectively self-present, receivers idealize senders, and the asynchronous channel allows careful message construction." },
  { cat: "Digital/Mediated", q: "What is digital literacy in the context of communication?", a: "<strong>Digital literacy</strong> is the ability to effectively find, evaluate, create, and communicate information using digital technologies. It includes understanding <strong>privacy, netiquette, source credibility</strong>, and appropriate platform selection for different messages." },
  { cat: "Digital/Mediated", q: "What are the benefits and drawbacks of mediated communication?", a: "<strong>Benefits</strong>: convenience, asynchronous flexibility, broader reach, record keeping, reduced social anxiety<br><strong>Drawbacks</strong>: reduced nonverbal cues, potential for misinterpretation, cyberbullying, digital divide, diminished immediacy and empathy" },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
