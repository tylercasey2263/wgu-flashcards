<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU C841 – Legal Issues in Information Security Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU C841</div>
    <h1>Legal Issues in Information Security</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== US PRIVACY LAWS =====
  { cat: "US Privacy Laws", q: "What is HIPAA and what are its key components?", a: "<strong>HIPAA (Health Insurance Portability and Accountability Act)</strong> protects <strong>Protected Health Information (PHI)</strong>. It includes the <strong>Privacy Rule</strong> (who can access PHI), <strong>Security Rule</strong> (technical safeguards), and <strong>Breach Notification Rule</strong> (requires reporting breaches to affected individuals and HHS)." },
  { cat: "US Privacy Laws", q: "What are covered entities and business associates under HIPAA?", a: "<strong>Covered entities</strong> include health plans, healthcare clearinghouses, and healthcare providers who transmit health data electronically. <strong>Business associates</strong> are third parties that handle PHI on behalf of covered entities and must sign a <strong>Business Associate Agreement (BAA)</strong>." },
  { cat: "US Privacy Laws", q: "What are the three types of HIPAA safeguards?", a: "<strong>Administrative</strong> – risk assessments, workforce training, policies and procedures<br><strong>Physical</strong> – facility access controls, workstation security, device disposal<br><strong>Technical</strong> – access controls, audit controls, encryption, transmission security" },
  { cat: "US Privacy Laws", q: "What is FERPA?", a: "<strong>FERPA (Family Educational Rights and Privacy Act)</strong> protects the privacy of <strong>student education records</strong>. It gives parents rights to access and amend records, and those rights transfer to the student at age 18. Schools need <strong>written consent</strong> before disclosing personally identifiable information." },
  { cat: "US Privacy Laws", q: "What is COPPA?", a: "<strong>COPPA (Children's Online Privacy Protection Act)</strong> requires websites and online services to obtain <strong>verifiable parental consent</strong> before collecting personal information from children under <strong>age 13</strong>. It mandates clear privacy policies and limits data collection to what is necessary." },
  { cat: "US Privacy Laws", q: "What is GLBA?", a: "<strong>GLBA (Gramm-Leach-Bliley Act)</strong> requires financial institutions to explain their <strong>information-sharing practices</strong> and protect customer financial data. It includes the <strong>Financial Privacy Rule</strong>, <strong>Safeguards Rule</strong>, and <strong>Pretexting Protection</strong>." },
  { cat: "US Privacy Laws", q: "What is SOX and how does it relate to information security?", a: "<strong>SOX (Sarbanes-Oxley Act)</strong> requires publicly traded companies to maintain <strong>accurate financial records</strong> and implement internal controls. IT security is critical because financial data must be protected from tampering, and <strong>audit trails</strong> must be maintained for accountability." },
  { cat: "US Privacy Laws", q: "What is FISMA?", a: "<strong>FISMA (Federal Information Security Management Act)</strong> requires <strong>federal agencies</strong> to develop, implement, and maintain information security programs. It mandates risk assessments, security plans, continuous monitoring, and compliance with <strong>NIST standards and guidelines</strong>." },

  // ===== INTERNATIONAL LAW =====
  { cat: "International Law", q: "What are the key principles of GDPR?", a: "<strong>GDPR (General Data Protection Regulation)</strong> governs personal data of EU residents. Key principles include <strong>lawfulness, purpose limitation, data minimization, accuracy, storage limitation, integrity, and accountability</strong>. It applies to any organization worldwide that processes EU residents' data." },
  { cat: "International Law", q: "What are data subject rights under GDPR?", a: "<strong>Right to access</strong> – obtain copies of personal data<br><strong>Right to rectification</strong> – correct inaccurate data<br><strong>Right to erasure</strong> (right to be forgotten) – request deletion<br><strong>Right to data portability</strong> – receive data in transferable format<br><strong>Right to object</strong> – oppose certain processing activities" },
  { cat: "International Law", q: "What is the GDPR breach notification requirement?", a: "Under GDPR, organizations must notify the <strong>supervisory authority within 72 hours</strong> of becoming aware of a personal data breach. If the breach poses a <strong>high risk to individuals</strong>, affected data subjects must also be notified without undue delay." },
  { cat: "International Law", q: "What is the role of a Data Protection Authority (DPA)?", a: "A <strong>DPA</strong> is an independent public authority that <strong>supervises and enforces</strong> data protection laws within its jurisdiction. Under GDPR, each EU member state has a DPA that investigates complaints, conducts audits, and issues fines up to <strong>4% of annual global revenue or 20 million euros</strong>." },
  { cat: "International Law", q: "What is CCPA?", a: "<strong>CCPA (California Consumer Privacy Act)</strong> gives California residents the right to <strong>know what personal data is collected</strong>, request deletion, opt out of data sales, and receive equal service regardless of privacy choices. It applies to businesses meeting specific revenue or data volume thresholds." },
  { cat: "International Law", q: "What is the EU-US Data Privacy Framework?", a: "The <strong>EU-US Data Privacy Framework</strong> (successor to Privacy Shield) provides a mechanism for <strong>lawful transfer of personal data</strong> from the EU to certified US organizations. Companies must self-certify compliance with data protection principles and are subject to FTC enforcement." },

  // ===== CYBERCRIME LAWS =====
  { cat: "Cybercrime Laws", q: "What is the Computer Fraud and Abuse Act (CFAA)?", a: "The <strong>CFAA</strong> is the primary US federal anti-hacking law. It criminalizes <strong>unauthorized access</strong> or exceeding authorized access to protected computers, trafficking in passwords, causing damage through malware, and engaging in computer fraud. Penalties range from fines to imprisonment." },
  { cat: "Cybercrime Laws", q: "What is the Electronic Communications Privacy Act (ECPA)?", a: "The <strong>ECPA</strong> protects electronic communications from unauthorized interception. It has three parts: the <strong>Wiretap Act</strong> (real-time interception), the <strong>Stored Communications Act</strong> (stored data), and the <strong>Pen Register Act</strong> (metadata collection). It sets requirements for law enforcement access." },
  { cat: "Cybercrime Laws", q: "What is CISA in the context of cybersecurity legislation?", a: "<strong>CISA (Cybersecurity Information Sharing Act)</strong> encourages voluntary <strong>sharing of cyber threat indicators</strong> between private companies and the federal government. It provides <strong>liability protections</strong> for organizations that share threat intelligence in good faith." },
  { cat: "Cybercrime Laws", q: "What are the main categories of computer crimes?", a: "<strong>Computer as target</strong> – attacks on systems (hacking, DDoS, malware)<br><strong>Computer as tool</strong> – using computers to commit crimes (fraud, identity theft)<br><strong>Computer as incidental</strong> – computer contains evidence of crime (drug records)<br>Understanding the category affects which laws apply and how evidence is handled." },
  { cat: "Cybercrime Laws", q: "What is the chain of custody in digital evidence?", a: "<strong>Chain of custody</strong> documents every person who handled evidence, when they handled it, and what actions they took. It proves evidence <strong>has not been tampered with</strong> from collection through trial. A broken chain can render digital evidence <strong>inadmissible in court</strong>." },
  { cat: "Cybercrime Laws", q: "What is attorney-client privilege in the context of IT investigations?", a: "<strong>Attorney-client privilege</strong> protects confidential communications between a client and their lawyer. In IT investigations, involving legal counsel early ensures that <strong>forensic findings and internal reports</strong> may be protected from discovery. However, the privilege does not cover communications made to further a crime." },

  // ===== INTELLECTUAL PROPERTY =====
  { cat: "Intellectual Property", q: "What are the four types of intellectual property protection?", a: "<strong>Copyright</strong> – protects original works of authorship (code, books, music)<br><strong>Patent</strong> – protects inventions and processes for 20 years<br><strong>Trademark</strong> – protects brand identifiers (logos, names, slogans)<br><strong>Trade secret</strong> – protects confidential business information (formulas, algorithms)" },
  { cat: "Intellectual Property", q: "How does copyright apply to software?", a: "<strong>Software source code</strong> is automatically protected by copyright upon creation. Copyright protects the <strong>expression</strong> of code, not the underlying idea or algorithm. Registration with the US Copyright Office provides additional legal benefits including the ability to sue for <strong>statutory damages</strong>." },
  { cat: "Intellectual Property", q: "What is the difference between open source and proprietary software licensing?", a: "<strong>Open source</strong> licenses (GPL, MIT, Apache) allow users to view, modify, and distribute source code with varying restrictions. <strong>Proprietary</strong> licenses restrict access to source code and limit usage rights. An <strong>EULA (End User License Agreement)</strong> defines the terms for proprietary software." },
  { cat: "Intellectual Property", q: "What is a trade secret and how is it legally protected?", a: "A <strong>trade secret</strong> is confidential business information that provides competitive advantage (e.g., algorithms, customer lists). It is protected under the <strong>Defend Trade Secrets Act (DTSA)</strong> and requires the owner to take <strong>reasonable measures</strong> (NDAs, access controls) to maintain secrecy." },
  { cat: "Intellectual Property", q: "What is the DMCA?", a: "The <strong>Digital Millennium Copyright Act (DMCA)</strong> criminalizes the <strong>circumvention of digital rights management (DRM)</strong> and other technological protection measures. It also provides <strong>safe harbor</strong> provisions for internet service providers who promptly remove infringing content upon notification." },

  // ===== CONTRACTS & LIABILITY =====
  { cat: "Contracts & Liability", q: "What is the E-SIGN Act?", a: "The <strong>E-SIGN Act (Electronic Signatures in Global and National Commerce Act)</strong> gives <strong>electronic signatures the same legal validity</strong> as handwritten signatures for commercial transactions. It requires consumer consent for electronic records and applies to interstate and international commerce." },
  { cat: "Contracts & Liability", q: "What are the key elements of an NDA in information security?", a: "A <strong>Non-Disclosure Agreement (NDA)</strong> defines <strong>confidential information</strong>, obligations of the receiving party, duration of the agreement, permitted disclosures, and remedies for breach. NDAs protect trade secrets and sensitive data shared during business relationships or employment." },
  { cat: "Contracts & Liability", q: "What is an SLA and why is it important for security?", a: "A <strong>Service Level Agreement (SLA)</strong> defines measurable performance standards between a service provider and customer. Security-relevant SLA terms include <strong>uptime guarantees, incident response times, data protection requirements</strong>, breach notification obligations, and audit rights." },
  { cat: "Contracts & Liability", q: "What is negligence in the context of IT security?", a: "<strong>Negligence</strong> occurs when an organization fails to exercise <strong>reasonable care</strong> in protecting information assets, resulting in harm. Elements include duty of care, breach of duty, causation, and damages. Organizations can be held <strong>liable</strong> for data breaches caused by inadequate security measures." },
  { cat: "Contracts & Liability", q: "What is the difference between civil and criminal liability in cybersecurity?", a: "<strong>Civil liability</strong> involves lawsuits between private parties seeking monetary damages (e.g., breach victims suing a company). <strong>Criminal liability</strong> involves government prosecution for violations of criminal statutes (e.g., CFAA violations) and can result in <strong>fines and imprisonment</strong>." },

  // ===== COMPLIANCE FRAMEWORKS =====
  { cat: "Compliance Frameworks", q: "How do HIPAA, PCI-DSS, and SOX differ in scope?", a: "<table class='algo-table'><tr><th>Framework</th><th>Scope</th><th>Protects</th></tr><tr><td>HIPAA</td><td>Healthcare</td><td>Protected Health Information (PHI)</td></tr><tr><td>PCI-DSS</td><td>Payment processing</td><td>Cardholder data</td></tr><tr><td>SOX</td><td>Public companies</td><td>Financial records and reporting</td></tr></table>" },
  { cat: "Compliance Frameworks", q: "What is the relationship between FISMA and NIST?", a: "<strong>FISMA</strong> mandates that federal agencies implement information security programs, and it designates <strong>NIST</strong> as the body responsible for developing the <strong>standards and guidelines</strong> agencies must follow. Key NIST publications include <span class='tag'>SP 800-53</span> (security controls) and the <span class='tag'>NIST CSF</span>." },
  { cat: "Compliance Frameworks", q: "What is regulatory compliance vs. voluntary compliance?", a: "<strong>Regulatory compliance</strong> is mandated by law and carries penalties for non-compliance (HIPAA, GDPR, SOX). <strong>Voluntary compliance</strong> follows industry best practices and frameworks (ISO 27001, NIST CSF) without legal mandate but demonstrates <strong>due diligence</strong> and may reduce liability." },
  { cat: "Compliance Frameworks", q: "What are the consequences of non-compliance with data protection laws?", a: "Consequences include <strong>financial penalties</strong> (GDPR fines up to 4% of global revenue), <strong>legal liability</strong> (lawsuits from affected individuals), <strong>reputational damage</strong>, loss of business, regulatory sanctions, and in some cases <strong>criminal prosecution</strong> of responsible individuals." },

  // ===== ETHICS =====
  { cat: "Ethics", q: "What are the four canons of the ISC2 Code of Ethics?", a: "<strong>1.</strong> Protect society, the common good, necessary public trust, and the infrastructure<br><strong>2.</strong> Act honorably, honestly, justly, responsibly, and legally<br><strong>3.</strong> Provide diligent and competent service to principals<br><strong>4.</strong> Advance and protect the profession<br>Canon 1 always takes <strong>highest priority</strong>." },
  { cat: "Ethics", q: "What is the ethical obligation of responsible disclosure?", a: "<strong>Responsible disclosure</strong> is the practice of privately notifying a vendor about a security vulnerability and allowing <strong>reasonable time to patch</strong> before public disclosure. It balances the public's right to know with the need to prevent exploitation of unpatched systems." },
  { cat: "Ethics", q: "What is the difference between ethics and law in information security?", a: "<strong>Laws</strong> are enforceable rules enacted by government with defined penalties. <strong>Ethics</strong> are moral principles guiding behavior that may not have legal enforcement. An action can be <strong>legal but unethical</strong> (selling user data without clear disclosure) or <strong>illegal but arguably ethical</strong> (whistleblowing)." },
  { cat: "Ethics", q: "What ethical issues arise with employee monitoring?", a: "Employee monitoring raises tensions between <strong>organizational security needs</strong> and <strong>employee privacy rights</strong>. Ethical practice requires <strong>transparent policies, informed consent, proportional monitoring</strong>, and legitimate business justification. Excessive or covert monitoring can erode trust and violate privacy laws." },
  { cat: "Ethics", q: "What is the ethical principle of informed consent in data collection?", a: "<strong>Informed consent</strong> requires that individuals are given <strong>clear, understandable information</strong> about what data is being collected, how it will be used, who it will be shared with, and how long it will be retained — and they must <strong>voluntarily agree</strong> before collection begins." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
