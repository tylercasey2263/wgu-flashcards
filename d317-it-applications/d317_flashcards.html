<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D317 – IT Applications Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D317</div>
    <h1>IT Applications</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== PRODUCTIVITY SOFTWARE =====
  { cat: "Productivity Software", q: "What is Microsoft 365 and how does it differ from Office 2019?", a: "<strong>Microsoft 365</strong> is a cloud-based subscription service providing Office apps (Word, Excel, PowerPoint), cloud storage (OneDrive), and collaboration tools (Teams). <strong>Office 2019</strong> is a one-time purchase with no cloud features or automatic updates. Microsoft 365 ensures users always have the latest version." },
  { cat: "Productivity Software", q: "What is Google Workspace?", a: "<strong>Google Workspace</strong> (formerly G Suite) is Google's cloud-based productivity suite. It includes <strong>Google Docs</strong> (word processing), <strong>Sheets</strong> (spreadsheets), <strong>Slides</strong> (presentations), <strong>Drive</strong> (storage), <strong>Gmail</strong>, <strong>Calendar</strong>, and <strong>Meet</strong>. All apps support real-time collaboration and auto-save." },
  { cat: "Productivity Software", q: "What are common file formats and their uses?", a: "<table class='algo-table'><tr><th>Format</th><th>Type</th><th>Use</th></tr><tr><td>.docx</td><td>Word document</td><td>Word processing</td></tr><tr><td>.xlsx</td><td>Excel workbook</td><td>Spreadsheets</td></tr><tr><td>.pptx</td><td>PowerPoint</td><td>Presentations</td></tr><tr><td>.pdf</td><td>Portable Document</td><td>Universal sharing</td></tr><tr><td>.csv</td><td>Comma-separated</td><td>Data exchange</td></tr><tr><td>.txt</td><td>Plain text</td><td>Simple text files</td></tr></table>" },
  { cat: "Productivity Software", q: "What are essential keyboard shortcuts for productivity?", a: "<span class='tag'>Ctrl+C</span> Copy <span class='tag'>Ctrl+V</span> Paste <span class='tag'>Ctrl+X</span> Cut<br><span class='tag'>Ctrl+Z</span> Undo <span class='tag'>Ctrl+Y</span> Redo<br><span class='tag'>Ctrl+S</span> Save <span class='tag'>Ctrl+P</span> Print<br><span class='tag'>Ctrl+F</span> Find <span class='tag'>Ctrl+A</span> Select All<br><span class='tag'>Ctrl+B</span> Bold <span class='tag'>Ctrl+I</span> Italic" },
  { cat: "Productivity Software", q: "What is cloud storage and what are its benefits?", a: "<strong>Cloud storage</strong> saves files on remote servers accessible via the internet. Benefits include: <strong>access from any device</strong>, automatic <strong>backup and sync</strong>, easy <strong>file sharing</strong> and collaboration, <strong>version history</strong> to recover previous versions, and reduced dependence on local hardware." },

  // ===== WORD PROCESSING =====
  { cat: "Word Processing", q: "What are styles in Word/Docs and why should you use them?", a: "<strong>Styles</strong> are predefined formatting sets (Heading 1, Heading 2, Normal, etc.) that ensure consistent document formatting. Using styles enables automatic <strong>table of contents generation</strong>, consistent <strong>visual hierarchy</strong>, easy <strong>global formatting changes</strong>, and proper document <strong>accessibility</strong> structure." },
  { cat: "Word Processing", q: "What is mail merge and how does it work?", a: "<strong>Mail merge</strong> combines a document template with a data source (spreadsheet or database) to generate personalized documents in bulk. The template contains <strong>merge fields</strong> (placeholders) that are replaced with individual data. Common uses include personalized letters, labels, envelopes, and email campaigns." },
  { cat: "Word Processing", q: "How do headers, footers, and page numbers work?", a: "<strong>Headers</strong> appear at the top and <strong>footers</strong> at the bottom of every page. They commonly contain <strong>page numbers</strong>, document titles, dates, or author names. You can set different headers/footers for the <strong>first page</strong>, <strong>odd/even pages</strong>, and different <strong>sections</strong> of the document." },
  { cat: "Word Processing", q: "What is the difference between a section break and a page break?", a: "A <strong>page break</strong> forces text to the next page but maintains the same formatting. A <strong>section break</strong> divides the document into sections that can have <strong>different formatting</strong> — different margins, headers/footers, page orientation, or column layouts within the same document." },
  { cat: "Word Processing", q: "How do you insert and format tables in a word processor?", a: "Tables organize data in <strong>rows and columns</strong>. You can insert tables by specifying dimensions or drawing them. Key formatting options include <strong>merging/splitting cells</strong>, adjusting <strong>column widths</strong>, applying <strong>table styles</strong>, adding <strong>borders and shading</strong>, and setting a <strong>header row</strong> that repeats on each page." },

  // ===== SPREADSHEETS =====
  { cat: "Spreadsheets", q: "What are the most commonly used Excel/Sheets formulas?", a: "<span class='tag'>=SUM(A1:A10)</span> — adds values in a range.<br><span class='tag'>=AVERAGE(A1:A10)</span> — calculates the mean.<br><span class='tag'>=COUNT(A1:A10)</span> — counts numeric entries.<br><span class='tag'>=MAX(A1:A10)</span> / <span class='tag'>=MIN(A1:A10)</span> — finds highest/lowest value.<br><span class='tag'>=IF(A1>10,\"Yes\",\"No\")</span> — conditional logic." },
  { cat: "Spreadsheets", q: "How does the VLOOKUP function work?", a: "<span class='tag'>=VLOOKUP(lookup_value, table_array, col_index, [range_lookup])</span> searches the <strong>first column</strong> of a table for a value and returns a value from a specified column in the same row. Set the last parameter to <strong>FALSE</strong> for an exact match. Note: VLOOKUP only searches to the <strong>right</strong>." },
  { cat: "Spreadsheets", q: "What is a pivot table and what is it used for?", a: "A <strong>pivot table</strong> summarizes and analyzes large datasets by reorganizing data into meaningful groups. You can drag fields into <strong>Rows</strong>, <strong>Columns</strong>, <strong>Values</strong> (aggregated with SUM, COUNT, etc.), and <strong>Filters</strong>. Pivot tables let you quickly answer questions like total sales by region or average score by department." },
  { cat: "Spreadsheets", q: "What is conditional formatting?", a: "<strong>Conditional formatting</strong> automatically changes cell appearance (color, font, icons) based on rules you define. Examples: highlighting cells <strong>above a threshold</strong> in green, marking <strong>duplicates</strong> in red, or using <strong>data bars</strong> to visualize relative values. It helps quickly identify patterns, outliers, and trends." },
  { cat: "Spreadsheets", q: "What are the common chart types in spreadsheets?", a: "<strong>Bar/Column</strong> — compares categories side by side.<br><strong>Line</strong> — shows trends over time.<br><strong>Pie</strong> — shows proportions of a whole (use sparingly, max 5-6 slices).<br><strong>Scatter</strong> — shows relationships between two variables.<br><strong>Area</strong> — like line charts but shows volume over time." },
  { cat: "Spreadsheets", q: "What is the difference between relative and absolute cell references?", a: "A <strong>relative reference</strong> (A1) changes when a formula is copied to another cell — it adjusts relative to the new position. An <strong>absolute reference</strong> ($A$1) stays fixed no matter where the formula is copied. <strong>Mixed references</strong> ($A1 or A$1) lock only the column or row." },
  { cat: "Spreadsheets", q: "How does the IF function work in Excel?", a: "<span class='tag'>=IF(condition, value_if_true, value_if_false)</span> evaluates a logical condition and returns one value if TRUE and another if FALSE. Example: <span class='tag'>=IF(B2>=70,\"Pass\",\"Fail\")</span>. You can nest multiple IF statements or use <strong>IFS</strong> for multiple conditions." },

  // ===== PRESENTATIONS =====
  { cat: "Presentations", q: "What is a slide master and why is it important?", a: "The <strong>Slide Master</strong> is a top-level slide that controls the overall theme, fonts, colors, backgrounds, and placeholder positions for all slides. Changes to the Slide Master <strong>automatically apply</strong> to every slide using that layout, ensuring visual consistency across the entire presentation." },
  { cat: "Presentations", q: "What is the difference between transitions and animations?", a: "<strong>Transitions</strong> are visual effects applied between slides — they control how one slide changes to the next (fade, wipe, push). <strong>Animations</strong> are effects applied to individual objects within a slide — making text, images, or shapes appear, move, or disappear during the slide." },
  { cat: "Presentations", q: "What are best practices for effective presentations?", a: "Follow the <strong>6x6 rule</strong> — no more than 6 bullet points with 6 words each.<br>Use <strong>high-contrast</strong> text and backgrounds for readability.<br>Include <strong>visuals</strong> (images, charts) over text-heavy slides.<br>Maintain <strong>consistent fonts and colors</strong> using the slide master.<br>Use animations <strong>sparingly</strong> to avoid distraction." },
  { cat: "Presentations", q: "What is presenter view in PowerPoint?", a: "<strong>Presenter View</strong> shows the current slide, next slide preview, speaker notes, and a timer on the presenter's screen while the audience only sees the current slide. It helps speakers stay on track, reference key talking points, and manage timing during the presentation." },

  // ===== DATABASES =====
  { cat: "Databases", q: "What are the main objects in a database like Microsoft Access?", a: "<strong>Tables</strong> — store data in rows (records) and columns (fields).<br><strong>Queries</strong> — retrieve and filter specific data from tables.<br><strong>Forms</strong> — provide user-friendly interfaces for data entry.<br><strong>Reports</strong> — format and present data for printing or viewing.<br>These four objects are the core components of a relational database application." },
  { cat: "Databases", q: "What is a primary key in a database?", a: "A <strong>primary key</strong> is a field (or combination of fields) that uniquely identifies each record in a table. It must be <strong>unique</strong> (no duplicates) and <strong>not null</strong> (must have a value). Examples include Student ID, Order Number, or ISBN. Primary keys enable efficient searching and establish relationships between tables." },
  { cat: "Databases", q: "What is a query and what types are common?", a: "A <strong>query</strong> is a request to retrieve, update, or manipulate data. <strong>Select queries</strong> retrieve specific records based on criteria. <strong>Action queries</strong> can update, delete, or append records. Queries use criteria, sorting, and calculated fields to extract meaningful information from one or more tables." },
  { cat: "Databases", q: "What is a database relationship?", a: "A <strong>relationship</strong> links tables through shared fields (usually primary key to foreign key). <strong>One-to-one</strong> — one record matches one record. <strong>One-to-many</strong> — one record matches many records (most common). <strong>Many-to-many</strong> — requires a junction table. Relationships reduce data redundancy and enforce <strong>referential integrity</strong>." },
  { cat: "Databases", q: "What is data normalization?", a: "<strong>Normalization</strong> organizes database tables to reduce <strong>redundancy</strong> and improve <strong>data integrity</strong>. <strong>1NF</strong> — eliminate repeating groups, ensure atomic values. <strong>2NF</strong> — remove partial dependencies on a composite key. <strong>3NF</strong> — remove transitive dependencies. Normalization prevents update, insertion, and deletion anomalies." },

  // ===== COLLABORATION TOOLS =====
  { cat: "Collaboration Tools", q: "How do OneDrive and Google Drive compare?", a: "<strong>OneDrive</strong> — Microsoft's cloud storage, integrates with Microsoft 365, 5 GB free (1 TB with M365 subscription). <strong>Google Drive</strong> — Google's cloud storage, integrates with Google Workspace, 15 GB free. Both support file sharing, syncing, version history, and real-time collaboration on documents." },
  { cat: "Collaboration Tools", q: "What features do Microsoft Teams and Google Meet provide?", a: "<strong>Microsoft Teams</strong> offers chat, video calls, file sharing, channels, app integration, and screen sharing — deeply integrated with Microsoft 365. <strong>Google Meet</strong> provides video conferencing with screen sharing, chat, breakout rooms, and recording — integrated with Google Calendar and Workspace." },
  { cat: "Collaboration Tools", q: "What are best practices for professional email communication?", a: "Use a <strong>clear, specific subject line</strong>. Keep messages <strong>concise and organized</strong>. Use <strong>proper greeting and closing</strong>. <strong>Proofread</strong> before sending. Use <strong>CC</strong> for informational recipients and <strong>BCC</strong> to protect recipient privacy. Avoid <strong>Reply All</strong> unless everyone needs the response. Respond within <strong>24 hours</strong>." },
  { cat: "Collaboration Tools", q: "What is version history and why is it important?", a: "<strong>Version history</strong> automatically saves previous versions of a file, allowing you to view changes, see who made them, and <strong>restore</strong> any earlier version. It prevents data loss from accidental edits or deletions and provides an audit trail of document changes over time." },

  // ===== DIGITAL LITERACY =====
  { cat: "Digital Literacy", q: "What is digital citizenship?", a: "<strong>Digital citizenship</strong> is the responsible and ethical use of technology and the internet. It encompasses <strong>digital etiquette</strong> (respectful online behavior), <strong>digital literacy</strong> (evaluating online information), <strong>digital security</strong> (protecting personal data), and understanding <strong>digital footprints</strong> — the permanent trail of online activity." },
  { cat: "Digital Literacy", q: "What is the difference between copyright, Creative Commons, and public domain?", a: "<strong>Copyright</strong> — automatic legal protection giving creators exclusive rights to their work.<br><strong>Creative Commons (CC)</strong> — licenses that allow creators to specify how others may use their work (e.g., CC BY, CC BY-SA, CC BY-NC).<br><strong>Public domain</strong> — works with expired or waived copyright, free for anyone to use." },
  { cat: "Digital Literacy", q: "What is phishing and how can you identify it?", a: "<strong>Phishing</strong> is a social engineering attack using fake emails or websites to steal credentials or personal information. Warning signs include: <strong>generic greetings</strong>, <strong>urgent language</strong> demanding immediate action, <strong>misspelled URLs</strong>, <strong>suspicious attachments</strong>, mismatched <strong>sender addresses</strong>, and requests for <strong>sensitive information</strong>." },
  { cat: "Digital Literacy", q: "What is accessibility in digital content?", a: "<strong>Accessibility</strong> ensures digital content is usable by people with disabilities. Key practices include: using <strong>alt text</strong> on images, proper <strong>heading structure</strong>, <strong>sufficient color contrast</strong>, <strong>keyboard navigation</strong> support, <strong>captions</strong> on videos, and following <strong>WCAG (Web Content Accessibility Guidelines)</strong> standards." },
  { cat: "Digital Literacy", q: "What is two-factor authentication and why should you use it?", a: "<strong>Two-factor authentication (2FA)</strong> adds a second verification step beyond a password. After entering your password, you must provide a second factor — typically a <strong>code from an authenticator app</strong>, <strong>SMS code</strong>, or <strong>biometric scan</strong>. This greatly reduces the risk of account compromise even if your password is stolen." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
