<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D340 – Cyber Defense and Countermeasures Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D340</div>
    <h1>Cyber Defense and Countermeasures</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== DEFENSE STRATEGIES =====
  { cat: "Defense Strategies", q: "What is defense in depth?", a: "A security strategy that uses <strong>multiple layers of controls</strong> to protect assets. If one layer fails, the next provides protection. Layers include physical, network, host, application, and data security. It ensures no <strong>single point of failure</strong> exists in the security architecture." },
  { cat: "Defense Strategies", q: "What is zero trust architecture?", a: "<strong>Zero trust</strong> operates on the principle of <strong>never trust, always verify</strong>. Every access request is authenticated and authorized regardless of source location. Key components include <strong>micro-segmentation, least privilege, MFA</strong>, and continuous verification of users and devices." },
  { cat: "Defense Strategies", q: "What is the Lockheed Martin Cyber Kill Chain?", a: "A seven-phase model of a cyberattack:<br><strong>1)</strong> Reconnaissance<br><strong>2)</strong> Weaponization<br><strong>3)</strong> Delivery<br><strong>4)</strong> Exploitation<br><strong>5)</strong> Installation<br><strong>6)</strong> Command & Control (C2)<br><strong>7)</strong> Actions on Objectives<br>Defenders aim to <strong>break the chain</strong> at the earliest possible phase." },
  { cat: "Defense Strategies", q: "What is the MITRE ATT&CK framework?", a: "A knowledge base of <strong>adversary tactics, techniques, and procedures (TTPs)</strong> based on real-world observations. It organizes attacks into tactics (the goal) and techniques (how). Used for <strong>threat modeling, detection engineering, and gap analysis</strong> in security programs." },
  { cat: "Defense Strategies", q: "What is the difference between IOC and IOA?", a: "<strong>IOC (Indicator of Compromise)</strong> is evidence that an attack <strong>has occurred</strong> (malicious IP, file hash, domain). <strong>IOA (Indicator of Attack)</strong> identifies attacker <strong>behavior in progress</strong> (unusual process execution, lateral movement). IOAs enable <strong>proactive detection</strong>." },
  { cat: "Defense Strategies", q: "What are honeypots and deception technology?", a: "<strong>Honeypots</strong> are decoy systems designed to <strong>attract and detect attackers</strong>. <strong>Deception technology</strong> extends this with fake credentials, files, and network segments. They provide <strong>early warning</strong> of intrusion, gather threat intelligence, and waste attacker resources." },

  // ===== SOC OPERATIONS =====
  { cat: "SOC Operations", q: "What are the SOC analyst tiers?", a: "<strong>L1 (Tier 1)</strong> – monitors alerts, performs initial triage, escalates true positives<br><strong>L2 (Tier 2)</strong> – deep-dive investigation, correlation, incident handling<br><strong>L3 (Tier 3)</strong> – advanced threat hunting, malware analysis, engineering detection rules, and incident lead" },
  { cat: "SOC Operations", q: "What is a SIEM and how does it work?", a: "<strong>SIEM (Security Information and Event Management)</strong> collects and aggregates <strong>logs from multiple sources</strong>, correlates events using rules, and generates alerts. It provides a centralized view for <strong>real-time monitoring, threat detection, and compliance reporting</strong>." },
  { cat: "SOC Operations", q: "What is SOAR?", a: "<strong>SOAR (Security Orchestration, Automation, and Response)</strong> automates repetitive SOC tasks through <strong>playbooks</strong>. It integrates with SIEM, ticketing, and security tools to speed up <strong>incident response</strong>, reduce analyst fatigue, and ensure consistent handling of common alerts." },
  { cat: "SOC Operations", q: "What is threat hunting?", a: "<strong>Threat hunting</strong> is the <strong>proactive search</strong> for threats that have evaded automated detection. Hunters use hypotheses, threat intelligence, and behavioral analytics to find <strong>hidden adversaries</strong>. It differs from monitoring, which is reactive and alert-driven." },
  { cat: "SOC Operations", q: "What are STIX and TAXII?", a: "<strong>STIX</strong> (Structured Threat Information Expression) is a standardized <strong>language for describing threat intelligence</strong> (indicators, campaigns, TTPs). <strong>TAXII</strong> (Trusted Automated Exchange of Intelligence Information) is the <strong>transport protocol</strong> for sharing STIX data between organizations." },
  { cat: "SOC Operations", q: "What are MTTD and MTTR in security?", a: "<strong>MTTD (Mean Time to Detect)</strong> measures the average time to <strong>discover a security incident</strong> after it occurs. <strong>MTTR (Mean Time to Respond)</strong> measures the average time to <strong>contain and remediate</strong> after detection. Lower values indicate a more effective security operation." },

  // ===== INCIDENT RESPONSE =====
  { cat: "Incident Response", q: "What are the NIST incident response phases?", a: "<strong>1)</strong> Preparation – policies, tools, training<br><strong>2)</strong> Detection & Analysis – identify and validate incidents<br><strong>3)</strong> Containment – limit damage (short-term and long-term)<br><strong>4)</strong> Eradication – remove the threat<br><strong>5)</strong> Recovery – restore systems<br><strong>6)</strong> Lessons Learned – post-incident review" },
  { cat: "Incident Response", q: "What is the preparation phase of incident response?", a: "The <strong>preparation phase</strong> establishes the IR capability before incidents occur. It includes developing <strong>IR plans and playbooks</strong>, forming the IR team, deploying tools (SIEM, EDR), conducting tabletop exercises, and establishing communication procedures." },
  { cat: "Incident Response", q: "What is containment in incident response?", a: "<strong>Containment</strong> limits the scope and impact of an active incident. <strong>Short-term containment</strong> isolates affected systems immediately (network isolation, account disabling). <strong>Long-term containment</strong> applies temporary fixes to keep business running while preparing for eradication." },
  { cat: "Incident Response", q: "What is digital forensics and how does it integrate with IR?", a: "<strong>Digital forensics</strong> collects, preserves, and analyzes digital evidence in a <strong>legally defensible manner</strong>. It integrates with IR by providing evidence for root cause analysis, supporting legal proceedings, and maintaining <strong>chain of custody</strong> for all collected artifacts." },
  { cat: "Incident Response", q: "What is memory forensics?", a: "<strong>Memory forensics</strong> analyzes the contents of a system's <strong>RAM</strong> to find evidence of malware, injected code, encryption keys, and running processes. Tools like <strong>Volatility</strong> extract artifacts that may not exist on disk, revealing <strong>fileless malware and rootkits</strong>." },
  { cat: "Incident Response", q: "Why are lessons learned important after an incident?", a: "The <strong>lessons learned</strong> meeting reviews the incident to identify <strong>what worked, what failed, and what should change</strong>. It produces actionable improvements to processes, tools, and training. Without this step, organizations repeat the same mistakes and fail to improve." },

  // ===== THREAT INTELLIGENCE =====
  { cat: "Threat Intelligence", q: "What is the difference between static and dynamic malware analysis?", a: "<strong>Static analysis</strong> examines malware <strong>without executing it</strong> — reviewing file properties, strings, headers, and disassembled code. <strong>Dynamic analysis</strong> runs malware in a <strong>controlled sandbox</strong> to observe its behavior (network calls, file changes, registry modifications)." },
  { cat: "Threat Intelligence", q: "What is sandboxing?", a: "A <strong>sandbox</strong> is an isolated environment used to safely <strong>execute and observe suspicious code</strong> without risking production systems. It records the malware's behavior including network traffic, file system changes, and process creation for analysis and detection signature development." },
  { cat: "Threat Intelligence", q: "What are the levels of threat intelligence?", a: "<strong>Strategic</strong> – high-level trends for executives (who, why)<br><strong>Tactical</strong> – TTPs for security teams (how)<br><strong>Operational</strong> – details about specific attacks (when, where)<br><strong>Technical</strong> – IOCs for automated tools (what — IPs, hashes, domains)" },

  // ===== ENDPOINT DEFENSE =====
  { cat: "Endpoint Defense", q: "What is the difference between EDR, AV, and XDR?", a: "<strong>AV</strong> – signature-based malware detection (reactive)<br><strong>EDR</strong> – continuous endpoint monitoring, behavioral detection, investigation, and response capabilities<br><strong>XDR</strong> – extends EDR across <strong>endpoints, network, cloud, and email</strong> with correlated detection and centralized response" },
  { cat: "Endpoint Defense", q: "What is application whitelisting?", a: "<strong>Application whitelisting</strong> (allowlisting) permits only <strong>pre-approved applications</strong> to execute on a system. Everything not on the list is blocked by default. It is highly effective against malware but requires careful <strong>maintenance of the approved application list</strong>." },
  { cat: "Endpoint Defense", q: "What are CIS Benchmarks for endpoint hardening?", a: "<strong>CIS Benchmarks</strong> are consensus-based <strong>security configuration guides</strong> for operating systems, applications, and devices. They provide step-by-step hardening instructions including disabling unnecessary services, enforcing password policies, and applying <strong>least privilege</strong> settings." },
  { cat: "Endpoint Defense", q: "What is the vulnerability management lifecycle?", a: "<strong>1)</strong> Discover – inventory all assets<br><strong>2)</strong> Assess – scan for vulnerabilities<br><strong>3)</strong> Prioritize – rank by risk (CVSS + business context)<br><strong>4)</strong> Remediate – patch, configure, or mitigate<br><strong>5)</strong> Verify – confirm fixes are applied<br><strong>6)</strong> Report – communicate status to stakeholders" },

  // ===== NETWORK DEFENSE =====
  { cat: "Network Defense", q: "What is the difference between IDS and IPS?", a: "<strong>IDS (Intrusion Detection System)</strong> passively <strong>monitors and alerts</strong> on suspicious traffic. <strong>IPS (Intrusion Prevention System)</strong> sits inline and <strong>actively blocks</strong> malicious traffic in real time. Both use signature-based and anomaly-based detection methods." },
  { cat: "Network Defense", q: "What is a WAF (Web Application Firewall)?", a: "A <strong>WAF</strong> filters and monitors HTTP traffic between a web application and the internet. It protects against <strong>OWASP Top 10 attacks</strong> (SQL injection, XSS, CSRF) by inspecting request content. It operates at <strong>Layer 7</strong> of the OSI model." },
  { cat: "Network Defense", q: "What is network segmentation?", a: "<strong>Network segmentation</strong> divides a network into <strong>isolated zones</strong> with controlled access between them. It limits <strong>lateral movement</strong> by attackers, contains breaches, and enforces the principle of least privilege at the network level using VLANs, firewalls, and ACLs." },
  { cat: "Network Defense", q: "What are firewall rule best practices?", a: "Apply <strong>default deny</strong> (block everything not explicitly allowed). Order rules from <strong>most specific to least specific</strong>. Regularly review and remove unused rules. Log denied traffic for analysis. Use <strong>stateful inspection</strong> to track connection states for more intelligent filtering." },
  { cat: "Network Defense", q: "What is DLP (Data Loss Prevention)?", a: "<strong>DLP</strong> detects and prevents the <strong>unauthorized transfer of sensitive data</strong> outside the organization. It monitors data in motion (network), at rest (storage), and in use (endpoints). DLP uses content inspection, context analysis, and policy rules to block or alert on violations." },

  // ===== HARDENING =====
  { cat: "Hardening", q: "What is system hardening?", a: "<strong>System hardening</strong> reduces the attack surface by removing unnecessary software, disabling unused services, applying patches, configuring <strong>secure settings</strong>, and enforcing least privilege. It follows the principle: only enable what is needed and deny everything else." },
  { cat: "Hardening", q: "What is patch management?", a: "The process of <strong>identifying, testing, and deploying</strong> software updates to fix vulnerabilities. An effective program includes asset inventory, vulnerability scanning, patch prioritization by risk, <strong>testing before deployment</strong>, rollback plans, and compliance verification." },
  { cat: "Hardening", q: "How should pen test findings be remediated?", a: "Findings should be <strong>prioritized by CVSS score and business impact</strong>. Critical and high findings need immediate remediation. Each finding requires an owner, a remediation plan with timeline, and <strong>verification testing</strong> to confirm the fix. Exceptions need documented risk acceptance." },
  { cat: "Hardening", q: "What is the principle of least privilege in hardening?", a: "<strong>Least privilege</strong> grants users and processes only the <strong>minimum permissions</strong> necessary to perform their function. It limits the damage from compromised accounts, reduces the attack surface, and should be enforced across <strong>user accounts, services, and network access</strong>." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
