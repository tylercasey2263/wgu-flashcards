<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D329 – Network and Security Applications Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D329</div>
    <h1>Network and Security - Applications</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== FIREWALLS & IDS/IPS =====
  { cat: "Firewalls & IDS/IPS", q: "What is the difference between a stateful and stateless firewall?", a: "A <strong>stateless firewall</strong> evaluates each packet independently against static rules based on source/destination IP, port, and protocol. A <strong>stateful firewall</strong> tracks the state of active connections in a state table and makes decisions based on the context of the entire traffic flow, providing stronger security." },
  { cat: "Firewalls & IDS/IPS", q: "What is a next-generation firewall (NGFW)?", a: "A <strong>NGFW</strong> combines traditional firewall capabilities with advanced features including <strong>deep packet inspection (DPI)</strong>, <strong>application awareness</strong> (Layer 7 filtering), <strong>intrusion prevention (IPS)</strong>, <strong>SSL/TLS decryption</strong>, and <strong>threat intelligence integration</strong>. NGFWs can identify and control applications regardless of port used." },
  { cat: "Firewalls & IDS/IPS", q: "What is a DMZ and how is it architected?", a: "A <strong>DMZ (Demilitarized Zone)</strong> is a network segment between an external and internal firewall that hosts public-facing services (web servers, email servers). It allows external access to these services while protecting the internal network. Traffic from the internet reaches the DMZ but cannot directly access the internal LAN." },
  { cat: "Firewalls & IDS/IPS", q: "How do signature-based, anomaly-based, and behavior-based detection differ?", a: "<strong>Signature-based</strong> – matches traffic against known attack patterns; fast but misses zero-day threats<br><strong>Anomaly-based</strong> – establishes a baseline of normal behavior and alerts on deviations; can detect unknown threats but has higher false positives<br><strong>Behavior-based</strong> – analyzes the behavior and intent of code/traffic; effective against polymorphic malware" },
  { cat: "Firewalls & IDS/IPS", q: "What is the difference between an IDS and an IPS?", a: "An <strong>IDS (Intrusion Detection System)</strong> is deployed passively (out-of-band) and monitors a copy of traffic, alerting on suspicious activity but not blocking it. An <strong>IPS (Intrusion Prevention System)</strong> is deployed inline (in-band) and can actively <strong>drop, block, or reset</strong> malicious connections in real time." },
  { cat: "Firewalls & IDS/IPS", q: "What is a honeypot and what is a honeynet?", a: "A <strong>honeypot</strong> is a decoy system designed to attract attackers and study their techniques. It appears to be a legitimate target with vulnerabilities. A <strong>honeynet</strong> is a network of multiple honeypots simulating an entire network environment, providing broader intelligence about attack methods and tools." },
  { cat: "Firewalls & IDS/IPS", q: "What is a SIEM and how does it work?", a: "<strong>SIEM (Security Information and Event Management)</strong> aggregates and correlates log data from multiple sources (firewalls, IDS/IPS, servers, endpoints) into a centralized platform. It provides <strong>real-time alerting</strong>, <strong>event correlation</strong>, <strong>dashboards</strong>, and <strong>compliance reporting</strong>. Examples include Splunk, Microsoft Sentinel, and IBM QRadar." },
  { cat: "Firewalls & IDS/IPS", q: "What is SOAR and how does it differ from SIEM?", a: "<strong>SOAR (Security Orchestration, Automation, and Response)</strong> automates incident response workflows through playbooks. While <strong>SIEM</strong> focuses on detection and alerting, <strong>SOAR</strong> focuses on automated response actions such as blocking IPs, isolating hosts, and creating tickets. SOAR reduces mean time to respond (MTTR)." },
  // ===== VPN & REMOTE ACCESS =====
  { cat: "VPN & Remote Access", q: "What is the difference between site-to-site and remote access VPNs?", a: "A <strong>site-to-site VPN</strong> connects two entire networks (e.g., branch to HQ) using VPN gateways at each end, creating a permanent encrypted tunnel. A <strong>remote access VPN</strong> connects individual users to a corporate network from any location using VPN client software on their device." },
  { cat: "VPN & Remote Access", q: "How do IPsec VPN and SSL VPN compare?", a: "<table class='algo-table'><tr><th>Feature</th><th>IPsec VPN</th><th>SSL VPN</th></tr><tr><td>OSI Layer</td><td>Layer 3 (Network)</td><td>Layer 4-7 (Transport/App)</td></tr><tr><td>Client</td><td>Requires dedicated client</td><td>Browser-based or lightweight client</td></tr><tr><td>Access</td><td>Full network access</td><td>Granular, application-level access</td></tr><tr><td>Firewall</td><td>May be blocked (ESP protocol)</td><td>Uses port 443, rarely blocked</td></tr></table>" },
  { cat: "VPN & Remote Access", q: "What is split tunneling and what is the security concern?", a: "<strong>Split tunneling</strong> allows a VPN user to access the corporate network through the encrypted tunnel while simultaneously accessing the public internet directly. The security concern is that the user's device can act as a <strong>bridge between networks</strong>, potentially allowing malware or attackers to reach the corporate network through the unprotected internet connection." },
  // ===== AUTHENTICATION =====
  { cat: "Authentication", q: "What are the three factors of multi-factor authentication (MFA)?", a: "<strong>Something you know</strong> – passwords, PINs, security questions<br><strong>Something you have</strong> – smart cards, hardware tokens, mobile device (OTP)<br><strong>Something you are</strong> – biometrics (fingerprint, facial recognition, retina scan)<br>MFA requires <strong>at least two different factors</strong> for authentication." },
  { cat: "Authentication", q: "What is the difference between RADIUS and TACACS+?", a: "<table class='algo-table'><tr><th>Feature</th><th>RADIUS</th><th>TACACS+</th></tr><tr><td>Protocol</td><td>UDP (1812/1813)</td><td>TCP (49)</td></tr><tr><td>Encryption</td><td>Password only</td><td>Entire packet</td></tr><tr><td>AAA Separation</td><td>Combined auth and authz</td><td>Separate auth, authz, accounting</td></tr><tr><td>Vendor</td><td>Open standard</td><td>Cisco proprietary</td></tr><tr><td>Use Case</td><td>Network access (Wi-Fi, VPN)</td><td>Device administration</td></tr></table>" },
  { cat: "Authentication", q: "What is 802.1X and how does port-based NAC work?", a: "<strong>802.1X</strong> is an IEEE standard for <strong>port-based Network Access Control (NAC)</strong>. It has three components: the <strong>supplicant</strong> (client device), the <strong>authenticator</strong> (switch or AP), and the <strong>authentication server</strong> (RADIUS). The port remains blocked until the supplicant provides valid credentials verified by the RADIUS server." },
  { cat: "Authentication", q: "What is LDAP and how does it relate to Active Directory?", a: "<strong>LDAP (Lightweight Directory Access Protocol)</strong> is a protocol for querying and modifying directory services over <span class='tag'>port 389</span> (<span class='tag'>636</span> for LDAPS). <strong>Active Directory</strong> is Microsoft's directory service implementation that uses LDAP as its primary access protocol. AD provides centralized <strong>authentication</strong>, <strong>authorization</strong>, and <strong>group policy management</strong>." },
  { cat: "Authentication", q: "What is AAA in network security?", a: "<strong>AAA</strong> stands for <strong>Authentication, Authorization, and Accounting</strong>.<br><strong>Authentication</strong> – verifies user identity (who are you?)<br><strong>Authorization</strong> – determines access permissions (what can you do?)<br><strong>Accounting</strong> – logs and tracks user activities (what did you do?)<br>RADIUS and TACACS+ are common AAA protocols." },
  { cat: "Authentication", q: "What is the difference between SSO and federation?", a: "<strong>SSO (Single Sign-On)</strong> allows a user to authenticate once and access multiple applications within a single organization. <strong>Federation</strong> extends SSO across organizational boundaries using trust relationships and standards like <strong>SAML</strong>, <strong>OAuth</strong>, or <strong>OpenID Connect</strong>, enabling cross-domain authentication." },
  // ===== WIRELESS SECURITY =====
  { cat: "Wireless Security", q: "What is WPA3-SAE and how does it improve over WPA2-PSK?", a: "<strong>WPA3-SAE (Simultaneous Authentication of Equals)</strong> replaces the WPA2 pre-shared key exchange with a <strong>zero-knowledge proof</strong> handshake that is resistant to offline dictionary attacks. It provides <strong>forward secrecy</strong>, meaning captured traffic cannot be decrypted even if the password is later compromised." },
  { cat: "Wireless Security", q: "What is an evil twin attack?", a: "An <strong>evil twin attack</strong> involves setting up a rogue wireless access point that mimics a legitimate network by using the same SSID and settings. Unsuspecting users connect to the fake AP, allowing the attacker to intercept all traffic (man-in-the-middle). It is detected and prevented using <strong>wireless intrusion prevention systems (WIPS)</strong> and <strong>802.1X authentication</strong>." },
  { cat: "Wireless Security", q: "What is a deauthentication attack?", a: "A <strong>deauthentication attack</strong> sends forged 802.11 management frames to disconnect a client from its wireless access point. The attacker can use this to force the client to reconnect, potentially capturing the <strong>WPA handshake</strong> for offline cracking or redirecting the client to an evil twin AP. <strong>WPA3</strong> and <strong>802.11w (PMF)</strong> protect against this." },
  { cat: "Wireless Security", q: "What is the difference between WPA2-Personal and WPA2-Enterprise?", a: "<strong>WPA2-Personal</strong> uses a single <strong>pre-shared key (PSK)</strong> shared among all users, suitable for home networks. <strong>WPA2-Enterprise</strong> uses <strong>802.1X authentication</strong> with a RADIUS server, providing unique credentials per user, centralized access control, and the ability to revoke individual user access." },
  // ===== PKI & CERTIFICATES =====
  { cat: "PKI & Certificates", q: "What is PKI and what are its key components?", a: "<strong>PKI (Public Key Infrastructure)</strong> is a framework for managing digital certificates and public-key encryption. Key components include the <strong>Certificate Authority (CA)</strong> that issues certificates, the <strong>Registration Authority (RA)</strong> that verifies identities, <strong>digital certificates</strong> (X.509), and <strong>Certificate Revocation Lists (CRLs)</strong>." },
  { cat: "PKI & Certificates", q: "What is the certificate lifecycle?", a: "The <strong>certificate lifecycle</strong> includes:<br><strong>Enrollment/Request</strong> – entity generates a key pair and submits a CSR<br><strong>Issuance</strong> – CA validates identity and issues the certificate<br><strong>Usage</strong> – certificate is deployed for authentication/encryption<br><strong>Renewal</strong> – certificate is reissued before expiration<br><strong>Revocation</strong> – certificate is invalidated before expiration if compromised" },
  { cat: "PKI & Certificates", q: "What is OCSP stapling and why is it preferred over CRL?", a: "<strong>OCSP (Online Certificate Status Protocol)</strong> checks certificate revocation status in real time. <strong>OCSP stapling</strong> has the web server periodically obtain a signed OCSP response and staple it to the TLS handshake. This is faster and more privacy-preserving than CRL downloads because the client does not need to contact the CA directly." },
  { cat: "PKI & Certificates", q: "What is mutual TLS (mTLS)?", a: "<strong>Mutual TLS (mTLS)</strong> requires both the client and server to present digital certificates during the TLS handshake, authenticating both parties. Standard TLS only authenticates the server. mTLS is used for <strong>API security</strong>, <strong>microservice communication</strong>, and <strong>zero trust architectures</strong> where every connection must be verified." },
  // ===== THREAT DETECTION =====
  { cat: "Threat Detection", q: "What is the zero trust security model?", a: "<strong>Zero trust</strong> operates on the principle of <strong>never trust, always verify</strong>. Every user, device, and network flow must be authenticated and authorized regardless of location. Key tenets include <strong>least privilege access</strong>, <strong>microsegmentation</strong>, <strong>continuous verification</strong>, and <strong>assume breach</strong> mentality." },
  { cat: "Threat Detection", q: "What is network segmentation and microsegmentation?", a: "<strong>Network segmentation</strong> divides a network into separate zones (e.g., using VLANs and firewalls) to contain breaches and restrict lateral movement. <strong>Microsegmentation</strong> takes this further by applying granular security policies at the individual workload or application level, often using software-defined networking (SDN)." },
  { cat: "Threat Detection", q: "What is VLAN hopping and how is it prevented?", a: "<strong>VLAN hopping</strong> is an attack where an attacker gains access to traffic on other VLANs. Two methods exist: <strong>switch spoofing</strong> (attacker negotiates a trunk link) and <strong>double tagging</strong> (nesting 802.1Q tags). Prevention includes disabling DTP, setting access ports explicitly, and changing the native VLAN to an unused VLAN." },
  { cat: "Threat Detection", q: "What is the difference between vulnerability scanning and penetration testing?", a: "<strong>Vulnerability scanning</strong> is an automated process that identifies known vulnerabilities in systems but does not exploit them. <strong>Penetration testing</strong> is a manual, authorized attempt to actively exploit vulnerabilities to determine real-world impact. Pen testing is more thorough but less frequent than vulnerability scanning." },
  // ===== NETWORK HARDENING =====
  { cat: "Network Hardening", q: "What are key network hardening practices?", a: "<strong>Disable unused ports</strong> and services on switches and routers<br><strong>Change default credentials</strong> on all devices<br><strong>Enable port security</strong> to limit MAC addresses per port<br><strong>Use SSH</strong> instead of Telnet for management<br><strong>Implement ACLs</strong> to restrict traffic<br><strong>Keep firmware updated</strong> with security patches<br><strong>Enable logging and monitoring</strong>" },
  { cat: "Network Hardening", q: "What is port security on a switch?", a: "<strong>Port security</strong> limits the number of MAC addresses allowed on a switch port. If a violation occurs (unknown MAC), the port can respond with: <strong>Shutdown</strong> (disables port), <strong>Restrict</strong> (drops violating frames, logs), or <strong>Protect</strong> (drops violating frames silently). This prevents MAC flooding attacks and unauthorized device connections." },
  { cat: "Network Hardening", q: "What is the purpose of disabling unused switch ports?", a: "Disabling unused switch ports prevents <strong>unauthorized devices</strong> from connecting to the network. An open port could allow an attacker to plug in a device and gain network access. Best practice is to <strong>administratively shut down</strong> unused ports and place them in an unused VLAN to minimize the attack surface." },
  { cat: "Network Hardening", q: "What is the difference between Telnet and SSH for remote management?", a: "<strong>Telnet</strong> transmits all data including credentials in <strong>cleartext</strong> over <span class='tag'>port 23</span>, making it vulnerable to eavesdropping. <strong>SSH (Secure Shell)</strong> encrypts all traffic using public-key cryptography over <span class='tag'>port 22</span>. SSH should always be used instead of Telnet for remote device management." },
  { cat: "Network Hardening", q: "What are best practices for securing network management protocols?", a: "Use <strong>SNMPv3</strong> (encrypted) instead of v1/v2c (community strings in cleartext). Use <strong>HTTPS</strong> instead of HTTP for web-based management. Implement <strong>management VLANs</strong> to separate management traffic. Restrict management access via <strong>ACLs</strong> to specific admin IP addresses. Enable <strong>NTP</strong> for accurate log timestamps." },
  { cat: "Network Hardening", q: "What is defense in depth?", a: "<strong>Defense in depth</strong> is a layered security strategy that uses multiple overlapping security controls so that if one layer fails, others still provide protection. Layers include <strong>physical security</strong>, <strong>network security</strong> (firewalls, IDS), <strong>host security</strong> (antivirus, patching), <strong>application security</strong>, and <strong>data security</strong> (encryption, DLP)." },
  { cat: "VPN & Remote Access", q: "What are the two main IPsec modes?", a: "<strong>Transport mode</strong> encrypts only the payload of the IP packet, leaving the original IP header intact. It is used for <strong>host-to-host communication</strong>. <strong>Tunnel mode</strong> encrypts the entire original IP packet and adds a new IP header. It is used for <strong>site-to-site VPNs</strong> where the entire packet must be protected between gateways." },
  { cat: "Authentication", q: "What is Kerberos and how does it authenticate users?", a: "<strong>Kerberos</strong> is a ticket-based authentication protocol used by Windows Active Directory. The client authenticates to the <strong>Key Distribution Center (KDC)</strong> and receives a <strong>Ticket Granting Ticket (TGT)</strong>. The TGT is then used to request <strong>service tickets</strong> for accessing network resources without re-entering credentials. It uses <strong>symmetric encryption</strong> and timestamps." },
  { cat: "PKI & Certificates", q: "What is the difference between a root CA and a subordinate CA?", a: "A <strong>root CA</strong> is the top-level certificate authority that self-signs its own certificate and serves as the trust anchor for the entire PKI hierarchy. A <strong>subordinate (intermediate) CA</strong> is issued its certificate by the root CA and handles day-to-day certificate issuance. The root CA is typically kept <strong>offline</strong> for security." },
  { cat: "Threat Detection", q: "What is a DDoS attack and how is it mitigated?", a: "A <strong>DDoS (Distributed Denial of Service)</strong> attack overwhelms a target with traffic from many compromised systems (botnet), making services unavailable. Mitigation includes <strong>rate limiting</strong>, <strong>traffic scrubbing</strong> (cloud-based DDoS protection), <strong>anycast distribution</strong>, <strong>blackhole routing</strong>, and <strong>web application firewalls (WAFs)</strong>." },
  { cat: "Wireless Security", q: "What is rogue AP detection and why is it important?", a: "A <strong>rogue access point</strong> is an unauthorized AP connected to the network, potentially by an employee or attacker. <strong>Rogue AP detection</strong> uses <strong>wireless intrusion prevention systems (WIPS)</strong> or <strong>wireless LAN controllers</strong> to scan for unauthorized APs, compare against a known list, and automatically contain or disable them. This prevents unauthorized network access and evil twin attacks." },
  { cat: "Firewalls & IDS/IPS", q: "What is the difference between a host-based and network-based IDS?", a: "A <strong>HIDS (Host-based IDS)</strong> monitors a single host by analyzing logs, file integrity, and system calls on that device. A <strong>NIDS (Network-based IDS)</strong> monitors network traffic across a segment by analyzing packet data from a network tap or SPAN port. NIDS provides broader visibility while HIDS provides deeper insight into individual host activity." },
  { cat: "Network Hardening", q: "What is NAC (Network Access Control) and how does it enforce security?", a: "<strong>NAC</strong> controls which devices can connect to the network by checking <strong>device health</strong> (antivirus status, OS patches, firewall enabled) and <strong>user identity</strong> before granting access. Non-compliant devices are placed in a <strong>quarantine VLAN</strong> or given limited access. NAC uses <strong>802.1X</strong>, agents, or agentless methods for enforcement." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
