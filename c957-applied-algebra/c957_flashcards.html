<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU C957 – Applied Algebra Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU C957</div>
    <h1>Applied Algebra</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== LINEAR EQUATIONS =====
  { cat: "Linear Equations", q: "What is slope-intercept form?", a: "Slope-intercept form is <span class='tag'>y = mx + b</span>, where <strong>m</strong> is the slope (rate of change) and <strong>b</strong> is the y-intercept (where the line crosses the y-axis). This form makes it easy to graph a line and identify its key features." },
  { cat: "Linear Equations", q: "What is point-slope form and when is it used?", a: "Point-slope form is <span class='tag'>y - y&#8321; = m(x - x&#8321;)</span>, where m is the slope and (x&#8321;, y&#8321;) is a known point on the line. Use it when you know the <strong>slope and one point</strong>, or two points (calculate slope first). It converts easily to slope-intercept form." },
  { cat: "Linear Equations", q: "How do you calculate the slope between two points?", a: "The slope formula is <span class='tag'>m = (y&#8322; - y&#8321;) / (x&#8322; - x&#8321;)</span>. Slope represents the <strong>rate of change</strong> — rise over run. A positive slope goes upward left to right, a negative slope goes downward, zero slope is horizontal, and undefined slope is vertical." },
  { cat: "Linear Equations", q: "How do you solve a linear equation in one variable?", a: "Isolate the variable by performing inverse operations on both sides: <strong>1)</strong> Distribute and combine like terms, <strong>2)</strong> Move variable terms to one side using addition/subtraction, <strong>3)</strong> Move constants to the other side, <strong>4)</strong> Divide by the coefficient. Always check the solution by substituting back." },
  { cat: "Linear Equations", q: "How do you graph a linear equation?", a: "Using slope-intercept form: <strong>1)</strong> Plot the y-intercept (0, b), <strong>2)</strong> From that point, use the slope (rise/run) to plot a second point, <strong>3)</strong> Draw a straight line through both points. You can also graph by finding the x-intercept (set y=0) and y-intercept (set x=0)." },
  { cat: "Linear Equations", q: "What are parallel and perpendicular lines?", a: "<strong>Parallel lines</strong> have the <strong>same slope</strong> but different y-intercepts (they never intersect). <strong>Perpendicular lines</strong> have slopes that are <strong>negative reciprocals</strong> of each other (m&#8321; &times; m&#8322; = -1). For example, if one slope is 2/3, the perpendicular slope is -3/2." },

  // ===== FUNCTIONS =====
  { cat: "Functions", q: "What is a function?", a: "A <strong>function</strong> is a relation where each input (x-value) maps to exactly <strong>one output</strong> (y-value). In function notation, <span class='tag'>f(x)</span> represents the output for input x. Functions can be represented as equations, tables, graphs, or mappings." },
  { cat: "Functions", q: "What is domain and range?", a: "The <strong>domain</strong> is the set of all possible input values (x-values) for a function. The <strong>range</strong> is the set of all possible output values (y-values). Common domain restrictions include division by zero (denominator &ne; 0) and square roots of negatives (radicand &ge; 0)." },
  { cat: "Functions", q: "What is the vertical line test?", a: "The <strong>vertical line test</strong> determines if a graph represents a function. If any vertical line crosses the graph at <strong>more than one point</strong>, the graph is not a function (one input would have multiple outputs). A circle fails this test; a parabola passes it." },
  { cat: "Functions", q: "What is composition of functions?", a: "<strong>Composition</strong> means plugging one function into another. Written as <span class='tag'>(f &compfn; g)(x) = f(g(x))</span>, you first evaluate <strong>g(x)</strong>, then use that result as the input for <strong>f</strong>. Order matters — f(g(x)) is generally not equal to g(f(x))." },
  { cat: "Functions", q: "What is an inverse function?", a: "An <strong>inverse function</strong> f&sup;&macr;&sup1;(x) reverses the original function — if f(a) = b, then f&sup;&macr;&sup1;(b) = a. To find it: <strong>1)</strong> Replace f(x) with y, <strong>2)</strong> Swap x and y, <strong>3)</strong> Solve for y. The graphs of f and f&sup;&macr;&sup1; are reflections over the line y = x." },

  // ===== SYSTEMS OF EQUATIONS =====
  { cat: "Systems of Equations", q: "How do you solve a system of equations by substitution?", a: "<strong>Substitution method</strong>: <strong>1)</strong> Solve one equation for one variable, <strong>2)</strong> Substitute that expression into the other equation, <strong>3)</strong> Solve for the remaining variable, <strong>4)</strong> Back-substitute to find the other variable. Best when one variable is already isolated." },
  { cat: "Systems of Equations", q: "How do you solve a system of equations by elimination?", a: "<strong>Elimination method</strong>: <strong>1)</strong> Multiply one or both equations so one variable has opposite coefficients, <strong>2)</strong> Add the equations to eliminate that variable, <strong>3)</strong> Solve for the remaining variable, <strong>4)</strong> Back-substitute. Best when coefficients are easy to match." },
  { cat: "Systems of Equations", q: "What are the three possible outcomes when solving a system of linear equations?", a: "<strong>One solution</strong> – lines intersect at one point (consistent and independent)<br><strong>No solution</strong> – lines are parallel, never intersect (inconsistent)<br><strong>Infinitely many solutions</strong> – lines are identical/coincident (consistent and dependent)" },
  { cat: "Systems of Equations", q: "How do you solve a system by graphing?", a: "Graph both equations on the same coordinate plane. The <strong>point of intersection</strong> is the solution. If the lines are parallel (same slope, different intercept), there is no solution. If the lines overlap, there are infinitely many solutions. Graphing gives visual but sometimes imprecise answers." },
  { cat: "Systems of Equations", q: "What is Cramer's rule?", a: "<strong>Cramer's rule</strong> uses determinants to solve systems of linear equations. For a 2&times;2 system: <span class='tag'>x = D&#8339;/D</span> and <span class='tag'>y = D&#8347;/D</span>, where D is the determinant of the coefficient matrix, D&#8339; replaces the x-column with constants, and D&#8347; replaces the y-column. D must not equal zero." },

  // ===== POLYNOMIALS =====
  { cat: "Polynomials", q: "How do you add and subtract polynomials?", a: "To add or subtract polynomials, <strong>combine like terms</strong> — terms with the same variable raised to the same power. When subtracting, distribute the negative sign to every term in the second polynomial first. Example: (3x&sup2; + 2x) - (x&sup2; - 4x) = 2x&sup2; + 6x." },
  { cat: "Polynomials", q: "How do you multiply polynomials?", a: "Use the <strong>distributive property</strong> (FOIL for binomials): multiply each term in the first polynomial by every term in the second, then combine like terms. For example, (x + 3)(x - 2) = x&sup2; - 2x + 3x - 6 = x&sup2; + x - 6." },
  { cat: "Polynomials", q: "How do you factor out the Greatest Common Factor (GCF)?", a: "The <strong>GCF</strong> is the largest factor shared by all terms. To factor: <strong>1)</strong> Find the GCF of the coefficients, <strong>2)</strong> Find the lowest power of each common variable, <strong>3)</strong> Divide each term by the GCF. Example: 6x&sup3; + 9x&sup2; = 3x&sup2;(2x + 3)." },
  { cat: "Polynomials", q: "How do you factor a difference of squares?", a: "A <strong>difference of squares</strong> follows the pattern <span class='tag'>a&sup2; - b&sup2; = (a + b)(a - b)</span>. Both terms must be perfect squares separated by subtraction. Example: x&sup2; - 49 = (x + 7)(x - 7). A <strong>sum</strong> of squares (a&sup2; + b&sup2;) does not factor over the reals." },
  { cat: "Polynomials", q: "How do you factor trinomials of the form ax&sup2; + bx + c?", a: "Find two numbers that <strong>multiply to ac</strong> and <strong>add to b</strong>. When a = 1: x&sup2; + bx + c = (x + p)(x + q) where p &times; q = c and p + q = b. When a &ne; 1: use grouping or trial and error. Example: x&sup2; + 5x + 6 = (x + 2)(x + 3)." },
  { cat: "Polynomials", q: "What is the quadratic formula and discriminant?", a: "The <strong>quadratic formula</strong> solves ax&sup2; + bx + c = 0: <span class='tag'>x = (-b &plusmn; &radic;(b&sup2; - 4ac)) / 2a</span>. The <strong>discriminant</strong> is b&sup2; - 4ac. If positive: two real solutions. If zero: one repeated solution. If negative: no real solutions (two complex solutions)." },

  // ===== EXPONENTIALS & LOGARITHMS =====
  { cat: "Exponentials & Logarithms", q: "What is exponential growth and decay?", a: "<strong>Exponential growth</strong>: <span class='tag'>y = a(1 + r)&#7511;</span> where r &gt; 0. <strong>Exponential decay</strong>: <span class='tag'>y = a(1 - r)&#7511;</span> where 0 &lt; r &lt; 1. Here, a is the initial value, r is the rate, and t is time. These model populations, investments, and radioactive decay." },
  { cat: "Exponentials & Logarithms", q: "What are the logarithm properties?", a: "<strong>Product rule</strong>: log(AB) = log A + log B<br><strong>Quotient rule</strong>: log(A/B) = log A - log B<br><strong>Power rule</strong>: log(A&#8319;) = n &times; log A<br>These properties allow you to expand, condense, and simplify logarithmic expressions for solving equations." },
  { cat: "Exponentials & Logarithms", q: "What is the relationship between exponentials and logarithms?", a: "Logarithms are the <strong>inverse</strong> of exponential functions. If <span class='tag'>b&#7521; = x</span>, then <span class='tag'>log&#8346;(x) = y</span>. This means log asks the question: 'What exponent do I raise b to in order to get x?' For example, log&#8322;(8) = 3 because 2&sup3; = 8." },
  { cat: "Exponentials & Logarithms", q: "What is the natural logarithm (ln) and the number e?", a: "The <strong>natural logarithm (ln)</strong> is a logarithm with base <strong>e &approx; 2.71828</strong>. So ln(x) = log&#8337;(x). The number e appears naturally in continuous growth/decay and compound interest. The formula for continuous growth is <span class='tag'>A = Pe&#691;&#7511;</span>." },
  { cat: "Exponentials & Logarithms", q: "How do you solve exponential equations?", a: "To solve exponential equations: <strong>1)</strong> Isolate the exponential expression, <strong>2)</strong> Take the logarithm of both sides (use ln or log), <strong>3)</strong> Apply the power rule to bring the exponent down, <strong>4)</strong> Solve for the variable. Example: 2&#7521; = 16 &rarr; y &times; ln(2) = ln(16) &rarr; y = 4." },
  { cat: "Exponentials & Logarithms", q: "How do you solve logarithmic equations?", a: "To solve logarithmic equations: <strong>1)</strong> Use log properties to condense into a single log, <strong>2)</strong> Convert to exponential form (if log&#8346;(x) = y, then b&#7521; = x), <strong>3)</strong> Solve for the variable, <strong>4)</strong> Check for extraneous solutions since log arguments must be positive." },

  // ===== MATRICES =====
  { cat: "Matrices", q: "How do you add and subtract matrices?", a: "Matrices can only be added or subtracted if they have the <strong>same dimensions</strong>. Add or subtract <strong>corresponding entries</strong>. For example: [2, 3] + [1, 5] = [3, 8]. If dimensions differ, the operation is undefined." },
  { cat: "Matrices", q: "How do you multiply two matrices?", a: "To multiply matrices A (m&times;n) and B (n&times;p): the number of <strong>columns in A must equal the rows in B</strong>. Each entry in the result is the <strong>dot product</strong> of a row from A and a column from B. The result has dimensions m&times;p." },
  { cat: "Matrices", q: "What is a determinant and how do you calculate it for a 2&times;2 matrix?", a: "The <strong>determinant</strong> is a scalar value computed from a square matrix. For a 2&times;2 matrix [[a, b], [c, d]]: <span class='tag'>det = ad - bc</span>. If the determinant is zero, the matrix has <strong>no inverse</strong> and the associated system has no unique solution." },
  { cat: "Matrices", q: "What is the identity matrix?", a: "The <strong>identity matrix (I)</strong> is a square matrix with <strong>1s on the main diagonal</strong> and 0s elsewhere. It acts as the multiplicative identity: A &times; I = I &times; A = A. It is analogous to the number 1 in regular multiplication." },
  { cat: "Matrices", q: "What is a matrix inverse and when does it exist?", a: "The <strong>inverse</strong> of matrix A, written A&sup;&macr;&sup1;, satisfies <span class='tag'>A &times; A&sup;&macr;&sup1; = I</span>. For a 2&times;2 matrix: A&sup;&macr;&sup1; = (1/det) &times; [[d, -b], [-c, a]]. An inverse exists only when the <strong>determinant is not zero</strong>. It is used to solve systems: X = A&sup;&macr;&sup1;B." },

  // ===== APPLICATIONS =====
  { cat: "Applications", q: "How do you set up a rate word problem?", a: "Use the formula <span class='tag'>distance = rate &times; time</span> (or work = rate &times; time). Identify known and unknown quantities, assign variables, and create an equation. For two objects: set up separate equations and use a relationship (same time, same distance, or combined work) to solve." },
  { cat: "Applications", q: "How do you set up a mixture word problem?", a: "Create a table with <strong>amount</strong> and <strong>concentration/value</strong> for each component. The key equation: <span class='tag'>amount&#8321; &times; concentration&#8321; + amount&#8322; &times; concentration&#8322; = total &times; final concentration</span>. This applies to mixing solutions, blending products, or combining investments." },
  { cat: "Applications", q: "How do you set up an investment word problem?", a: "Use <span class='tag'>Interest = Principal &times; Rate &times; Time</span>. When money is split into two investments: let x = amount in one and (total - x) = amount in the other. Set up an equation where the <strong>sum of individual interests equals total interest</strong> earned." },
  { cat: "Applications", q: "How do you solve linear inequalities?", a: "Solve like a linear equation with one critical difference: when you <strong>multiply or divide by a negative number, reverse the inequality sign</strong>. Graph on a number line using an open circle for &lt; or &gt; and a closed circle for &le; or &ge;." },
  { cat: "Applications", q: "How do you graph a system of linear inequalities?", a: "<strong>1)</strong> Graph each inequality as a line (dashed for &lt;/&gt;, solid for &le;/&ge;), <strong>2)</strong> Shade the region that satisfies each inequality, <strong>3)</strong> The <strong>feasible region</strong> is where all shaded areas overlap. Test a point to verify which side to shade." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
