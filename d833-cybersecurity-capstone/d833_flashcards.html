<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D833 – Cybersecurity Capstone Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D833</div>
    <h1>Cybersecurity and Information Assurance Capstone</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== SECURITY DOMAINS REVIEW =====
  { cat: "Security Domains Review", q: "What is the CIA triad?", a: "<strong>Confidentiality</strong> – only authorized users access data (encryption, access controls)<br><strong>Integrity</strong> – data is accurate and unaltered (hashing, checksums)<br><strong>Availability</strong> – systems and data are accessible when needed (redundancy, backups)<br>The CIA triad is the <strong>foundation of all security</strong>." },
  { cat: "Security Domains Review", q: "What are the categories of security controls?", a: "<strong>By function</strong>: Preventive, Detective, Corrective, Deterrent, Compensating, Recovery<br><strong>By implementation</strong>: Technical (firewalls, encryption), Administrative (policies, training), Physical (locks, cameras)<br>Controls are layered using <strong>defense in depth</strong>." },
  { cat: "Security Domains Review", q: "What is the risk management lifecycle?", a: "<strong>1)</strong> Risk identification – discover threats and vulnerabilities<br><strong>2)</strong> Risk assessment – analyze likelihood and impact<br><strong>3)</strong> Risk treatment – accept, mitigate, transfer, or avoid<br><strong>4)</strong> Risk monitoring – continuously track residual risk<br>Risk management is an <strong>ongoing, iterative process</strong>." },
  { cat: "Security Domains Review", q: "What is identity and access management (IAM)?", a: "<strong>IAM</strong> ensures the right individuals access the right resources at the right time. Components include <strong>identification</strong> (username), <strong>authentication</strong> (password, MFA), <strong>authorization</strong> (permissions), and <strong>accountability</strong> (logging). Least privilege and need-to-know are core principles." },
  { cat: "Security Domains Review", q: "What are the key differences between symmetric and asymmetric encryption?", a: "<table class='algo-table'><tr><th>Feature</th><th>Symmetric</th><th>Asymmetric</th></tr><tr><td>Keys</td><td>One shared key</td><td>Public/private pair</td></tr><tr><td>Speed</td><td>Fast</td><td>Slow</td></tr><tr><td>Use Case</td><td>Bulk data encryption</td><td>Key exchange, signatures</td></tr><tr><td>Examples</td><td>AES, 3DES</td><td>RSA, ECC</td></tr></table>" },
  { cat: "Security Domains Review", q: "What is hashing and what is PKI?", a: "<strong>Hashing</strong> produces a fixed-length <strong>one-way digest</strong> (SHA-256, SHA-3) for integrity verification and password storage. <strong>PKI (Public Key Infrastructure)</strong> manages digital certificates linking public keys to identities using <strong>Certificate Authorities (CAs)</strong> for authentication and encryption." },

  // ===== GOVERNANCE & RISK =====
  { cat: "Governance & Risk", q: "What is the NIST Cybersecurity Framework (CSF)?", a: "A voluntary framework with five core functions:<br><strong>Identify</strong> – asset management, risk assessment<br><strong>Protect</strong> – access control, training, data security<br><strong>Detect</strong> – monitoring, anomaly detection<br><strong>Respond</strong> – incident response, communication<br><strong>Recover</strong> – recovery planning, improvements" },
  { cat: "Governance & Risk", q: "What is ISO 27001 and why is it important?", a: "<strong>ISO 27001</strong> is the international standard for an <strong>Information Security Management System (ISMS)</strong>. It provides a systematic approach to managing sensitive information through risk assessment and controls. Certification demonstrates <strong>security commitment to customers and regulators</strong>." },
  { cat: "Governance & Risk", q: "What is COBIT's role in security governance?", a: "<strong>COBIT</strong> aligns IT governance with <strong>business objectives</strong>. It provides a framework of processes, control objectives, and maturity models. In security, it ensures proper <strong>risk management, resource allocation, and performance measurement</strong> for security programs." },
  { cat: "Governance & Risk", q: "What are BCP and DRP in the capstone context?", a: "<strong>BCP (Business Continuity Planning)</strong> ensures critical business functions continue during disruptions. <strong>DRP (Disaster Recovery Planning)</strong> focuses on restoring IT systems after a disaster. Both require <strong>BIA, testing, and maintenance</strong> to remain effective." },
  { cat: "Governance & Risk", q: "What is security program maturity?", a: "Maturity models (like CMMI) measure how <strong>established and optimized</strong> a security program is:<br><strong>Level 1</strong> – Initial (ad hoc)<br><strong>Level 2</strong> – Managed (documented)<br><strong>Level 3</strong> – Defined (standardized)<br><strong>Level 4</strong> – Quantitatively Managed (measured)<br><strong>Level 5</strong> – Optimizing (continuous improvement)" },

  // ===== DEFENSIVE ARCHITECTURE =====
  { cat: "Defensive Architecture", q: "What is defense in depth architecture?", a: "A layered security approach with controls at every level:<br><strong>Physical</strong> – locks, badges, cameras<br><strong>Network</strong> – firewalls, IDS/IPS, segmentation<br><strong>Host</strong> – EDR, hardening, patching<br><strong>Application</strong> – secure coding, WAF<br><strong>Data</strong> – encryption, DLP, classification" },
  { cat: "Defensive Architecture", q: "What is zero trust architecture in practice?", a: "Zero trust implements <strong>never trust, always verify</strong> through: <strong>micro-segmentation</strong> (granular network zones), <strong>identity verification</strong> for every request, <strong>least privilege access</strong>, continuous monitoring, and assuming the network is already compromised. It replaces the perimeter-based security model." },
  { cat: "Defensive Architecture", q: "What is network security architecture?", a: "The design of network defenses including <strong>segmentation</strong> (DMZ, VLANs, internal zones), <strong>firewalls</strong> (perimeter and internal), <strong>IDS/IPS</strong>, <strong>proxies</strong>, and <strong>VPNs</strong>. Architecture should follow defense in depth with multiple inspection points and default-deny policies." },
  { cat: "Defensive Architecture", q: "What is endpoint and cloud security integration?", a: "Modern security integrates <strong>EDR/XDR for endpoints</strong> with <strong>CSPM and CASB for cloud</strong>. Unified visibility across both environments enables <strong>correlated detection</strong>, consistent policy enforcement, and coordinated incident response regardless of where assets reside." },

  // ===== OFFENSIVE CONCEPTS =====
  { cat: "Offensive Concepts", q: "What is the MITRE ATT&CK framework?", a: "A comprehensive matrix of <strong>adversary tactics and techniques</strong> observed in real attacks. Tactics represent the attacker's goal (Initial Access, Execution, Persistence, etc.) and techniques describe <strong>how</strong> they achieve it. Used for <strong>threat modeling, detection, and red team planning</strong>." },
  { cat: "Offensive Concepts", q: "What is the threat intelligence cycle?", a: "<strong>1)</strong> Planning and direction – define intelligence needs<br><strong>2)</strong> Collection – gather data from sources<br><strong>3)</strong> Processing – normalize and structure data<br><strong>4)</strong> Analysis – produce actionable intelligence<br><strong>5)</strong> Dissemination – share with stakeholders<br><strong>6)</strong> Feedback – refine requirements" },
  { cat: "Offensive Concepts", q: "What is pen test reporting for the capstone?", a: "A pen test report documents <strong>methodology, findings, and recommendations</strong>. The executive summary addresses business risk for leadership. Technical findings include <strong>evidence, CVSS scores, and step-by-step remediation</strong>. Reports must demonstrate the tester followed the authorized scope." },
  { cat: "Offensive Concepts", q: "What is ethical hacking authorization?", a: "<strong>Authorization</strong> is written permission from the system owner granting the tester legal right to test. Without it, testing is <strong>illegal under the CFAA</strong>. The authorization document specifies scope, methods, timeline, and emergency contacts. It is the <strong>first requirement</strong> before any testing." },

  // ===== FORENSICS & IR =====
  { cat: "Forensics & IR", q: "What is the incident response process?", a: "The NIST IR process:<br><strong>1)</strong> Preparation – plans, tools, team training<br><strong>2)</strong> Detection & Analysis – identify and validate incidents<br><strong>3)</strong> Containment – isolate to limit damage<br><strong>4)</strong> Eradication – remove the threat<br><strong>5)</strong> Recovery – restore operations<br><strong>6)</strong> Lessons Learned – improve for next time" },
  { cat: "Forensics & IR", q: "What is the digital forensics workflow?", a: "<strong>1)</strong> Identification – recognize potential evidence<br><strong>2)</strong> Collection – acquire evidence with integrity (write blockers, imaging)<br><strong>3)</strong> Preservation – maintain <strong>chain of custody</strong><br><strong>4)</strong> Analysis – examine evidence for artifacts<br><strong>5)</strong> Reporting – document findings for legal or business use" },
  { cat: "Forensics & IR", q: "What is chain of custody?", a: "<strong>Chain of custody</strong> is the documented record of <strong>who handled evidence, when, and what they did</strong> with it. It ensures evidence integrity and admissibility in legal proceedings. Any break in the chain can render evidence <strong>inadmissible in court</strong>." },
  { cat: "Forensics & IR", q: "How does incident response integrate across domains?", a: "Effective IR requires integration across <strong>network defense</strong> (SIEM alerts), <strong>endpoint security</strong> (EDR detection), <strong>cloud security</strong> (cloud-native logging), <strong>threat intelligence</strong> (IOC enrichment), and <strong>forensics</strong> (evidence collection). Cross-domain visibility enables faster detection and response." },

  // ===== LEGAL & ETHICS =====
  { cat: "Legal & Ethics", q: "What are the key cybersecurity laws and regulations?", a: "<strong>HIPAA</strong> – healthcare data protection<br><strong>GDPR</strong> – EU personal data protection (right to erasure, consent)<br><strong>CFAA</strong> – U.S. computer fraud and unauthorized access law<br><strong>SOX</strong> – financial reporting integrity controls<br>Compliance requirements drive many security program decisions." },
  { cat: "Legal & Ethics", q: "What is the Computer Fraud and Abuse Act (CFAA)?", a: "The <strong>CFAA</strong> is the primary U.S. law criminalizing <strong>unauthorized access to computer systems</strong>. It covers hacking, exceeding authorized access, and trafficking in passwords. Pen testers must have <strong>explicit written authorization</strong> to avoid CFAA violations." },
  { cat: "Legal & Ethics", q: "What are ethical obligations for cybersecurity professionals?", a: "Cybersecurity professionals must maintain <strong>confidentiality of client data</strong>, obtain proper authorization before testing, report vulnerabilities responsibly, avoid conflicts of interest, and follow <strong>codes of ethics</strong> (ISC2, EC-Council). Ethical conduct builds trust and protects the profession." },
  { cat: "Legal & Ethics", q: "What is GDPR and its impact on security?", a: "<strong>GDPR</strong> (General Data Protection Regulation) requires organizations handling EU residents' data to implement <strong>privacy by design</strong>, obtain consent, enable data subject rights (access, erasure), report breaches within <strong>72 hours</strong>, and appoint a Data Protection Officer (DPO) when required." },

  // ===== EMERGING THREATS =====
  { cat: "Emerging Threats", q: "What is Ransomware-as-a-Service (RaaS)?", a: "<strong>RaaS</strong> is a business model where ransomware developers sell or lease their tools to <strong>affiliates who conduct attacks</strong>. Affiliates share a percentage of ransom payments. This lowers the <strong>barrier to entry for cybercrime</strong> and has driven the surge in ransomware attacks globally." },
  { cat: "Emerging Threats", q: "What are supply chain attacks?", a: "<strong>Supply chain attacks</strong> compromise a trusted vendor's software or update mechanism to <strong>distribute malware to downstream customers</strong>. The SolarWinds attack demonstrated how a single compromised update can affect thousands of organizations. Prevention requires <strong>vendor assessment and software integrity verification</strong>." },
  { cat: "Emerging Threats", q: "What are AI-powered attacks and deepfakes?", a: "<strong>AI-powered attacks</strong> use machine learning to craft more convincing phishing, evade detection, and automate exploitation. <strong>Deepfakes</strong> use AI to create realistic fake <strong>audio, video, or images</strong> for social engineering and disinformation. Defenders must adopt AI-based detection in response." },
  { cat: "Emerging Threats", q: "What is security ROI and metrics?", a: "<strong>Security ROI</strong> demonstrates the value of security investments to leadership. Key metrics include <strong>risk reduction, MTTD/MTTR, incident frequency, patch compliance</strong>, and cost avoidance. Effective metrics tie security activities to <strong>business outcomes</strong> and justify budget requests." },
  { cat: "Emerging Threats", q: "What are common cybersecurity career paths?", a: "<strong>SOC Analyst</strong> – monitors and triages security alerts<br><strong>Penetration Tester</strong> – ethically attacks systems to find vulnerabilities<br><strong>CISO</strong> – leads the security program at the executive level<br><strong>Forensic Analyst</strong> – investigates security incidents and gathers evidence<br><strong>GRC Analyst</strong> – manages governance, risk, and compliance" },
  { cat: "Emerging Threats", q: "How do you assess overall security program effectiveness?", a: "Assess using <strong>maturity models</strong> (CMMI), <strong>framework compliance</strong> (NIST CSF, ISO 27001), security metrics (MTTD/MTTR, vulnerability closure rate), <strong>red team/purple team exercises</strong>, audit findings, and incident trends. A mature program demonstrates continuous improvement and alignment with business risk." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
