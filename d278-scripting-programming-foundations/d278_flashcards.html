<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU D278 – Scripting and Programming Foundations Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU D278</div>
    <h1>Scripting and Programming - Foundations</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== PROGRAMMING CONCEPTS =====
  { cat: "Programming Concepts", q: "What is an algorithm?", a: "A <strong>step-by-step set of instructions</strong> for solving a problem or completing a task. Algorithms must be <strong>unambiguous, finite, and produce a correct result</strong>. They can be expressed in pseudocode, flowcharts, or programming languages." },
  { cat: "Programming Concepts", q: "What is pseudocode?", a: "<strong>Pseudocode</strong> is an informal, human-readable description of an algorithm that uses structured English rather than programming syntax. It helps <strong>plan logic before writing code</strong> and is not tied to any specific programming language." },
  { cat: "Programming Concepts", q: "What is a flowchart and what are its common symbols?", a: "A <strong>visual diagram</strong> representing the steps of an algorithm.<br><strong>Oval</strong> – start/end<br><strong>Rectangle</strong> – process/action<br><strong>Diamond</strong> – decision (yes/no)<br><strong>Parallelogram</strong> – input/output<br><strong>Arrow</strong> – flow direction" },
  { cat: "Programming Concepts", q: "What is the difference between compiled and interpreted languages?", a: "<strong>Compiled languages</strong> (C, C++, Java) are translated entirely into machine code before execution, resulting in faster runtime. <strong>Interpreted languages</strong> (Python, JavaScript) are translated line-by-line at runtime, allowing more flexibility but typically slower execution." },
  { cat: "Programming Concepts", q: "What is the difference between an expression and a statement?", a: "An <strong>expression</strong> evaluates to a value (e.g., <span class='tag'>3 + 5</span> yields 8). A <strong>statement</strong> performs an action (e.g., <span class='tag'>x = 10</span> assigns a value). Expressions can be part of statements, but not all statements are expressions." },
  { cat: "Programming Concepts", q: "What is the DRY principle?", a: "<strong>Don't Repeat Yourself</strong> — a principle stating that every piece of knowledge should have a <strong>single, authoritative representation</strong> in code. It reduces duplication by using functions, loops, and modular design, making code easier to maintain." },
  { cat: "Programming Concepts", q: "Why are code comments and documentation important?", a: "Comments explain <strong>why code exists</strong>, not just what it does. Good documentation helps other developers (and your future self) understand the purpose, inputs, outputs, and usage of code. It improves <strong>maintainability and collaboration</strong>." },

  // ===== DATA TYPES & VARIABLES =====
  { cat: "Data Types & Variables", q: "What is a variable?", a: "A <strong>named storage location</strong> in memory that holds a value which can change during program execution. Variables have a <strong>name, data type, and value</strong>. They must be declared or initialized before use in most languages." },
  { cat: "Data Types & Variables", q: "What is a constant?", a: "A <strong>named value that cannot be changed</strong> after it is set. Constants are used for values that remain fixed throughout the program, such as <span class='tag'>PI = 3.14159</span>. They improve readability and prevent accidental modification." },
  { cat: "Data Types & Variables", q: "What are the common primitive data types?", a: "<strong>int</strong> – whole numbers (42)<br><strong>float/double</strong> – decimal numbers (3.14)<br><strong>string</strong> – text (\"hello\")<br><strong>boolean</strong> – true/false<br><strong>char</strong> – single character ('A')<br>Each type determines what operations can be performed on the data." },
  { cat: "Data Types & Variables", q: "What is type casting?", a: "<strong>Type casting</strong> converts a value from one data type to another. <strong>Implicit casting</strong> happens automatically (int to float). <strong>Explicit casting</strong> requires the programmer to specify the conversion, which may cause data loss (float to int truncates decimals)." },
  { cat: "Data Types & Variables", q: "What are the types of operators in programming?", a: "<strong>Arithmetic</strong> – math operations (+, -, *, /, %)<br><strong>Comparison</strong> – compare values (==, !=, <, >, <=, >=)<br><strong>Logical</strong> – combine conditions (AND, OR, NOT)<br><strong>Assignment</strong> – assign values (=, +=, -=, *=)" },
  { cat: "Data Types & Variables", q: "What is the modulo operator?", a: "The <strong>modulo operator (%)</strong> returns the <strong>remainder</strong> of a division operation. For example, <span class='tag'>10 % 3 = 1</span>. It is commonly used to check if a number is even/odd or to wrap values within a range." },

  // ===== CONTROL STRUCTURES =====
  { cat: "Control Structures", q: "What is an if/else statement?", a: "A <strong>conditional branching</strong> structure that executes one block of code if a condition is true and an alternative block if false. <strong>elif/else if</strong> allows checking multiple conditions in sequence before falling through to the else block." },
  { cat: "Control Structures", q: "What is a switch/case statement?", a: "A <strong>multi-way branching</strong> structure that compares a variable against multiple constant values. Each <strong>case</strong> represents a possible match. A <strong>default</strong> case handles unmatched values. It is often cleaner than multiple if/else chains for discrete values." },
  { cat: "Control Structures", q: "What is a for loop?", a: "A <strong>count-controlled loop</strong> that repeats a block of code a predetermined number of times. It uses an <strong>initializer, condition, and increment</strong> (e.g., <span class='tag'>for i = 0; i < 10; i++</span>). Best used when the number of iterations is known." },
  { cat: "Control Structures", q: "What is a while loop?", a: "A <strong>condition-controlled loop</strong> that repeats as long as a specified condition remains true. The condition is checked <strong>before each iteration</strong>, so the loop body may execute zero times if the condition is initially false." },
  { cat: "Control Structures", q: "What is a do-while loop?", a: "A loop that executes the body <strong>at least once</strong> before checking the condition. The condition is evaluated <strong>after each iteration</strong>. This guarantees the code block runs a minimum of one time, unlike a standard while loop." },
  { cat: "Control Structures", q: "What are break and continue statements?", a: "<strong>break</strong> – immediately <strong>exits the loop</strong> entirely and continues with the next statement after the loop<br><strong>continue</strong> – <strong>skips the rest of the current iteration</strong> and jumps to the next iteration of the loop" },

  // ===== FUNCTIONS =====
  { cat: "Functions", q: "What is a function?", a: "A <strong>named, reusable block of code</strong> that performs a specific task. Functions can accept <strong>parameters</strong> (inputs), execute logic, and <strong>return a value</strong> (output). They promote code reuse, modularity, and the DRY principle." },
  { cat: "Functions", q: "What is the difference between parameters and arguments?", a: "<strong>Parameters</strong> are the variables listed in the function <strong>definition</strong> that act as placeholders. <strong>Arguments</strong> are the actual values <strong>passed to the function</strong> when it is called. Parameters define what a function expects; arguments provide the data." },
  { cat: "Functions", q: "What is a return value?", a: "The <strong>output</strong> a function sends back to the caller using a <span class='tag'>return</span> statement. A function can return a single value (or object). Functions without a return statement (or returning void) perform actions but do not produce a value." },
  { cat: "Functions", q: "What is variable scope (local vs. global)?", a: "<strong>Local scope</strong> – variables declared inside a function are only accessible within that function<br><strong>Global scope</strong> – variables declared outside all functions are accessible everywhere<br>Using local scope is preferred to avoid <strong>unintended side effects</strong> and naming conflicts." },
  { cat: "Functions", q: "What is recursion?", a: "<strong>Recursion</strong> is when a function <strong>calls itself</strong> to solve a problem by breaking it into smaller sub-problems. Every recursive function needs a <strong>base case</strong> (stopping condition) to prevent infinite recursion and a stack overflow error." },
  { cat: "Functions", q: "What is a function signature?", a: "The <strong>function signature</strong> includes the function's <strong>name, parameter list, and return type</strong>. It defines the interface for calling the function. Two functions with different signatures (different parameters) can have the same name — this is called <strong>overloading</strong>." },

  // ===== DATA STRUCTURES =====
  { cat: "Data Structures", q: "What is an array?", a: "An ordered collection of elements stored in <strong>contiguous memory</strong>, accessed by <strong>index</strong> (starting at 0). Arrays typically have a <strong>fixed size</strong> and hold elements of the same data type. They provide O(1) access by index." },
  { cat: "Data Structures", q: "What is a list?", a: "A <strong>dynamic, ordered collection</strong> that can grow or shrink in size. Unlike arrays, lists often support mixed data types and provide methods to <strong>append, insert, remove, and sort</strong> elements. They are more flexible but may use more memory." },
  { cat: "Data Structures", q: "What is a dictionary (map)?", a: "A collection of <strong>key-value pairs</strong> where each unique key maps to a value. Lookup by key is very fast — typically <strong>O(1)</strong>. Keys must be unique and immutable. Dictionaries are ideal for storing associated data like user profiles." },
  { cat: "Data Structures", q: "What is a stack?", a: "A <strong>Last-In, First-Out (LIFO)</strong> data structure where the last element added is the first removed. Operations: <strong>push</strong> (add to top), <strong>pop</strong> (remove from top), <strong>peek</strong> (view top). Used in function call stacks and undo operations." },
  { cat: "Data Structures", q: "What is a queue?", a: "A <strong>First-In, First-Out (FIFO)</strong> data structure where the first element added is the first removed. Operations: <strong>enqueue</strong> (add to back), <strong>dequeue</strong> (remove from front). Used in print queues, task scheduling, and BFS algorithms." },
  { cat: "Data Structures", q: "What is a tuple?", a: "An <strong>ordered, immutable</strong> collection of elements. Once created, a tuple's values <strong>cannot be changed</strong>. Tuples are useful for representing fixed data like coordinates <span class='tag'>(x, y)</span> and can be used as dictionary keys because of their immutability." },
  { cat: "Data Structures", q: "What are common string operations?", a: "<strong>Concatenation</strong> – joining strings together<br><strong>Slicing</strong> – extracting a substring by index range<br><strong>Length</strong> – getting the number of characters<br><strong>Searching</strong> – finding a substring's position<br><strong>Splitting</strong> – dividing a string into a list<br><strong>Case conversion</strong> – upper/lower" },

  // ===== OOP BASICS =====
  { cat: "OOP Basics", q: "What is object-oriented programming (OOP)?", a: "A programming paradigm that organizes code into <strong>objects</strong> — instances of <strong>classes</strong> that bundle data (attributes) and behavior (methods). The four pillars are <strong>encapsulation, abstraction, inheritance, and polymorphism</strong>." },
  { cat: "OOP Basics", q: "What is a class vs. an object?", a: "A <strong>class</strong> is a <strong>blueprint or template</strong> that defines attributes and methods. An <strong>object</strong> is a specific <strong>instance</strong> of a class with actual values. For example, 'Car' is a class; a specific red Toyota is an object." },
  { cat: "OOP Basics", q: "What is encapsulation?", a: "<strong>Encapsulation</strong> bundles data and methods into a single unit (class) and <strong>restricts direct access</strong> to internal data. Access is controlled through public methods (getters/setters), protecting the object's internal state from unintended modification." },
  { cat: "OOP Basics", q: "What is inheritance?", a: "<strong>Inheritance</strong> allows a new class (child/subclass) to <strong>inherit attributes and methods</strong> from an existing class (parent/superclass). It promotes code reuse and establishes an <strong>is-a relationship</strong> (e.g., Dog is-a Animal)." },
  { cat: "OOP Basics", q: "What is polymorphism?", a: "<strong>Polymorphism</strong> allows objects of different classes to be treated through the <strong>same interface</strong>. A method call can behave differently depending on the object's type. This enables flexible, extensible code through <strong>method overriding and overloading</strong>." },
  { cat: "OOP Basics", q: "What is abstraction?", a: "<strong>Abstraction</strong> hides complex implementation details and exposes only the <strong>essential features</strong>. Users interact with simplified interfaces without needing to understand the underlying complexity. Abstract classes and interfaces enforce this concept." },

  // ===== DEBUGGING & TOOLS =====
  { cat: "Debugging & Tools", q: "What are the three types of programming errors?", a: "<strong>Syntax errors</strong> – violations of language rules (missing semicolons, unclosed brackets) caught by the compiler<br><strong>Runtime errors</strong> – occur during execution (division by zero, null reference)<br><strong>Logic errors</strong> – program runs but produces incorrect results (hardest to find)" },
  { cat: "Debugging & Tools", q: "What are common debugging techniques?", a: "<strong>Print statements</strong> – output variable values at key points<br><strong>Breakpoints</strong> – pause execution at a specific line<br><strong>Step-through</strong> – execute one line at a time<br><strong>Watch variables</strong> – monitor values as code runs<br><strong>Rubber duck debugging</strong> – explain code aloud to find issues" },
  { cat: "Debugging & Tools", q: "What are IDE features that help development?", a: "An <strong>IDE (Integrated Development Environment)</strong> provides code editing, syntax highlighting, <strong>auto-completion, breakpoints, watch variables</strong>, integrated terminal, version control, and error detection. Popular examples include VS Code, IntelliJ, and PyCharm." },
  { cat: "Debugging & Tools", q: "What is version control and why is Git used?", a: "<strong>Version control</strong> tracks changes to code over time, enabling collaboration and rollback. <strong>Git</strong> is a distributed VCS. Key commands: <span class='tag'>init, add, commit, push, pull, branch</span>. It allows multiple developers to work on the same codebase safely." },
  { cat: "Debugging & Tools", q: "What is file I/O?", a: "<strong>File I/O (Input/Output)</strong> allows programs to <strong>read from and write to files</strong> on disk. Common operations include opening a file, reading its contents, writing or appending data, and closing the file. Proper file handling prevents data corruption and resource leaks." },
  { cat: "Debugging & Tools", q: "What is Big O notation?", a: "A way to describe the <strong>performance or complexity</strong> of an algorithm as input size grows.<br><span class='tag'>O(1)</span> – constant time<br><span class='tag'>O(n)</span> – linear time<br><span class='tag'>O(n²)</span> – quadratic time<br>Lower Big O means better scalability for large inputs." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
