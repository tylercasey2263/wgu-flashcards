<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU C963 – American Politics and the US Constitution Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-front: #161b22;
    --card-back: #141e1a;
    --accent: #2dcc8f;
    --accent2: #58a6ff;
    --accent3: #f78166;
    --warn: #e3b341;
    --text: #f0f6fc;
    --muted: #9aabb8;
    --border: rgba(255,255,255,0.1);
  }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* BG grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: rgba(0,229,160,0.12);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f0f7, #00e5a0 60%, #4f9eff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    justify-content: center;
  }

  .tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .tab.active { background: rgba(79,158,255,0.15); border-color: var(--accent2); color: var(--accent2); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .stat {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
  }

  .stat-num {
    font-size: 22px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 500;
  }

  .stat.correct .stat-num { color: var(--accent); }
  .stat.wrong .stat-num { color: var(--accent3); }
  .stat.remaining .stat-num { color: var(--accent2); }
  .stat.total .stat-num { color: var(--warn); }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    margin-bottom: 24px;
    cursor: pointer;
  }

  .card-inner {
    position: relative;
    width: 100%;
    min-height: 300px;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    min-height: 300px;
  }

  .card-front {
    background: linear-gradient(135deg, #1a2336, #111e30);
    border: 1px solid rgba(79,158,255,0.25);
    box-shadow: 0 0 40px rgba(79,158,255,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .card-back {
    background: linear-gradient(135deg, #162219, #0e1c14);
    border: 1px solid rgba(0,229,160,0.2);
    box-shadow: 0 0 40px rgba(0,229,160,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: rotateY(180deg);
  }

  .card-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .card-front .card-category { background: rgba(79,158,255,0.12); color: var(--accent2); border: 1px solid rgba(79,158,255,0.2); }
  .card-back .card-category { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }

  .card-question {
    font-size: clamp(17px, 3vw, 23px);
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: -0.1px;
  }

  .card-hint {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
  }

  .card-answer {
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.75;
    color: #e8f5f0;
    font-weight: 400;
  }

  .card-answer strong {
    color: var(--accent);
    font-weight: 700;
  }

  .card-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  /* Num indicator */
  .card-num {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-flip {
    background: rgba(79,158,255,0.1);
    border-color: rgba(79,158,255,0.4);
    color: var(--accent2);
  }
  .btn-flip:hover { background: rgba(79,158,255,0.2); transform: translateY(-1px); }

  .btn-correct {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    color: var(--accent);
  }
  .btn-correct:hover { background: rgba(0,229,160,0.2); transform: translateY(-1px); }

  .btn-wrong {
    background: rgba(255,107,107,0.1);
    border-color: rgba(255,107,107,0.4);
    color: var(--accent3);
  }
  .btn-wrong:hover { background: rgba(255,107,107,0.2); transform: translateY(-1px); }

  .btn-shuffle {
    background: rgba(245,197,66,0.1);
    border-color: rgba(245,197,66,0.4);
    color: var(--warn);
  }
  .btn-shuffle:hover { background: rgba(245,197,66,0.2); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.04);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Judgment buttons only shown after flip */
  .judge-btns { display: none; gap: 10px; justify-content: center; }
  .judge-btns.visible { display: flex; }

  /* Algorithm table */
  .algo-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 12px;
  }

  .algo-table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .algo-table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }

  .algo-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Finished screen */
  .finished {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .finished.show { display: block; }

  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 0 30px rgba(0,229,160,0.2);
  }

  .score-pct {
    font-size: 32px;
    font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Card slide animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card-area.animating .card-inner { animation: slideIn 0.3s ease; }

  /* ===== MODE TOGGLE ===== */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin: 0 auto 28px;
    width: fit-content;
    background: var(--surface);
  }

  .mode-btn {
    padding: 9px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .mode-btn svg { width: 14px; height: 14px; }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active { background: rgba(79,158,255,0.15); color: var(--accent2); }
  .mode-btn + .mode-btn { border-left: 1px solid var(--border); }

  /* ===== LIST / BROWSE MODE ===== */
  .list-view { display: none; }
  .list-view.visible { display: block; }

  .list-search {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
  }

  .list-search input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  .list-search input::placeholder { color: var(--muted); }

  .list-search svg { color: var(--muted); flex-shrink: 0; }

  .list-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .list-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .list-expand-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(79,158,255,0.08);
    border: 1px solid rgba(79,158,255,0.2);
    border-radius: 5px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .list-expand-btn:hover { background: rgba(79,158,255,0.16); }

  .list-items { display: flex; flex-direction: column; gap: 8px; }

  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .list-item:hover { border-color: rgba(79,158,255,0.25); }
  .list-item.open { border-color: rgba(0,229,160,0.25); }

  .list-item-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .list-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .list-item-q {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .list-item-cat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    background: rgba(79,158,255,0.1);
    border: 1px solid rgba(79,158,255,0.15);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .list-item-chevron {
    color: var(--muted);
    transition: transform 0.25s;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list-item.open .list-item-chevron { transform: rotate(180deg); color: var(--accent); }

  .list-item-answer {
    display: none;
    padding: 0 18px 16px 60px;
    font-size: 15px;
    line-height: 1.78;
    color: #e8f5f0;
    border-top: 1px solid rgba(0,229,160,0.1);
    background: rgba(0,229,160,0.03);
    padding-top: 14px;
  }

  .list-item.open .list-item-answer { display: block; }

  .list-item-answer strong { color: var(--accent); }
  .list-item-answer .tag {
    display: inline-block;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin: 2px;
  }

  .list-item-answer table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 8px;
  }
  .list-item-answer table th {
    background: rgba(79,158,255,0.1);
    color: var(--accent2);
    padding: 5px 10px;
    text-align: left;
    border: 1px solid rgba(79,158,255,0.15);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .list-item-answer table td {
    padding: 5px 10px;
    border: 1px solid rgba(255,255,255,0.05);
    color: #c8e6d8;
  }
  .list-item-answer table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ===== HIDE FLASHCARD-ONLY ELEMENTS IN LIST MODE ===== */
  .flashcard-only { transition: opacity 0.2s; }
  .flashcard-only.hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 11px; }
    .list-item-answer { padding-left: 18px; }
    .list-item-cat { display: none; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">WGU C963</div>
    <h1>American Politics and the US Constitution</h1>
    <p class="subtitle">// flashcard study system · 2025–2026</p>
  </header>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Mode Toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="modeFlashcard" onclick="setMode('flashcard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="12" y1="4" x2="12" y2="20"/></svg>Flashcards
    </button>
    <button class="mode-btn" id="modeBrowse" onclick="setMode('browse')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:6px"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Browse All
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat remaining"><div class="stat-num" id="stat-remaining">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat correct"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat wrong"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Review</div></div>
    <div class="stat total"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-fill" id="progress"></div></div>

  <!-- Card -->
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum">1 / 0</div>
        <span class="card-category" id="frontCategory">Loading...</span>
        <div class="card-question" id="questionText">Loading flashcards...</div>
        <div class="card-hint">[ tap to reveal answer ]</div>
      </div>
      <div class="card-face card-back">
        <div class="card-num" id="cardNumBack">1 / 0</div>
        <span class="card-category" id="backCategory">Answer</span>
        <div class="card-answer" id="answerText"></div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-flip" onclick="flipCard()">⟳ Flip</button>
    <button class="btn btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
    <button class="btn btn-reset" onclick="resetDeck()">↺ Reset</button>
  </div>

  <div class="judge-btns" id="judgeBtns">
    <button class="btn btn-correct" onclick="markCard(true)">✓ Got It</button>
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Review Again</button>
  </div>

  <!-- List / Browse View -->
  <div class="list-view" id="listView">
    <div class="list-search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="listSearch" placeholder="Search questions or answers..." oninput="renderList()">
    </div>
    <div class="list-controls-row">
      <span class="list-count" id="listCount">0 terms</span>
      <button class="list-expand-btn" id="expandAllBtn" onclick="toggleExpandAll()">Expand All</button>
    </div>
    <div class="list-items" id="listItems"></div>
  </div>

  <!-- Finished Screen -->
  <div class="finished" id="finishedScreen">
    <div class="score-circle">
      <div class="score-pct" id="scorePct">0%</div>
      <div class="score-label">Score</div>
    </div>
    <h2 style="font-size:24px;margin-bottom:8px;">Deck Complete!</h2>
    <p style="color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace;font-size:13px;">Cards marked for review will be cycled back.</p>
    <button class="btn btn-shuffle" onclick="restartWithWrong()" id="reviewBtn">↺ Review Missed</button>
    &nbsp;
    <button class="btn btn-reset" onclick="resetDeck()">↺ Full Restart</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  // ===== CONSTITUTION & FOUNDING =====
  { cat: "Constitution & Founding", q: "Why were the Articles of Confederation considered weak?", a: "The Articles created a <strong>weak central government</strong> with no executive or judicial branch, no power to tax, no power to regulate commerce, and required <strong>unanimous consent</strong> to amend. Each state retained sovereignty, making unified action nearly impossible." },
  { cat: "Constitution & Founding", q: "What was the Constitutional Convention of 1787?", a: "A meeting in <strong>Philadelphia</strong> originally called to revise the Articles of Confederation, but delegates ultimately drafted an entirely new Constitution. Key figures included <strong>James Madison, Alexander Hamilton, and Benjamin Franklin</strong>." },
  { cat: "Constitution & Founding", q: "What was the Great Compromise (Connecticut Compromise)?", a: "The agreement that resolved the dispute between large and small states by creating a <strong>bicameral legislature</strong>: the <strong>House of Representatives</strong> (representation by population) and the <strong>Senate</strong> (equal representation with two senators per state)." },
  { cat: "Constitution & Founding", q: "What was the Three-Fifths Compromise?", a: "A constitutional compromise counting <strong>three-fifths of the enslaved population</strong> for purposes of congressional representation and taxation. It gave Southern states more political power while treating enslaved people as less than full persons." },
  { cat: "Constitution & Founding", q: "What is the principle of separation of powers?", a: "<strong>Separation of powers</strong> divides government into three branches — <strong>legislative, executive, and judicial</strong> — each with distinct responsibilities. This prevents any single branch from accumulating too much power and was influenced by Montesquieu." },
  { cat: "Constitution & Founding", q: "What is the system of checks and balances?", a: "A system where each branch of government can limit the powers of the other two. Examples: the President can <strong>veto legislation</strong>, Congress can <strong>override vetoes</strong> and <strong>impeach</strong>, and the Supreme Court can declare laws <strong>unconstitutional</strong>." },
  { cat: "Constitution & Founding", q: "What was the debate between Federalists and Anti-Federalists?", a: "<strong>Federalists</strong> (Hamilton, Madison, Jay) supported ratification of the Constitution and a strong central government. <strong>Anti-Federalists</strong> (Patrick Henry, George Mason) opposed it, fearing tyranny and demanding a <strong>Bill of Rights</strong> to protect individual liberties." },
  { cat: "Constitution & Founding", q: "What is popular sovereignty?", a: "<strong>Popular sovereignty</strong> is the principle that the government's authority comes from the <strong>consent of the governed</strong> — the people. It is reflected in the Constitution's opening: 'We the People.' Citizens exercise this power through voting and political participation." },

  // ===== BRANCHES OF GOVERNMENT =====
  { cat: "Branches of Government", q: "What are the key differences between the Senate and the House of Representatives?", a: "<table class='algo-table'><tr><th>Feature</th><th>House</th><th>Senate</th></tr><tr><td>Members</td><td>435</td><td>100</td></tr><tr><td>Term</td><td>2 years</td><td>6 years</td></tr><tr><td>Minimum age</td><td>25</td><td>30</td></tr><tr><td>Representation</td><td>By population</td><td>2 per state</td></tr><tr><td>Unique power</td><td>Initiates revenue bills</td><td>Confirms appointments, ratifies treaties</td></tr></table>" },
  { cat: "Branches of Government", q: "What is judicial review?", a: "<strong>Judicial review</strong> is the power of the Supreme Court to declare laws or executive actions <strong>unconstitutional</strong>. It was established in <strong>Marbury v. Madison (1803)</strong> by Chief Justice John Marshall and is not explicitly stated in the Constitution." },
  { cat: "Branches of Government", q: "What are executive orders?", a: "<strong>Executive orders</strong> are directives issued by the President that manage operations of the federal government. They have the <strong>force of law</strong> but do not require congressional approval. They can be reversed by future presidents or overturned by courts." },
  { cat: "Branches of Government", q: "What is the impeachment process?", a: "The <strong>House of Representatives</strong> has the sole power to <strong>impeach</strong> (formally charge) a federal official with a simple majority vote. The <strong>Senate</strong> then conducts the trial, requiring a <strong>two-thirds vote</strong> to convict and remove from office." },
  { cat: "Branches of Government", q: "What are the enumerated powers of Congress?", a: "<strong>Enumerated (expressed) powers</strong> are specifically listed in Article I, Section 8 of the Constitution. They include the power to <strong>tax, regulate commerce, declare war, coin money, raise armies, and establish post offices</strong>." },
  { cat: "Branches of Government", q: "What is the Necessary and Proper Clause (Elastic Clause)?", a: "Article I, Section 8, Clause 18 gives Congress the power to make all laws <strong>necessary and proper</strong> for carrying out its enumerated powers. It is the basis for <strong>implied powers</strong> and has been used to expand federal authority." },
  { cat: "Branches of Government", q: "What is the Supremacy Clause?", a: "Article VI, Clause 2 establishes that the Constitution, federal laws, and treaties are the <strong>supreme law of the land</strong>. When state law conflicts with federal law, <strong>federal law prevails</strong>. This is a foundation of federal authority over states." },
  { cat: "Branches of Government", q: "What are the qualifications for President of the United States?", a: "The President must be a <strong>natural-born citizen</strong> of the United States, at least <strong>35 years old</strong>, and a resident of the US for at least <strong>14 years</strong>. The term is four years, with a maximum of two terms (22nd Amendment)." },

  // ===== CIVIL LIBERTIES =====
  { cat: "Civil Liberties", q: "What is the Bill of Rights?", a: "The <strong>Bill of Rights</strong> consists of the <strong>first ten amendments</strong> to the Constitution, ratified in 1791. It was added to protect individual liberties from government overreach, addressing Anti-Federalist concerns during ratification." },
  { cat: "Civil Liberties", q: "What does the First Amendment protect?", a: "The First Amendment protects five freedoms: <strong>religion</strong> (Establishment and Free Exercise clauses), <strong>speech, press, assembly</strong>, and the right to <strong>petition</strong> the government for redress of grievances." },
  { cat: "Civil Liberties", q: "What do the 4th, 5th, and 6th Amendments protect?", a: "<strong>4th</strong> – protection against unreasonable searches and seizures; requires warrants with probable cause<br><strong>5th</strong> – due process, double jeopardy protection, self-incrimination protection, eminent domain<br><strong>6th</strong> – right to a speedy and public trial, impartial jury, and right to counsel" },
  { cat: "Civil Liberties", q: "What is the difference between civil rights and civil liberties?", a: "<strong>Civil liberties</strong> are protections <strong>from</strong> government action (freedom of speech, right to privacy). <strong>Civil rights</strong> are protections <strong>by</strong> the government ensuring equal treatment regardless of race, gender, religion, or other characteristics." },
  { cat: "Civil Liberties", q: "What is the 14th Amendment and why is it important?", a: "The <strong>14th Amendment</strong> (1868) grants citizenship to all persons born in the US, guarantees <strong>equal protection under the law</strong>, and <strong>due process</strong>. It has been used to apply the Bill of Rights to state governments through <strong>incorporation</strong>." },
  { cat: "Civil Liberties", q: "What are the 2nd, 3rd, 7th, 8th, 9th, and 10th Amendments?", a: "<strong>2nd</strong> – right to bear arms<br><strong>3rd</strong> – no quartering of soldiers<br><strong>7th</strong> – right to jury trial in civil cases<br><strong>8th</strong> – no cruel and unusual punishment, no excessive bail<br><strong>9th</strong> – rights retained by the people<br><strong>10th</strong> – powers reserved to the states or the people" },
  { cat: "Civil Liberties", q: "What is the incorporation doctrine?", a: "<strong>Incorporation</strong> is the legal process through which the Supreme Court applied the Bill of Rights to <strong>state governments</strong> via the 14th Amendment's Due Process Clause. It occurred gradually through a series of court cases (selective incorporation)." },

  // ===== POLITICAL PARTIES =====
  { cat: "Political Parties", q: "What are the functions of political parties in the US?", a: "Political parties <strong>recruit and nominate candidates, mobilize voters, organize government, provide a platform of policy positions</strong>, and serve as a link between citizens and government. They simplify voter choices by grouping candidates under a common label." },
  { cat: "Political Parties", q: "Why does the US have a two-party system?", a: "The two-party system is reinforced by <strong>single-member districts with plurality voting</strong> (winner-take-all), as described by <strong>Duverger's Law</strong>. Third parties face barriers including ballot access rules, debate exclusion, and the spoiler effect." },
  { cat: "Political Parties", q: "What is the difference between PACs and Super PACs?", a: "<strong>PACs</strong> (Political Action Committees) donate directly to candidates with <strong>contribution limits</strong>. <strong>Super PACs</strong> can raise and spend <strong>unlimited money</strong> on independent expenditures but <strong>cannot coordinate directly</strong> with candidates or parties." },
  { cat: "Political Parties", q: "What are interest groups and how do they influence policy?", a: "<strong>Interest groups</strong> are organizations that try to influence government policy on behalf of their members. They use <strong>lobbying, campaign contributions, grassroots mobilization, litigation</strong>, and public education to shape legislation and regulation." },

  // ===== ELECTIONS =====
  { cat: "Elections", q: "How does the Electoral College work?", a: "Each state gets electors equal to its <strong>total congressional delegation</strong> (House + Senate). Most states use <strong>winner-take-all</strong>: the candidate who wins the popular vote in a state gets all its electoral votes. <strong>270 out of 538</strong> electoral votes are needed to win the presidency." },
  { cat: "Elections", q: "What is gerrymandering?", a: "<strong>Gerrymandering</strong> is the manipulation of electoral district boundaries to give one party an unfair advantage. Techniques include <strong>packing</strong> (concentrating opponents in few districts) and <strong>cracking</strong> (spreading opponents across many districts to dilute their vote)." },
  { cat: "Elections", q: "What is the difference between a primary election and a general election?", a: "A <strong>primary election</strong> determines which candidate represents each party in the general election. Primaries can be <strong>open</strong> (any voter), <strong>closed</strong> (registered party members only), or <strong>semi-closed</strong>. The <strong>general election</strong> determines who wins office." },
  { cat: "Elections", q: "What are the factors that influence voter turnout?", a: "Key factors include <strong>age</strong> (older voters participate more), <strong>education</strong> (higher education correlates with higher turnout), <strong>income, voter registration laws, election competitiveness</strong>, and <strong>convenience</strong> (early voting, mail-in ballots). Midterm elections have lower turnout than presidential elections." },
  { cat: "Elections", q: "What is the role of media in elections?", a: "Media shapes elections through <strong>agenda-setting</strong> (choosing which issues to cover), <strong>framing</strong> (how issues are presented), and <strong>priming</strong> (influencing which criteria voters use). Social media has increased <strong>direct communication</strong> between candidates and voters." },

  // ===== FEDERALISM =====
  { cat: "Federalism", q: "What is federalism?", a: "<strong>Federalism</strong> is a system of government where power is <strong>divided between a national government and state governments</strong>. Both levels have their own authority, can make and enforce laws, and derive power from the Constitution." },
  { cat: "Federalism", q: "What are enumerated, implied, and reserved powers?", a: "<strong>Enumerated powers</strong> – specifically listed in the Constitution (e.g., declare war, coin money)<br><strong>Implied powers</strong> – not listed but necessary to carry out enumerated powers (Elastic Clause)<br><strong>Reserved powers</strong> – belong to states under the 10th Amendment (e.g., education, marriage laws)" },
  { cat: "Federalism", q: "What are concurrent powers?", a: "<strong>Concurrent powers</strong> are shared by both federal and state governments. Examples include the power to <strong>tax, build roads, establish courts, and enforce laws</strong>. Both levels of government exercise these powers simultaneously." },
  { cat: "Federalism", q: "What is the difference between dual federalism and cooperative federalism?", a: "<strong>Dual federalism</strong> (layer cake) – clear division between federal and state responsibilities with minimal overlap. <strong>Cooperative federalism</strong> (marble cake) – intermingled responsibilities where federal and state governments collaborate on policy. The US has generally shifted toward cooperative federalism." },
  { cat: "Federalism", q: "What are unfunded mandates?", a: "<strong>Unfunded mandates</strong> are federal regulations requiring states to take certain actions <strong>without providing federal funding</strong> to cover the costs. They are controversial because they impose financial burdens on states while limiting their autonomy." },

  // ===== PUBLIC POLICY =====
  { cat: "Public Policy", q: "What are the stages of the public policy process?", a: "<strong>1) Agenda setting</strong> – identifying problems<br><strong>2) Policy formulation</strong> – developing solutions<br><strong>3) Policy adoption</strong> – enacting legislation<br><strong>4) Policy implementation</strong> – carrying out the policy<br><strong>5) Policy evaluation</strong> – assessing effectiveness" },
  { cat: "Public Policy", q: "What is the difference between domestic and foreign policy?", a: "<strong>Domestic policy</strong> addresses issues within the country (healthcare, education, taxes, infrastructure). <strong>Foreign policy</strong> deals with the nation's relationships with other countries (diplomacy, trade, military, treaties). The President leads foreign policy; Congress controls the budget for both." },
  { cat: "Public Policy", q: "What is the Commerce Clause and why is it significant?", a: "Article I, Section 8, Clause 3 gives Congress the power to <strong>regulate commerce among the states</strong>. It has been broadly interpreted to expand federal power over economic activity and was central in cases like <strong>Gibbons v. Ogden (1824)</strong>." },
  { cat: "Public Policy", q: "What is the filibuster?", a: "A <strong>filibuster</strong> is a Senate procedure where a senator speaks for an extended period to <strong>delay or block a vote</strong>. Ending a filibuster requires <strong>cloture</strong>, which needs <strong>60 votes</strong> (three-fifths of the Senate). It gives the minority party significant blocking power." },
];


let deck = [];
let current = 0;
let correctCount = 0;
let wrongCards = [];
let isFlipped = false;
let activeCategory = "All";

function getCategories() {
  const cats = ["All", ...new Set(ALL_CARDS.map(c => c.cat))];
  return cats;
}

function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  getCategories().forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === activeCategory ? ' active' : '');
    const count = cat === 'All' ? ALL_CARDS.length : ALL_CARDS.filter(c => c.cat === cat).length;
    btn.textContent = `${cat} (${count})`;
    btn.onclick = () => {
      activeCategory = cat;
      buildTabs();
      if (currentMode === 'browse') {
        renderList();
      } else {
        resetDeck();
      }
    };
    tabsEl.appendChild(btn);
  });
}

function resetDeck() {
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  deck = [...source];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  current = 0;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
  if (isFlipped) {
    document.getElementById('judgeBtns').classList.add('visible');
  } else {
    document.getElementById('judgeBtns').classList.remove('visible');
  }
}

function markCard(correct) {
  if (correct) {
    correctCount++;
  } else {
    wrongCards.push(deck[current]);
  }
  current++;
  isFlipped = false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');

  if (current >= deck.length) {
    showFinished();
  } else {
    // animate
    const area = document.getElementById('cardArea');
    area.classList.add('animating');
    setTimeout(() => area.classList.remove('animating'), 300);
    updateCard();
    updateStats();
  }
}

function updateCard() {
  if (current >= deck.length) return;
  const card = deck[current];
  document.getElementById('questionText').textContent = card.q;
  document.getElementById('answerText').innerHTML = card.a;
  document.getElementById('frontCategory').textContent = card.cat;
  document.getElementById('backCategory').textContent = card.cat + ' — Answer';
  const num = `${current + 1} / ${deck.length}`;
  document.getElementById('cardNum').textContent = num;
  document.getElementById('cardNumBack').textContent = num;
  updateStats();
}

function updateStats() {
  const remaining = deck.length - current;
  document.getElementById('stat-remaining').textContent = remaining;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-wrong').textContent = wrongCards.length;
  document.getElementById('stat-total').textContent = deck.length;
  const pct = deck.length > 0 ? ((current / deck.length) * 100).toFixed(0) : 0;
  document.getElementById('progress').style.width = pct + '%';
}

function showFinished() {
  document.getElementById('cardArea').style.display = 'none';
  const finished = document.getElementById('finishedScreen');
  finished.classList.add('show');
  const total = correctCount + wrongCards.length;
  const pct = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('reviewBtn').style.display = wrongCards.length > 0 ? '' : 'none';
  updateStats();
}

function restartWithWrong() {
  if (wrongCards.length === 0) { resetDeck(); return; }
  deck = [...wrongCards];
  current = 0;
  correctCount = 0;
  wrongCards = [];
  isFlipped = false;
  document.getElementById('finishedScreen').classList.remove('show');
  document.getElementById('cardArea').style.display = '';
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('judgeBtns').classList.remove('visible');
  updateCard();
  updateStats();
}

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flipCard(); }
  if (e.code === 'ArrowRight' && isFlipped) markCard(true);
  if (e.code === 'ArrowLeft' && isFlipped) markCard(false);
  if (e.code === 'KeyS') shuffleDeck();
});

// ===== MODE MANAGEMENT =====
let currentMode = 'flashcard';
let allExpanded = false;

function setMode(mode) {
  currentMode = mode;
  const flashcardEls = [
    document.getElementById('cardArea'),
    document.querySelector('.stats-bar'),
    document.querySelector('.progress-wrap'),
    document.querySelector('.controls'),
    document.getElementById('judgeBtns'),
    document.getElementById('finishedScreen'),
  ];
  const listView = document.getElementById('listView');
  const btnFlash = document.getElementById('modeFlashcard');
  const btnBrowse = document.getElementById('modeBrowse');

  if (mode === 'flashcard') {
    flashcardEls.forEach(el => { if (el) el.style.display = ''; });
    listView.classList.remove('visible');
    btnFlash.classList.add('active');
    btnBrowse.classList.remove('active');
    // Re-hide finished if it wasn't showing
    if (current < deck.length) document.getElementById('finishedScreen').classList.remove('show');
  } else {
    // Browse mode
    flashcardEls.forEach(el => { if (el) el.style.display = 'none'; });
    listView.classList.add('visible');
    btnFlash.classList.remove('active');
    btnBrowse.classList.add('active');
    renderList();
  }
}

function renderList() {
  const query = (document.getElementById('listSearch').value || '').toLowerCase().trim();
  const source = activeCategory === 'All' ? ALL_CARDS : ALL_CARDS.filter(c => c.cat === activeCategory);
  const filtered = query
    ? source.filter(c => c.q.toLowerCase().includes(query) || c.a.toLowerCase().replace(/<[^>]+>/g, '').includes(query))
    : source;

  document.getElementById('listCount').textContent = `${filtered.length} term${filtered.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('listItems');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No matching cards found.</div>';
    return;
  }

  container.innerHTML = filtered.map((card, i) => {
    const globalIdx = ALL_CARDS.indexOf(card) + 1;
    return `
    <div class="list-item" id="li-${i}">
      <div class="list-item-header" onclick="toggleListItem(${i})">
        <span class="list-item-num">${globalIdx}</span>
        <span class="list-item-q">${escapeHtml(card.q)}</span>
        <span class="list-item-cat">${card.cat}</span>
        <svg class="list-item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="list-item-answer">${card.a}</div>
    </div>`;
  }).join('');

  // Restore expanded state if allExpanded
  if (allExpanded) {
    container.querySelectorAll('.list-item').forEach(el => el.classList.add('open'));
  }
}

function toggleListItem(idx) {
  const el = document.getElementById(`li-${idx}`);
  if (el) el.classList.toggle('open');
}

function toggleExpandAll() {
  allExpanded = !allExpanded;
  const btn = document.getElementById('expandAllBtn');
  btn.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  document.querySelectorAll('.list-item').forEach(el => {
    if (allExpanded) el.classList.add('open');
    else el.classList.remove('open');
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Init
buildTabs();
resetDeck();
</script>
</body>
</html>
